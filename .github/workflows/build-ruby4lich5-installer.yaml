name: Build Ruby4Lich5 Installer (baked)

# Lives directly on Lich5/Ruby4Lich5 -- confirmed 2026-07-10 against real run
# history (every real installer build so far, including R4L5-v040.001.002,
# dispatched and ran right here); an earlier draft of this comment claimed it
# lived on Lich5/lich-5 (the build/test fork), which was stale documentation,
# not current practice. Builds the baked, non-DevKit installer: a stock
# RubyInstaller tree (installed via .exe with /components=ruby) with the
# precompiled binary gems gem-installed straight in on the runner (no MSYS2,
# no compile, no prune). The installer just lays that finished tree down --
# one app, file-copy fast. Compiles Ruby4Lich5-installer.iss with Inno Setup.
#
# Lich itself is NOT part of this build anymore -- Ruby4Lich5-installer.iss
# fetches it at install time instead (fetch-lich.ps1), matching how a new
# Lich release can land without a human pushing it through Ruby4Lich5's front
# door first ("one team, two repos" -- see docs/PUNCHLIST-remaining-work.md's
# Item 6 sections). There used to be a build_lich_payload job here that
# checked out Lich's source, zipped it, and fed it into this build -- retired
# together with the .iss change that stopped consuming it, not left as dead
# CI work alongside a design it no longer matches.

on:
  workflow_dispatch:
    inputs:
      ruby-series:
        description: "RubyInstaller series to resolve to its latest patch (ABI-locked to the gems)."
        required: false
        default: "4.0"
      gem-repo:
        description: "Repo publishing the gem-bundle Release."
        required: false
        default: "Lich5/Ruby4Lich5"
      gem-release-tag:
        description: "Gem-bundle Release tag to pull. Defaults to the current production roll-up bundle -- a single, fixed, eternal tag under the locked R4L5 naming convention (its content changes via gh release upload --clobber, not a new tag per version; see docs/PUNCHLIST-remaining-work.md's naming-convention section). Lich5/Ruby4Lich5 now hosts several differently-scoped releases at once (per-gem, roll-up), so 'newest on the repo' is no longer a safe empty-string fallback the way it was against a single-purpose repo. Never the 'Latest'-flagged release on this repo by design -- gem releases intentionally never claim that slot; see docs/PUNCHLIST-remaining-work.md's versioning section."
        required: false
        default: "R4L5-gem-bundle-x64-mingw-ucrt"
      installer-version:
        description: "Ruby4Lich5's own installer-build identity (AppVersion), shaped Ruby.Gems.CI (e.g. 040.001.002) -- independent of RubyVersion/GemBundleVersion, owned by Ruby4Lich5 (docs/DECISIONS.md Phase 1, item 4). See docs/PUNCHLIST-remaining-work.md's versioning section for what each field means and how it's derived; bump this per dispatch when cutting a real release."
        required: false
        default: "040.001.002"

permissions:
  contents: read

jobs:
  build_installer:
    name: Build installer (windows)
    runs-on: windows-latest
    timeout-minutes: 45
    steps:
      - name: Checkout installer assets
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      # GH_TOKEN scoped to just this step and "Fetch gem bundle from Release"
      # below -- the only two steps that call gh at all. Every step after
      # them executes externally sourced code (the downloaded RubyInstaller
      # .exe, then the downloaded gems via gem install --local) and has no
      # business holding a repo-scoped token while doing it.
      - name: Resolve latest RubyInstaller in series
        shell: powershell
        env:
          RUBY_SERIES_INPUT: ${{ inputs.ruby-series }}
          GH_TOKEN: ${{ github.token }}
        run: |
          # Not an ABI compatibility guard -- per docs/DECISIONS.md Phase 6, ruby-series is
          # a real per-build parameter, not hardcoded to one literal value, so a future ABI
          # variant is a parameter value, not a forked workflow file. This only validates
          # format; it does not check gem-repo/gem-release-tag actually matches ruby-series
          # (the same trust already extended to every other input here). Only one Ruby ABI
          # (4.0.x) is real today, so this is untested against an actual mismatch -- revisit
          # with real manifest/metadata validation once a second ABI (e.g. 4.1.x) exists.
          # Read via $env:, not spliced into the script text -- a single quote in the
          # input could otherwise break out of the string and inject arbitrary PowerShell
          # before the format check below ever runs.
          $series = $env:RUBY_SERIES_INPUT
          if ($series -notmatch '^\d+\.\d+$') { Write-Error "ruby-series must look like 4.0; got '$series'."; exit 1 }
          $escaped = [regex]::Escape($series)
          # Output captured and $LASTEXITCODE checked immediately, parsed only
          # on success -- same fix already established elsewhere in this
          # project (ruby4-bundled-gems-suite.yml's gem-bundle digest-retry
          # loop, 2026-07-09, and its own RubyInstaller digest step, Item 29):
          # piping `gh api` straight into ConvertFrom-Json would make a
          # genuine command failure (auth/network/rate-limit) look like a
          # JSON parse error instead of surfacing the real `gh` error text.
          $apiOutput = gh api repos/oneclick/rubyinstaller2/releases --paginate 2>&1
          if ($LASTEXITCODE -ne 0) {
            Write-Error "gh api failed listing RubyInstaller releases -- $apiOutput"
            exit 1
          }
          $rels = $apiOutput | ConvertFrom-Json
          $rel = $rels |
            Where-Object { $_.tag_name -match "^RubyInstaller-$escaped\.\d+-\d+$" } |
            Sort-Object { [version]($_.tag_name -replace '^RubyInstaller-([\d.]+)-\d+$', '$1') },
                        { [int]($_.tag_name -replace '^RubyInstaller-[\d.]+-(\d+)$', '$1') } |
            Select-Object -Last 1
          if (-not $rel) { Write-Error "No RubyInstaller release for series $series."; exit 1 }
          $tag = $rel.tag_name -replace '^RubyInstaller-', ''
          $rubyVersion = ($tag -split '-')[0]
          $exeName = "rubyinstaller-$tag-x64.exe"     # run on the runner with /components to avoid docs/msys2
          $asset = $rel.assets | Where-Object { $_.name -eq $exeName }
          if (-not $asset) { Write-Error "Asset $exeName not found on $($rel.tag_name)."; exit 1 }
          # RubyInstaller's own releases report a real sha256 digest per asset
          # (same GitHub Releases API field this file already trusts for the
          # gem bundle below) -- captured here, verified after download in the
          # next step, so a compromised/corrupted mirror or a MITM'd download
          # is caught before this .exe is ever executed. No retry/race handling
          # needed here unlike the gem bundle: RubyInstaller's releases are an
          # immutable third party we never --clobber, so the digest resolved
          # now can't go stale before the download completes.
          if ($asset.digest -notmatch '^sha256:[0-9a-f]{64}$') {
            Write-Error "RubyInstaller release $($rel.tag_name) returned a missing or malformed digest for $exeName -- got '$($asset.digest)'."
            exit 1
          }
          "RUBY_VERSION=$rubyVersion"       | Out-File $env:GITHUB_ENV -Append -Encoding utf8
          "RUBY_EXE_URL=$($asset.browser_download_url)" | Out-File $env:GITHUB_ENV -Append -Encoding utf8
          "RUBY_EXE_DIGEST=$($asset.digest)" | Out-File $env:GITHUB_ENV -Append -Encoding utf8
          Write-Host "RubyInstaller $tag -> $exeName (sha256 recorded: $($asset.digest))"

      - name: Install Ruby tree to .\ruby (no rdoc, no MSYS2 -- avoided, not stripped)
        shell: powershell
        run: |
          # /components is an allowlist (default ruby,rdoc,msys2). Passing only
          # 'ruby' never writes rdoc docs or the MSYS2 toolchain. Run on the
          # runner (throwaway registration); we ship the resulting tree, not the .exe.
          . (Join-Path $env:GITHUB_WORKSPACE 'verify-archive-download.ps1')
          try {
            Invoke-VerifiedDownload -Url $env:RUBY_EXE_URL -ExpectedDigest $env:RUBY_EXE_DIGEST -DestinationPath (Join-Path $PWD 'rubyinstaller.exe') | Out-Null
          } catch {
            Write-Error "RubyInstaller download/verification failed: $($_.Exception.Message)"
            exit 1
          }
          Write-Host "RubyInstaller digest verified: $env:RUBY_EXE_DIGEST"
          $ruby = Join-Path $PWD 'ruby'
          Start-Process -FilePath .\rubyinstaller.exe -Wait -ArgumentList `
            '/verysilent','/norestart','/currentuser',"/dir=$ruby",'/components=ruby','/tasks=nomodpath,noassocfiles,noridkinstall'
          if (!(Test-Path "$ruby\bin\ruby.exe")) { Write-Error "$ruby\bin\ruby.exe missing after install."; exit 1 }
          & "$ruby\bin\ruby.exe" -v

      - name: Fetch gem bundle from Release (public, no secret)
        shell: powershell
        env:
          GEM_REPO_INPUT: ${{ inputs.gem-repo }}
          GEM_RELEASE_TAG_INPUT: ${{ inputs.gem-release-tag }}
          GH_TOKEN: ${{ github.token }}
        run: |
          # Read via $env:, not spliced into the script text -- a single quote in
          # either input could otherwise break out of the string and inject
          # arbitrary PowerShell.
          $repo = $env:GEM_REPO_INPUT
          $tag  = $env:GEM_RELEASE_TAG_INPUT
          if ([string]::IsNullOrWhiteSpace($tag)) {
            $tag = gh api "repos/$repo/releases" --jq '.[0].tag_name'
            if ([string]::IsNullOrWhiteSpace($tag)) { Write-Error "No releases on $repo."; exit 1 }
          }
          Write-Host "Gem bundle release: $repo @ $tag"
          "GEM_BUNDLE_VERSION=$tag" | Out-File $env:GITHUB_ENV -Append -Encoding utf8
          gh release download $tag --repo $repo --pattern '*.zip' --dir .
          # Fail loudly on zero or multiple candidates rather than silently taking
          # whichever one Get-ChildItem happens to return first -- picking blindly here
          # would produce a wrong, unnoticed installer if a release ever ships more than
          # one non-lich-5 zip asset.
          $candidates = @(Get-ChildItem -Filter '*.zip' | Where-Object { $_.Name -ne 'lich-5.zip' })
          if ($candidates.Count -eq 0) { Write-Error "Gem-bundle zip not found in release $tag."; exit 1 }
          if ($candidates.Count -gt 1) {
            Write-Error "Ambiguous gem-bundle zip in release $tag`: found $($candidates.Count) candidates ($($candidates.Name -join ', ')), expected exactly 1."
            exit 1
          }

          # Logged clearly, not written into a release automatically -- this
          # workflow only uploads the built .exe as a build artifact, it
          # never creates the GitHub Release itself (that's deliberately
          # human-authored, reviewed on real hardware before publishing).
          # Whoever creates that release transcribes this into its notes as
          # GemBundleDigest:, the same way RubyVersion/GemBundleVersion
          # already get transcribed by hand -- see
          # docs/PUNCHLIST-remaining-work.md's versioning section.
          #
          # Hashed locally, not just read from the API -- real race, found
          # and fixed 2026-07-10: the gem-bundle tag is deliberately mutable
          # (content changes via gh release upload --clobber), so a plain
          # "download the zip, then separately ask the release what its
          # current digest is" has a real window in between where someone
          # else's --clobber could land, making the logged digest describe
          # different bytes than what actually got baked into this build.
          # Get-FileHash against the file we just downloaded is the one
          # value that's always true to what this build actually consumed;
          # the remote read is a consistency check on top of that, not the
          # source of truth. A real mismatch after retrying means a clobber
          # genuinely raced this build -- fail loudly and let it be re-run,
          # rather than log a digest that might not match the bits inside
          # Ruby4Lich5.exe.
          #
          # Remote read wrapped in try/catch with $LASTEXITCODE checked
          # before parsing, not gh | ConvertFrom-Json directly -- same real
          # gap as before, found again 2026-07-10: piping straight into
          # ConvertFrom-Json means a genuine gh failure (auth/network/
          # rate-limit, or EAP=Stop promoting gh's own stderr to a
          # terminating exception, confirmed inconsistent across real runs
          # in ruby4-bundled-gems-suite.yml) looks identical to "just
          # retry," instead of being distinguishable from a real digest
          # mismatch.
          $bundleAssetName = $candidates[0].Name
          $zip = $candidates[0]
          $localDigest = "sha256:" + (Get-FileHash -Path $zip.FullName -Algorithm SHA256).Hash.ToLowerInvariant()

          $remoteDigest = $null
          $lastDigestViewFailureText = $null
          for ($digestAttempt = 1; $digestAttempt -le 3; $digestAttempt++) {
            try {
              $viewOutput = gh release view $tag --repo $repo --json assets 2>&1
              if ($LASTEXITCODE -eq 0) {
                $lastDigestViewFailureText = $null
                try {
                  $bundleReleaseJson = $viewOutput | ConvertFrom-Json
                  $bundleAsset = $bundleReleaseJson.assets | Where-Object { $_.name -eq $bundleAssetName }
                  $remoteDigest = if ($bundleAsset) { $bundleAsset.digest } else { $null }
                } catch {
                  $lastDigestViewFailureText = "$_"
                }
              } else {
                $lastDigestViewFailureText = "$viewOutput"
              }
            } catch {
              $lastDigestViewFailureText = "$_"
            }
            if ($remoteDigest -eq $localDigest) {
              break
            }
            Start-Sleep -Seconds 2
          }

          if (-not $remoteDigest -and $lastDigestViewFailureText) {
            Write-Error "Could not read $tag's asset digest after 3 attempts -- $lastDigestViewFailureText"
            exit 1
          }
          if ([string]::IsNullOrWhiteSpace($remoteDigest) -or $remoteDigest -notmatch '^sha256:[0-9a-f]{64}$') {
            Write-Error "Gem bundle release $tag returned a missing or malformed digest for $bundleAssetName -- got '$remoteDigest'."
            exit 1
          }
          if ($remoteDigest -ne $localDigest) {
            Write-Error "Gem bundle digest mismatch for $tag -- locally downloaded $bundleAssetName hashes to $localDigest, but the release currently reports $remoteDigest after 3 attempts. This likely means the bundle was re-published (--clobber) while this build was in flight -- re-run the build to pick up a consistent state."
            exit 1
          }
          Write-Host "Gem bundle digest ($bundleAssetName): $localDigest (confirmed against the release, no race)"
          New-Item -ItemType Directory -Path .\gembundle -Force | Out-Null
          Expand-Archive -Path $zip.FullName -DestinationPath .\gembundle -Force
          if (-not (Get-ChildItem .\gembundle -Filter 'install-runtime-gems.cmd' -Recurse)) { Write-Error "install-runtime-gems.cmd missing."; exit 1 }

      - name: Bake gems into the Ruby tree (gem install --local, no compile)
        shell: powershell
        run: |
          $rubyBin = Join-Path $PWD 'ruby\bin'
          $env:Path = "$rubyBin;$env:Path"
          # The shipped install-runtime-gems.cmd loops `gem install`; calling gem.cmd
          # (a batch file) inside a FOR block without `call` corrupts cwd after the
          # first gem, so --local can't find the rest. Bypass it: one direct gem
          # install of all targets from the bundle dir (same as the factory smoke).
          $bundle  = (Get-ChildItem .\gembundle -Filter 'runtime-gems-install-targets.txt' -Recurse | Select-Object -First 1).Directory.FullName
          $targets = Get-Content (Join-Path $bundle 'runtime-gems-install-targets.txt') | Where-Object { $_.Trim() }
          Write-Host "Baking $($targets.Count) targets from $bundle"
          Push-Location $bundle
          & "$rubyBin\gem.cmd" install --local --no-document --force @targets
          $code = $LASTEXITCODE
          Pop-Location
          if ($code -ne 0) { Write-Error "Gem bake failed (exit $code)."; exit $code }
          Write-Host "::group::Installed gems"
          & "$rubyBin\gem.cmd" list --local
          Write-Host "::endgroup::"

      - name: Smoke the baked tree (loads on the runner before we ship it)
        shell: powershell
        run: |
          $ruby = Join-Path $PWD 'ruby\bin\ruby.exe'
          & $ruby -e "require 'gtk3'; require 'sqlite3'; require 'sequel'; require 'ox'; require 'curses'; Gtk.init; puts 'baked tree OK: ' + RUBY_DESCRIPTION"
          if ($LASTEXITCODE -ne 0) { Write-Error "Baked Ruby tree failed to load the runtime gems."; exit 1 }

      - name: Install Inno Setup
        shell: powershell
        run: |
          choco feature disable -n=showDownloadProgress
          choco install -y --no-progress innosetup

      # LichVersion is deliberately not passed anymore -- Lich isn't baked in at
      # build time, so there's nothing to label; the .iss no longer even
      # defines that preprocessor variable (see its own header comment).
      - name: Compile installer
        shell: powershell
        env:
          INSTALLER_VERSION_INPUT: ${{ inputs.installer-version }}
        run: |
          # Read via $env:, not spliced into the ISCC argument text -- same
          # injection-safety reasoning as the gem-repo/gem-release-tag inputs
          # above.
          $iscc = "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe"
          if (!(Test-Path $iscc)) { Write-Error "ISCC not found at $iscc."; exit 1 }
          & $iscc "/DRubyVersion=$env:RUBY_VERSION" "/DGemBundleVersion=$env:GEM_BUNDLE_VERSION" "/DInstallerVersion=$env:INSTALLER_VERSION_INPUT" "Ruby4Lich5-installer.iss"
          if ($LASTEXITCODE -ne 0) { Write-Error "Inno Setup compile failed."; exit $LASTEXITCODE }
          if (!(Test-Path .\Output\Ruby4Lich5.exe)) { Write-Error "Output\Ruby4Lich5.exe not produced."; exit 1 }
          Get-Item .\Output\Ruby4Lich5.exe | ForEach-Object { Write-Host "Built: $($_.Name) ($([math]::Round($_.Length/1MB,1)) MB)" }

      - name: Upload installer
        uses: actions/upload-artifact@330a01c490aca151604b8cf639adc76d48f6c5d4 # v5.0.0
        with:
          name: ruby4lich5-installer
          path: .\Output\Ruby4Lich5.exe
          if-no-files-found: error
