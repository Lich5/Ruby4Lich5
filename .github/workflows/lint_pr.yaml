name: "Lint PR"

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - edited
      - synchronize
      - reopened

permissions:
  pull-requests: read

jobs:
  main:
    name: Validate PR title
    runs-on: ubuntu-latest
    steps:
      - uses: amannn/action-semantic-pull-request@48f256284bd46cdaab1048c3721360e808335d50 # Using v6.1.1
        with:
          scopes: |
            gems
            installer
            bundle
            factory
            ci
            docs
          requireScope: false
          disallowScopes: |
            [A-Z]+
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
