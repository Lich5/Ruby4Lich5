# Inherited from Lich5/lich5-gtk3-gems (2026-06-14) as the seed for the Ruby4Lich5
# "front door" (Phase 2 of ROADMAP-woven-plan.md): a fixed monolithic build of one named
# suite (GTK3), being generalized into "name any gem -> classify -> build -> publish".
#
# The classify/patch/normalize decisions are now Ruby, not ad-hoc PowerShell -- see
# "Prepare native gems" below, calling bin/prepare_native_gems.rb
# (Ruby4Lich5::NativeGemPreparer, backed by Classifier/ClosureResolver/BuildPlanner/
# GemspecNormalizer/PatchApplier, all tested). The glib2-gc-repair input this used to
# have is gone -- PatchApplier's curated patches (glib2/property-retention-fix.rb,
# gobject-introspection/gc-compact-safety-fix.rb) apply unconditionally now, no flag
# needed, matching every other native gem's patches falling out cleanly when none exist.
#
# Still NOT generalized: MSYS2 package installation and the actual native compile below
# still target the fixed GTK3 stack directly, not the JSON plan's own msys2_packages per
# gem -- full "any named gem" generalization of the compile step itself is separate,
# larger, future work, not done in this pass.
#
# item 7a (2026-07-08): the DLL-vendoring *target list* (which gems get the discovered
# runtime-DLL closure copied into their own vendor/local/bin) is now plan-driven --
# read from each entry's vendoring_role (Ruby4Lich5::VendoringRoleClassifier, via
# NativeGemPreparer) instead of a hardcoded @('glib2', 'cairo'). For the real GTK3 stack
# this resolves to the same two gems as before -- deliberately behavior-preserving, not
# a size optimization. Every root still gets the *same full* discovered DLL closure
# copied in, same as before generalizing the list itself; scoping each root down to only
# its own real dependency subset (cairo doesn't need the whole GNOME closure) is real,
# separate follow-on work, not done here -- see docs/PUNCHLIST-remaining-work.md.
#
# upload-artifact/download-artifact bumped to v5 as part of this rewrite (matching the
# checkout@v5 already used below) -- was v4 (Node 20; lich5-gtk3-gems never got the fix
# elanthia-online/lich-5's own CI already had).
name: Build Ruby4 Bundled Gems Suite

on:
  workflow_dispatch:
    inputs:
      ruby-installer-version:
        description: "RubyInstaller UCRT archive version, for example 4.0.5-1."
        required: false
        default: "4.0.5-1"
      ruby-gnome-version:
        description: "Ruby-GNOME suite version to build from upstream source."
        required: false
        default: "4.3.6"
      cairo-version:
        description: "rcairo version to build from upstream gem source."
        required: false
        default: "1.18.5"
      runtime-gems:
        description: "Top-level Lich runtime gems to install from the staged local bundle."
        required: false
        default: "gtk3 sqlite3 ox ascii_charts curses os redis sequel terminal-table kramdown tzinfo tzinfo-data concurrent-ruby ffi webrick"
      native-runtime-gems:
        description: "Runtime gems that must be collected as x64-mingw-ucrt binary gems."
        required: false
        default: "sqlite3 ox ffi curses"
      diagnostic-mkmf-logs:
        description: "Dump mkmf.log files when native compilation fails."
        required: false
        default: false
        type: boolean

permissions:
  contents: read

jobs:
  build_ruby4_bundled_gems_suite:
    name: Build Ruby4 bundled gems suite (windows-ucrt64)
    runs-on: windows-latest
    timeout-minutes: 90

    env:
      MSYSTEM: UCRT64
      MSYS2_PREFIX: ucrt64
      MSYS2_PACKAGE_PREFIX: mingw-w64-ucrt-x86_64
      GEM_PLATFORM: x64-mingw-ucrt

    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Validate inputs
        shell: powershell
        env:
          RUBY_INSTALLER_VERSION_INPUT: ${{ inputs.ruby-installer-version }}
          RUBY_GNOME_VERSION_INPUT: ${{ inputs.ruby-gnome-version }}
          CAIRO_VERSION_INPUT: ${{ inputs.cairo-version }}
          RUNTIME_GEMS_INPUT: ${{ inputs.runtime-gems }}
          NATIVE_RUNTIME_GEMS_INPUT: ${{ inputs.native-runtime-gems }}
          DIAGNOSTIC_MKMF_LOGS_INPUT: ${{ inputs.diagnostic-mkmf-logs }}
        run: |
          # Read via $env:, not spliced directly into the script text as a quoted
          # expression -- a single quote in a workflow_dispatch input could
          # otherwise break out of the string and inject arbitrary PowerShell
          # before any of the validation below ever runs.
          $rubyInstallerVersion = $env:RUBY_INSTALLER_VERSION_INPUT
          $rubyGnomeVersion = $env:RUBY_GNOME_VERSION_INPUT
          $cairoVersion = $env:CAIRO_VERSION_INPUT
          $runtimeGems = $env:RUNTIME_GEMS_INPUT
          $nativeRuntimeGems = $env:NATIVE_RUNTIME_GEMS_INPUT
          $diagnosticMkmfLogs = $env:DIAGNOSTIC_MKMF_LOGS_INPUT

          if ($rubyInstallerVersion -notmatch '^\d+\.\d+\.\d+-\d+$') {
            Write-Error "ruby-installer-version must look like N.N.N-N, for example 4.0.5-1; received '$rubyInstallerVersion'."
            exit 1
          }
          if ($rubyGnomeVersion -notmatch '^\d+\.\d+\.\d+$') {
            Write-Error "ruby-gnome-version must look like N.N.N; received '$rubyGnomeVersion'."
            exit 1
          }
          if ($cairoVersion -notmatch '^\d+\.\d+\.\d+$') {
            Write-Error "cairo-version must look like N.N.N; received '$cairoVersion'."
            exit 1
          }
          if ([string]::IsNullOrWhiteSpace($runtimeGems)) {
            Write-Error "runtime-gems must list at least one top-level runtime gem."
            exit 1
          }
          if ([string]::IsNullOrWhiteSpace($nativeRuntimeGems)) {
            Write-Error "native-runtime-gems must list at least one native runtime gem."
            exit 1
          }
          if ($diagnosticMkmfLogs -notin @('true', 'false')) {
            Write-Error "diagnostic-mkmf-logs must be true or false; received '$diagnosticMkmfLogs'."
            exit 1
          }

          "RUBY_INSTALLER_VERSION=$rubyInstallerVersion" | Out-File $env:GITHUB_ENV -Append -Encoding utf8
          "RUBY_GNOME_VERSION=$rubyGnomeVersion" | Out-File $env:GITHUB_ENV -Append -Encoding utf8
          "CAIRO_VERSION=$cairoVersion" | Out-File $env:GITHUB_ENV -Append -Encoding utf8
          "RUNTIME_GEMS=$runtimeGems" | Out-File $env:GITHUB_ENV -Append -Encoding utf8
          "NATIVE_RUNTIME_GEMS=$nativeRuntimeGems" | Out-File $env:GITHUB_ENV -Append -Encoding utf8
          "DIAGNOSTIC_MKMF_LOGS=$diagnosticMkmfLogs" | Out-File $env:GITHUB_ENV -Append -Encoding utf8

      # Single source of truth for the MSYS2/MinGW toolchain. The whole job
      # is keyed off this install via steps.msys2.outputs.msys2-location, so
      # there is no second pacman pass into a separate C:\msys64 root.
      # pacman prints "warning: dependency cycle detected" for libwebp/libtiff
      # and harfbuzz/freetype during this step -- confirmed real, longstanding,
      # upstream MSYS2 package-metadata quirk (same exact libwebp/libtiff pair
      # shows up across multiple real msys2/MSYS2-packages and msys2/MINGW-
      # packages GitHub issues), not anything in this build. Non-fatal --
      # pacman picks an install order anyway and every later step depending on
      # these packages succeeds. Scoped entirely to this build machine's own
      # package manager; the shipped product never runs pacman at all, it only
      # ever receives already-compiled .dll files loaded via Windows' own PE
      # loader -- a completely different mechanism with no shared failure
      # mode. Investigated and confirmed benign 2026-07-09, not chased further
      # (upstream MSYS2's own package graph, not ours to fix).
      - name: Install MSYS2 UCRT build surface
        id: msys2
        uses: msys2/setup-msys2@66cd2cce69caa17b53920067426061ca1de3a884 # v2.32.0
        with:
          msystem: UCRT64
          update: true
          install: >-
            base-devel
            make
            mingw-w64-ucrt-x86_64-gcc
            mingw-w64-ucrt-x86_64-gcc-libs
            mingw-w64-ucrt-x86_64-binutils
            mingw-w64-ucrt-x86_64-make
            mingw-w64-ucrt-x86_64-pkgconf
            mingw-w64-ucrt-x86_64-libffi
            mingw-w64-ucrt-x86_64-sqlite3
            mingw-w64-ucrt-x86_64-gobject-introspection
            mingw-w64-ucrt-x86_64-gobject-introspection-runtime
            mingw-w64-ucrt-x86_64-gtk3
            mingw-w64-ucrt-x86_64-pdcurses
            mingw-w64-ucrt-x86_64-ncurses

      - name: Build sanitized PATH
        id: lanepath
        shell: powershell
        run: |
          # Resolve the MSYS2 root from the setup-msys2 install (its own
          # location, not the runner's preinstalled C:\msys64). Everything
          # downstream keys off MSYS2_ROOT, so this is the single root.
          $msys = '${{ steps.msys2.outputs.msys2-location }}'
          $prefix = $env:MSYS2_PREFIX
          if ([string]::IsNullOrWhiteSpace($msys) -or !(Test-Path $msys)) {
            Write-Error "MSYS2 setup failed: expected install root at '$msys' to exist."
            exit 1
          }

          $orig = $env:Path -split ';'
          $filtered = $orig | Where-Object {
            $_ -and
            ($_ -notlike '*\Ruby\*\x64\msys64\*') -and
            ($_ -notmatch '^C:\\hostedtoolcache\\windows\\Ruby(\\|$)') -and
            ($_ -ne 'C:\mingw64\bin') -and
            ($_ -notmatch '^C:\\Strawberry(\\|$)')
          }
          $lanePath = @("$msys\$prefix\bin", "$msys\usr\bin") + $filtered
          $joined = ($lanePath -join ';')

          "MSYS2_ROOT=$msys" | Out-File $env:GITHUB_ENV -Append -Encoding utf8
          "PATH_GEM_SUITE=$joined" | Out-File $env:GITHUB_ENV -Append -Encoding utf8
          "path=$joined" | Out-File $env:GITHUB_OUTPUT -Append -Encoding utf8
          "RI_DEVKIT=$msys" | Out-File $env:GITHUB_ENV -Append -Encoding utf8
          "MSYSTEM_PREFIX=/$prefix" | Out-File $env:GITHUB_ENV -Append -Encoding utf8
          "MINGW_PREFIX=/$prefix" | Out-File $env:GITHUB_ENV -Append -Encoding utf8

      - name: Resolve native build surface
        shell: powershell
        env:
          PATH: ${{ steps.lanepath.outputs.path }}
        run: |
          $msys = $env:MSYS2_ROOT
          $prefix = $env:MSYS2_PREFIX
          $gcc = Join-Path $msys "$prefix\bin\gcc.exe"
          $pkgConfig = Join-Path $msys "$prefix\bin\pkg-config.exe"
          $pkgConfigPath = "$msys\$prefix\lib\pkgconfig;$msys\lib\pkgconfig"

          # GNU make ships in the MSYS lane as usr\bin\make.exe; the UCRT
          # package provides ucrt64\bin\mingw32-make.exe (a different name).
          # There is no ucrt64\bin\make.exe. Prefer the MSYS make for mkmf
          # compatibility and fall back to mingw32-make.
          $makeCandidates = @(
            (Join-Path $msys 'usr\bin\make.exe'),
            (Join-Path $msys "$prefix\bin\mingw32-make.exe")
          )
          $make = $makeCandidates | Where-Object { Test-Path $_ } | Select-Object -First 1
          # mkmf/gem-install spawns make through MSYS sh, which strips
          # backslashes (D:\a\_temp -> D:a_temp). Use forward slashes so the
          # path survives; make and Windows CreateProcess both accept them.
          if ($make) { $make = $make -replace '\\', '/' }

          # Probe the surface before gating so a failure shows what is present.
          Write-Host "::group::Native build surface probe"
          where.exe gcc
          where.exe make
          where.exe mingw32-make
          where.exe pkg-config
          Write-Host "::endgroup::"

          # Validate the whole surface at once and report every gap together.
          $required = [ordered]@{ gcc = $gcc; make = $make; 'pkg-config' = $pkgConfig }
          $missing = @()
          foreach ($name in $required.Keys) {
            $path = $required[$name]
            if ([string]::IsNullOrEmpty($path) -or !(Test-Path $path)) {
              $missing += $name
            }
          }
          if ($missing.Count -gt 0) {
            $missingList = $missing -join ', '
            $searched = "Searched gcc=$gcc; make=$($makeCandidates -join ' | '); pkg-config=$pkgConfig."
            Write-Error "Native build surface validation failed: missing tool(s): $missingList. $searched"
            exit 1
          }

          "CC=$gcc" | Out-File $env:GITHUB_ENV -Append -Encoding utf8
          "MAKE=$make" | Out-File $env:GITHUB_ENV -Append -Encoding utf8
          "PKG_CONFIG=$pkgConfig" | Out-File $env:GITHUB_ENV -Append -Encoding utf8
          "PKG_CONFIG_PATH=$pkgConfigPath" | Out-File $env:GITHUB_ENV -Append -Encoding utf8

          Write-Host "::group::Native build surface"
          Write-Host "CC=$gcc"
          Write-Host "MAKE=$make"
          Write-Host "PKG_CONFIG=$pkgConfig"
          Write-Host "PKG_CONFIG_PATH=$pkgConfigPath"
          & $gcc --version
          & $make --version
          & $pkgConfig --version
          & $pkgConfig --modversion gtk+-3.0 gobject-introspection-1.0 glib-2.0 gobject-2.0 gio-2.0 cairo pango
          Write-Host "::endgroup::"

      - name: Download and extract RubyInstaller
        shell: powershell
        run: |
          $rubyInstallerVersion = $env:RUBY_INSTALLER_VERSION
          $rubyParent = 'C:\Ruby4Lich5\ruby'
          $archive = Join-Path $env:RUNNER_TEMP "rubyinstaller-$rubyInstallerVersion-x64.7z"
          $url = "https://github.com/oneclick/rubyinstaller2/releases/download/RubyInstaller-$rubyInstallerVersion/rubyinstaller-$rubyInstallerVersion-x64.7z"

          if (Test-Path $rubyParent) {
            Remove-Item $rubyParent -Recurse -Force
          }
          New-Item -ItemType Directory -Path $rubyParent -Force | Out-Null

          Invoke-WebRequest -Uri $url -OutFile $archive -UseBasicParsing -TimeoutSec 60
          if (!(Test-Path $archive)) {
            Write-Error "RubyInstaller download failed: expected archive $archive was not created."
            exit 1
          }

          $sevenZip = "${env:ProgramFiles}\7-Zip\7z.exe"
          if (!(Test-Path $sevenZip)) {
            $sevenZip = '7z.exe'
          }

          & $sevenZip x $archive "-o$rubyParent" -y
          if ($LASTEXITCODE -ne 0) {
            Write-Error "RubyInstaller extraction failed."
            exit $LASTEXITCODE
          }

          $rubyExe = Get-ChildItem $rubyParent -Recurse -Filter ruby.exe -File | Where-Object {
            $_.FullName -match '\\bin\\ruby\.exe$'
          } | Select-Object -First 1
          if (-not $rubyExe) {
            Write-Error "RubyInstaller extraction failed: ruby.exe was not found under $rubyParent."
            exit 1
          }

          $rubyRoot = Split-Path (Split-Path $rubyExe.FullName -Parent) -Parent
          & $rubyExe.FullName --version
          if ($LASTEXITCODE -ne 0) {
            Write-Error "RubyInstaller validation failed: ruby.exe could not run."
            exit $LASTEXITCODE
          }

          $rubyPlatform = & $rubyExe.FullName -e "require 'rubygems'; print Gem::Platform.local.to_s"
          if ($rubyPlatform -ne $env:GEM_PLATFORM) {
            Write-Error "RubyInstaller validation failed: expected Ruby platform $env:GEM_PLATFORM, got $rubyPlatform."
            exit 1
          }

          $gemExe = Join-Path $rubyRoot 'bin\gem.cmd'
          if (!(Test-Path $gemExe)) {
            Write-Error "RubyInstaller validation failed: gem.cmd was not found at $gemExe."
            exit 1
          }

          "RUBY_ROOT=$rubyRoot" | Out-File $env:GITHUB_ENV -Append -Encoding utf8
          "RUBY_EXE=$($rubyExe.FullName)" | Out-File $env:GITHUB_ENV -Append -Encoding utf8
          "GEM_EXE=$gemExe" | Out-File $env:GITHUB_ENV -Append -Encoding utf8

      - name: Download upstream gem sources
        shell: powershell
        env:
          PATH: ${{ steps.lanepath.outputs.path }}
        run: |
          $rubyGnomeVersion = $env:RUBY_GNOME_VERSION
          $cairoVersion = $env:CAIRO_VERSION
          $work = Join-Path $env:RUNNER_TEMP 'ruby4-bundled-gems'
          $src = Join-Path $work 'src'
          $build = Join-Path $work 'build'
          $pkg = Join-Path $env:GITHUB_WORKSPACE 'pkg'

          foreach ($dir in @($work, $pkg)) {
            if (Test-Path $dir) {
              Remove-Item $dir -Recurse -Force
            }
            New-Item -ItemType Directory -Path $dir -Force | Out-Null
          }
          New-Item -ItemType Directory -Path $src, $build -Force | Out-Null

          $rubyGnomeZip = Join-Path $src "ruby-gnome-$rubyGnomeVersion.zip"
          $rubyGnomeUrl = "https://github.com/ruby-gnome/ruby-gnome/archive/refs/tags/$rubyGnomeVersion.zip"
          Write-Host "Downloading Ruby-GNOME $rubyGnomeVersion from $rubyGnomeUrl"
          Invoke-WebRequest -Uri $rubyGnomeUrl -OutFile $rubyGnomeZip -UseBasicParsing
          Expand-Archive -Path $rubyGnomeZip -DestinationPath $src -Force
          $rubyGnomeRoot = Join-Path $src "ruby-gnome-$rubyGnomeVersion"
          if (!(Test-Path $rubyGnomeRoot)) {
            Write-Error "Source download failed: Ruby-GNOME source did not expand to $rubyGnomeRoot."
            exit 1
          }

          Push-Location $src
          & $env:GEM_EXE fetch cairo --version $cairoVersion --clear-sources --source https://rubygems.org
          $fetchExit = $LASTEXITCODE
          Pop-Location
          $cairoGem = Join-Path $src "cairo-$cairoVersion.gem"
          if ($fetchExit -ne 0 -or !(Test-Path $cairoGem)) {
            Write-Error "Source download failed: cairo $cairoVersion gem could not be fetched."
            exit 1
          }
          Push-Location $src
          & $env:GEM_EXE unpack $cairoGem
          $unpackExit = $LASTEXITCODE
          Pop-Location
          if ($unpackExit -ne 0) {
            Write-Error "Source download failed: cairo $cairoVersion gem could not be unpacked."
            exit $unpackExit
          }
          $cairoRoot = Join-Path $src "cairo-$cairoVersion"
          if (!(Test-Path $cairoRoot)) {
            Write-Error "Source download failed: cairo source did not unpack to $cairoRoot."
            exit 1
          }

          "SOURCE_ROOT=$build" | Out-File $env:GITHUB_ENV -Append -Encoding utf8
          "PKG_DIR=$pkg" | Out-File $env:GITHUB_ENV -Append -Encoding utf8

          $rubyGnomeGems = @(
            'glib2',
            'gobject-introspection',
            'gio2',
            'cairo-gobject',
            'pango',
            'gdk_pixbuf2',
            'atk',
            'gdk3',
            'gtk3'
          )
          foreach ($gemName in $rubyGnomeGems) {
            $from = Join-Path $rubyGnomeRoot $gemName
            $to = Join-Path $build $gemName
            if (!(Test-Path $from)) {
              Write-Error "Source download failed: missing Ruby-GNOME gem source $from."
              exit 1
            }
            Copy-Item $from $to -Recurse -Force
          }
          Copy-Item $cairoRoot (Join-Path $build 'cairo') -Recurse -Force

          $sourceGemPackages = @{
            'cairo' = $cairoGem
          }
          foreach ($gemName in $sourceGemPackages.Keys) {
            $gemDir = Join-Path $build $gemName
            $gemspec = Join-Path $gemDir "$gemName.gemspec"
            if (Test-Path $gemspec) {
              Write-Host "Source normalization: $gemName already provides $gemspec"
              continue
            }

            $gemPackage = $sourceGemPackages[$gemName]
            if (!(Test-Path $gemPackage)) {
              Write-Error "Source normalization failed: fetched gem package for $gemName is missing at $gemPackage."
              exit 1
            }
            if (!(Test-Path $gemDir)) {
              Write-Error "Source normalization failed: source directory for $gemName is missing at $gemDir."
              exit 1
            }

            $normalizeScript = @(
              'require "rubygems/package"',
              'gem_package, gemspec_path = ARGV',
              'spec = Gem::Package.new(gem_package).spec',
              'File.write(gemspec_path, spec.to_ruby)'
            ) -join "`n"
            $normalizeScriptPath = Join-Path $env:RUNNER_TEMP "normalize-$gemName-gemspec.rb"
            Set-Content -Path $normalizeScriptPath -Value $normalizeScript -Encoding ascii
            & $env:RUBY_EXE $normalizeScriptPath $gemPackage $gemspec
            if ($LASTEXITCODE -ne 0 -or !(Test-Path $gemspec)) {
              Write-Error "Source normalization failed: could not generate $gemspec from $gemPackage."
              exit 1
            }
            Write-Host "Source normalization: generated $gemspec from $gemPackage"
          }

      - name: Prepare native gems (classify, normalize, patch -- Ruby, not ad-hoc PowerShell)
        shell: powershell
        run: |
          $sourceRoot = $env:SOURCE_ROOT
          $platform = $env:GEM_PLATFORM
          # ruby-installer-version looks like 4.0.5-1; ruby_abi is just the series (4.0).
          $rubyAbi = ($env:RUBY_INSTALLER_VERSION -replace '^(\d+\.\d+)\..*$', '$1')
          $planPath = Join-Path $env:RUNNER_TEMP 'native-gems-plan.json'
          $script = Join-Path $env:GITHUB_WORKSPACE 'bin\prepare_native_gems.rb'

          # gtk3's own dependency closure already includes every native gem this suite
          # builds (glib2, gobject-introspection, gio2, cairo, cairo-gobject, pango,
          # gdk_pixbuf2, atk, gdk3) -- verified directly by resolving it for real against
          # rubygems.org, not assumed. Requesting gtk3 here replaces what used to be a
          # hand-maintained, hardcoded gem list with real dependency resolution.
          #
          # RubygemsClient has no built-in retry/backoff (confirmed by reading it) -- this
          # step's resolution/download traffic all goes out over the real network, so wrap
          # the invocation itself rather than push retry logic into the library for what's
          # fundamentally a CI-transient-network concern, not a client-correctness one.
          #
          # Exit 2 from the script is its own documented "deterministic, do not retry"
          # signal (IncompleteClosureError/UnbuildableGemError/NormalizationError/
          # PatchError/GenerationError --
          # see bin/prepare_native_gems.rb's own header comment) -- retrying one of those
          # just re-runs the same check against the same already-downloaded bytes three
          # times, burning the backoff window for a result that can't change. Only exit 1
          # (ResolutionError, or anything unrecognized) is worth another attempt.
          $maxAttempts = 3
          $attempt = 0
          do {
            $attempt++
            & $env:RUBY_EXE $script gtk3 $env:RUBY_GNOME_VERSION $platform $rubyAbi $sourceRoot $planPath
            $exitCode = $LASTEXITCODE
            if ($exitCode -eq 2) {
              break
            }
            if ($exitCode -ne 0 -and $attempt -lt $maxAttempts) {
              $backoffSeconds = 5 * $attempt
              Write-Host "::warning::Native gem preparation failed (exit $exitCode), attempt $attempt/$maxAttempts -- retrying in ${backoffSeconds}s (rubygems.org resolution/download can hit transient network errors)."
              Start-Sleep -Seconds $backoffSeconds
            }
          } while ($exitCode -ne 0 -and $attempt -lt $maxAttempts)
          if ($exitCode -ne 0) {
            $reason = if ($exitCode -eq 2) { 'deterministic failure, not retried' } else { "failed after $attempt attempt(s)" }
            Write-Error "Native gem preparation failed (exit $exitCode, $reason)."
            exit $exitCode
          }
          if (!(Test-Path $planPath)) {
            Write-Error "Native gem preparation did not produce a plan at $planPath."
            exit 1
          }

          # The build steps below (~line 700+) still build a hardcoded GTK3 gem list.
          # Item 7a's own scope was always narrower than that -- the DLL-vendoring/
          # discovery half (which gems get the closure copied into, see the plan-driven
          # $vendoringRoots further down in "Build GTK3 binary gem suite") -- and that
          # part has landed. *Which gems get compiled* in the first place was
          # deliberately deferred, real but separate follow-on work; this guard is
          # the stopgap that shipped instead. Until that generalization happens, the
          # *native_self_contained* subset of the plan and that hardcoded build list
          # must agree exactly, or the workflow could silently build a gem the planner
          # never classified/patched (or skip one it did). Fail loudly on drift instead
          # of trusting them to stay in sync by hand.
          #
          # Deliberately filtered to native_self_contained only, not every plan
          # entry: BuildPlanner#plan_for resolves gtk3's *full* dependency closure,
          # which includes real but non-actionable members too -- pure gems
          # (rake, pkg-config, matrix, red-colors, native-package-installer) and,
          # as of 2026-07-07, gems that ship as Ruby default gems already present
          # in the target install (json, fiddle -- see RubyBundledGems). None of
          # those need building here; comparing the whole plan against the
          # 10-gem hardcoded list would fail on their presence for no real reason.
          $planGems = [System.Collections.Generic.SortedSet[string]]::new([StringComparer]::OrdinalIgnoreCase)
          (Get-Content $planPath -Raw | ConvertFrom-Json) |
            Where-Object { $_.state -eq 'native_self_contained' } |
            ForEach-Object { [void] $planGems.Add($_.name) }
          $hardcodedBuildGems = [System.Collections.Generic.SortedSet[string]]::new(
            [string[]] @('glib2', 'gobject-introspection', 'gio2', 'cairo', 'cairo-gobject', 'pango', 'gdk_pixbuf2', 'atk', 'gdk3', 'gtk3'),
            [StringComparer]::OrdinalIgnoreCase
          )
          if (-not $planGems.SetEquals($hardcodedBuildGems)) {
            $missing = @($hardcodedBuildGems | Where-Object { -not $planGems.Contains($_) })
            $extra = @($planGems | Where-Object { -not $hardcodedBuildGems.Contains($_) })
            Write-Error "Native gems plan's native_self_contained set no longer matches this workflow's hardcoded GTK3 build list. Missing from plan (still hardcoded below but not classified/patched): $($missing -join ', '); in plan but not built below: $($extra -join ', ')."
            exit 1
          }

          "NATIVE_GEMS_PLAN=$planPath" | Out-File $env:GITHUB_ENV -Append -Encoding utf8
          Write-Host "::group::Native gems build plan"
          Get-Content $planPath | Write-Host
          Write-Host "::endgroup::"

      - name: Upload native gems build plan (debug info -- survives the runner)
        uses: actions/upload-artifact@330a01c490aca151604b8cf639adc76d48f6c5d4 # v5.0.0
        with:
          name: native-gems-build-plan
          path: ${{ env.NATIVE_GEMS_PLAN }}
          if-no-files-found: error

      - name: Build GTK3 binary gem suite
        shell: powershell
        env:
          PATH: ${{ steps.lanepath.outputs.path }}
        run: |
          $msys = $env:MSYS2_ROOT
          $prefix = $env:MSYS2_PREFIX
          $rubyRoot = $env:RUBY_ROOT
          $rubyExe = $env:RUBY_EXE
          $gemExe = $env:GEM_EXE
          $sourceRoot = $env:SOURCE_ROOT
          $pkgDir = $env:PKG_DIR
          $harnessRoot = Join-Path $env:RUNNER_TEMP 'ruby4-bundled-gems\harness'
          $harnessGems = Join-Path $harnessRoot 'gems'
          if (Test-Path $harnessRoot) {
            Remove-Item $harnessRoot -Recurse -Force
          }
          New-Item -ItemType Directory -Path $harnessGems -Force | Out-Null
          Copy-Item (Join-Path $env:GITHUB_WORKSPACE 'Rakefile') $harnessRoot -Force
          Copy-Item (Join-Path $sourceRoot '*') $harnessGems -Recurse -Force
          $sourceRoot = $harnessGems

          $env:Path = "$rubyRoot\bin;$msys\$prefix\bin;$msys\usr\bin;$env:Path"
          $env:RI_DEVKIT = $msys
          $env:MSYSTEM_PREFIX = "/$prefix"
          $env:MINGW_PREFIX = "/$prefix"
          $env:CC = Join-Path $msys "$prefix\bin\gcc.exe"
          # GNU make is usr\bin\make.exe; UCRT provides mingw32-make.exe.
          # Match the resolution used in "Resolve native build surface", with
          # forward slashes so the path survives MSYS sh during gem builds.
          if (Test-Path "$msys\usr\bin\make.exe") {
            $env:MAKE = "$msys\usr\bin\make.exe"
          } else {
            $env:MAKE = "$msys\$prefix\bin\mingw32-make.exe"
          }
          $env:MAKE = $env:MAKE -replace '\\', '/'
          $env:PKG_CONFIG = Join-Path $msys "$prefix\bin\pkg-config.exe"
          $env:PKG_CONFIG_PATH = "$msys\$prefix\lib\pkgconfig;$msys\lib\pkgconfig"
          $env:RCAIRO_SOURCE_DIR = Join-Path $sourceRoot 'cairo'
          $env:BINARY_GEM = 'true'
          $env:KEEP_BUILT_EXTENSIONS = 'true'

          Write-Host "::group::GTK3 native build preflight"
          Write-Host "RUBY_EXE=$rubyExe"
          Write-Host "CC=$env:CC"
          Write-Host "MAKE=$env:MAKE"
          Write-Host "PKG_CONFIG=$env:PKG_CONFIG"
          Write-Host "PKG_CONFIG_PATH=$env:PKG_CONFIG_PATH"
          where.exe ruby
          where.exe gcc
          where.exe make
          where.exe pkg-config
          & $rubyExe -rrbconfig -e 'puts "RbConfig CC=#{RbConfig::CONFIG[''CC'']}"; puts "RbConfig LDSHARED=#{RbConfig::CONFIG[''LDSHARED'']}"; puts "RbConfig CFLAGS=#{RbConfig::CONFIG[''CFLAGS'']}"'
          & $env:PKG_CONFIG --modversion gtk+-3.0 gobject-introspection-1.0 glib-2.0 gobject-2.0 gio-2.0 cairo pango
          Write-Host "::endgroup::"

          & $gemExe install rake pkg-config native-package-installer
          if ($LASTEXITCODE -ne 0) {
            Write-Error "Build failed: prerequisite build gems could not install."
            exit $LASTEXITCODE
          }

          $probeDir = Join-Path $env:RUNNER_TEMP 'ruby4-bundled-gems\mkmf-probe'
          if (Test-Path $probeDir) {
            Remove-Item $probeDir -Recurse -Force
          }
          New-Item -ItemType Directory -Path $probeDir -Force | Out-Null
          $probeScript = Join-Path $probeDir 'probe.rb'
          @(
            'require "mkmf"',
            'abort("mkmf compile probe failed") unless try_compile("int main(void) { return 0; }")',
            'puts "mkmf compile probe OK"'
          ) | Set-Content -Path $probeScript -Encoding ascii
          Push-Location $probeDir
          & $rubyExe $probeScript
          $probeExit = $LASTEXITCODE
          if ($probeExit -ne 0 -and $env:DIAGNOSTIC_MKMF_LOGS -eq 'true' -and (Test-Path (Join-Path $probeDir 'mkmf.log'))) {
            Write-Host "::group::mkmf probe log"
            Get-Content (Join-Path $probeDir 'mkmf.log') -Raw
            Write-Host "::endgroup::"
          }
          Pop-Location
          if ($probeExit -ne 0) {
            Write-Error "Build failed: Ruby mkmf could not compile a trivial executable with the resolved native build surface."
            exit $probeExit
          }

          $objdump = Join-Path $msys "$prefix\bin\objdump.exe"
          $prefixBin = Join-Path $msys "$prefix\bin"

          function Invoke-Checked([string] $message, [scriptblock] $block) {
            & $block
            if ($LASTEXITCODE -ne 0) {
              if ($env:DIAGNOSTIC_MKMF_LOGS -eq 'true' -and $harnessRoot -and (Test-Path $harnessRoot)) {
                $logs = @(Get-ChildItem -Path $harnessRoot -Recurse -Filter mkmf.log -File -ErrorAction SilentlyContinue)
                foreach ($log in $logs) {
                  Write-Host "::group::mkmf log: $($log.FullName)"
                  Get-Content $log.FullName -Raw
                  Write-Host "::endgroup::"
                }
              }
              Write-Error "$message failed with exit code $LASTEXITCODE."
              exit $LASTEXITCODE
            }
          }

          function Get-DllDependencies([string] $path) {
            if (!(Test-Path $path)) {
              return @()
            }
            @(& $objdump -p $path 2>$null |
              Select-String -Pattern 'DLL Name:\s*(.+)$' |
              ForEach-Object { $_.Matches[0].Groups[1].Value.Trim() } |
              Where-Object { -not [string]::IsNullOrWhiteSpace($_) } |
              Sort-Object -Unique)
          }

          # Curated known-good baseline, verified directly against the real reference
          # build's logs (Lich5/lich5-gtk3-gems run 27508683541): every DLL the closure
          # walker below has ever seen outside the MSYS2 ucrt64 lane, case-insensitive.
          # All 44 are core Win32 libraries and api-ms-win-crt-* Universal CRT api-set
          # forwarders -- nothing gem-specific. A match is silent (genuinely benign,
          # OS-provided, per docs/DECISIONS.md Phase 5 section 3); a miss still gets reported,
          # just once per build instead of once per occurrence -- 711 near-identical
          # notice lines otherwise, all noise, burying any real signal.
          $knownSystemDlls = [System.Collections.Generic.HashSet[string]]::new(
            [string[]] @(
              'advapi32.dll', 'api-ms-win-core-synch-l1-2-0.dll', 'api-ms-win-crt-conio-l1-1-0.dll',
              'api-ms-win-crt-convert-l1-1-0.dll', 'api-ms-win-crt-environment-l1-1-0.dll',
              'api-ms-win-crt-filesystem-l1-1-0.dll', 'api-ms-win-crt-heap-l1-1-0.dll',
              'api-ms-win-crt-locale-l1-1-0.dll', 'api-ms-win-crt-math-l1-1-0.dll',
              'api-ms-win-crt-multibyte-l1-1-0.dll', 'api-ms-win-crt-private-l1-1-0.dll',
              'api-ms-win-crt-process-l1-1-0.dll', 'api-ms-win-crt-runtime-l1-1-0.dll',
              'api-ms-win-crt-stdio-l1-1-0.dll', 'api-ms-win-crt-string-l1-1-0.dll',
              'api-ms-win-crt-time-l1-1-0.dll', 'api-ms-win-crt-utility-l1-1-0.dll',
              'bcrypt.dll', 'bcryptprimitives.dll', 'comctl32.dll', 'comdlg32.dll', 'dnsapi.dll',
              'dwmapi.dll', 'dwrite.dll', 'gdi32.dll', 'gdiplus.dll', 'hid.dll', 'imm32.dll',
              'iphlpapi.dll', 'kernel32.dll', 'msimg32.dll', 'ntdll.dll', 'ole32.dll',
              'opengl32.dll', 'rpcrt4.dll', 'setupapi.dll', 'shell32.dll', 'shlwapi.dll',
              'user32.dll', 'userenv.dll', 'usp10.dll', 'winmm.dll', 'winspool.drv', 'ws2_32.dll'
            ),
            [StringComparer]::OrdinalIgnoreCase
          )
          $unrecognizedSystemDlls = [System.Collections.Generic.SortedSet[string]]::new([StringComparer]::OrdinalIgnoreCase)

          $runtimeDlls = [System.Collections.Hashtable]::new([StringComparer]::OrdinalIgnoreCase)
          function Add-DllClosure([string] $dllName) {
            if ([string]::IsNullOrWhiteSpace($dllName)) {
              return
            }
            $dllPath = Join-Path $prefixBin $dllName
            if (!(Test-Path $dllPath)) {
              if (-not $knownSystemDlls.Contains($dllName)) {
                [void] $unrecognizedSystemDlls.Add($dllName)
              }
              return
            }
            if ($runtimeDlls.ContainsKey($dllName)) {
              return
            }
            $runtimeDlls[$dllName] = $dllPath
            foreach ($dependency in Get-DllDependencies $dllPath) {
              Add-DllClosure $dependency
            }
          }

          function Add-DllDependenciesFromPath([string] $path) {
            foreach ($dependency in Get-DllDependencies $path) {
              Add-DllClosure $dependency
            }
          }

          # Real dependency subset for a vendoring root that isn't glib2 --
          # glib2 alone is load-bearing for the dynamically-loaded typelib/
          # gdk-pixbuf-loader discovery earlier in this step (see the comment
          # on $vendoringRoots below), so it keeps the full aggregate
          # closure; every other root gets only its own real static-import
          # chain, walked from its own primary DLL. Deliberately scoped to
          # $knownDlls (the already-computed, already-vetted full closure)
          # rather than re-running objdump against the filesystem -- the
          # scoped result is always a subset of the already-proven-correct
          # full set, never a novel/unverified DLL. Real fix, 2026-07-09 --
          # see docs/PUNCHLIST-remaining-work.md for the measured 43MB
          # duplication this addresses.
          function Get-ScopedDllClosure([string] $rootDllPath, [hashtable] $knownDlls) {
            $scoped = [System.Collections.Generic.HashSet[string]]::new([StringComparer]::OrdinalIgnoreCase)
            $queue = [System.Collections.Generic.Queue[string]]::new()
            $queue.Enqueue((Split-Path $rootDllPath -Leaf))
            while ($queue.Count -gt 0) {
              $current = $queue.Dequeue()
              if ($scoped.Contains($current)) {
                continue
              }
              if (-not $knownDlls.ContainsKey($current)) {
                continue
              }
              [void] $scoped.Add($current)
              foreach ($dependency in (Get-DllDependencies $knownDlls[$current])) {
                $queue.Enqueue($dependency)
              }
            }
            return $scoped
          }

          function Build-GemWithHarness([string] $gemName) {
            Write-Host "::group::Build $gemName"
            Push-Location $harnessRoot
            Invoke-Checked "$gemName binary gem build harness" { & $rubyExe -I. -e "require 'rake'; Rake.application.load_rakefile; Rake::Task['build:gem'].invoke('$gemName')" }
            $builtGem = Get-ChildItem -Path (Join-Path $harnessRoot 'pkg') -Filter "$gemName-*.gem" -File |
              Where-Object { $_.Name -match "^$([regex]::Escape($gemName))-\d" } |
              Sort-Object LastWriteTime -Descending |
              Select-Object -First 1
            if (-not $builtGem) {
              Pop-Location
              Write-Error "Build failed: no gem artifact was produced for $gemName."
              exit 1
            }
            Copy-Item $builtGem.FullName (Join-Path $pkgDir $builtGem.Name) -Force
            Invoke-Checked "$gemName local install" { & $gemExe install $builtGem.FullName --local --force }
            Pop-Location
            Write-Host "::endgroup::"
          }

          foreach ($gemName in @('glib2', 'gobject-introspection')) {
            Build-GemWithHarness $gemName
          }

          $env:GI_TYPELIB_PATH = "$msys\$prefix\lib\girepository-1.0"
          $gIrInspect = Join-Path $prefixBin 'g-ir-inspect.exe'
          Get-ChildItem "$msys\$prefix\lib\girepository-1.0" -Filter '*.typelib' -File |
            ForEach-Object {
              $namespace = $_.BaseName -replace '-[0-9][0-9.]*$', ''
              $shlibs = @(& $gIrInspect --print-shlibs $namespace 2>$null)
              if ($LASTEXITCODE -eq 0) {
                foreach ($line in $shlibs) {
                  foreach ($match in [regex]::Matches($line, '[A-Za-z0-9_+.-]+\.dll')) {
                    Add-DllClosure $match.Value
                  }
                }
              }
            }
          foreach ($pattern in @('libgirepository*.dll', 'libglib-2.0-0.dll', 'libgobject-2.0-0.dll', 'libgio-2.0-0.dll', 'libgmodule-2.0-0.dll', 'libgtk-3-0.dll', 'libgdk-3-0.dll', 'libgdk_pixbuf-2.0-0.dll', 'libatk-1.0-0.dll', 'libpango*.dll', 'libcairo*.dll')) {
            Get-ChildItem -Path $prefixBin -Filter $pattern -File -ErrorAction SilentlyContinue |
              ForEach-Object { Add-DllClosure $_.Name }
          }

          foreach ($requiredRuntimeDll in @('libgdk_pixbuf-2.0-0.dll', 'libgtk-3-0.dll')) {
            if (-not $runtimeDlls.ContainsKey($requiredRuntimeDll)) {
              Write-Error "Build failed: expected runtime DLL $requiredRuntimeDll was not discovered in the GTK/GI closure."
              exit 1
            }
          }

          $giVendor = Join-Path $sourceRoot 'gobject-introspection\vendor\local'
          $typelibDst = Join-Path $giVendor 'lib\girepository-1.0'
          $fontDst = Join-Path $giVendor 'etc\fonts'
          $loaderDst = Join-Path $giVendor 'lib\gdk-pixbuf-2.0\2.10.0\loaders'
          New-Item -ItemType Directory -Path $typelibDst, $fontDst, $loaderDst -Force | Out-Null
          Copy-Item "$msys\$prefix\lib\girepository-1.0\*.typelib" $typelibDst -Force
          Copy-Item "$msys\$prefix\etc\fonts\fonts.conf" $fontDst -Force
          if (Test-Path "$msys\$prefix\etc\fonts\conf.d") {
            Copy-Item "$msys\$prefix\etc\fonts\conf.d" (Join-Path $fontDst 'conf.d') -Recurse -Force
          }

          $loaderSrc = "$msys\$prefix\lib\gdk-pixbuf-2.0\2.10.0\loaders"
          if (Test-Path $loaderSrc) {
            Get-ChildItem -Path $loaderSrc -Filter '*.dll' -File |
              ForEach-Object {
                Copy-Item $_.FullName $loaderDst -Force
                Add-DllDependenciesFromPath $_.FullName
              }
            $cacheDst = Split-Path $loaderDst -Parent
            $env:GDK_PIXBUF_MODULEDIR = $loaderDst
            & "$msys\$prefix\bin\gdk-pixbuf-query-loaders.exe" | Set-Content (Join-Path $cacheDst 'loaders.cache.in')
            (Get-Content (Join-Path $cacheDst 'loaders.cache.in') -Raw).Replace($loaderDst, '@@MODULEDIR@@') |
              Set-Content (Join-Path $cacheDst 'loaders.cache.in') -Encoding ascii
          }

          if ($unrecognizedSystemDlls.Count -gt 0) {
            Write-Host "::notice::$($unrecognizedSystemDlls.Count) DLL dependency(ies) outside the MSYS2 ucrt64 lane and not on the known-good system list (docs/DECISIONS.md Phase 5 section 3) -- assumed system-provided, but worth a human look: $($unrecognizedSystemDlls -join ', ')"
          }

          # Vendoring targets come from the plan's vendoring_role (item 7a),
          # not a hardcoded list -- for the real GTK3 stack this resolves to
          # exactly glib2+cairo today (VendoringRoleClassifier's own spec
          # locks that in against the real closure shape), same two gems
          # this loop named directly before.
          #
          # glib2 keeps the full aggregate $runtimeDlls closure -- it's
          # load-bearing for the dynamically-loaded typelib/gdk-pixbuf-loader
          # discovery above in a way a naive per-gem static-import walk could
          # silently miss (those DLLs are loaded by name at runtime, not
          # linked at compile time, so they'd never show up in any gem's own
          # static import table). Every other root gets Get-ScopedDllClosure's
          # real static-import subset instead of the full set -- confirmed
          # real, measured ~43MB duplication this removes (see
          # docs/PUNCHLIST-remaining-work.md). Deliberately not "glib2's
          # closure minus cairo's" or any other clever derivation -- cairo
          # must remain independently resolvable even if glib2 never loads
          # first in a given process (a cairo-only usage without the rest of
          # the GTK stack is a real, supported scenario), so its own closure
          # is walked from its own real DLL, not inferred from glib2's.
          #
          # Verified against real MSYS2 binaries (real objdump, not
          # assumed): libcairo-gobject-2.dll ships as a *sibling* DLL inside
          # the same cairo package, not a dependency reachable by walking
          # libcairo-2.dll's own import table (confirmed: the reverse is
          # true -- libcairo-gobject-2.dll imports libcairo-2.dll, not the
          # other way around). cairo's own scoped closure here does not
          # include it. That's safe only because glib2's unchanged full
          # closure already picks it up via the existing wildcard
          # 'libcairo*.dll' glob seed further up this step, and the real
          # cairo-gobject patch (patches/cairo-gobject/require-abi.rb)
          # registers no search path of its own -- it depends entirely on
          # cairo and glib2 having already prepended theirs, with glib2
          # guaranteed to load first. If glib2 is ever removed from this
          # vendoring-root set, this stops being true and needs
          # re-verifying. libcairo-script-interpreter-2.dll (the other
          # sibling in the same package) is unreferenced anywhere in
          # ruby-gnome's own source -- confirmed via GitHub code search,
          # not assumed -- and needs no coverage at all.
          $vendoringRoots = @(
            (Get-Content $env:NATIVE_GEMS_PLAN -Raw | ConvertFrom-Json) |
              Where-Object { $_.vendoring_role -eq 'vendoring_root' } |
              ForEach-Object { $_.name }
          )
          if ($vendoringRoots.Count -eq 0) {
            Write-Error "Vendoring failed: no vendoring_root gems found in the native gems plan."
            exit 1
          }

          $requiredLoadsManifest = [ordered]@{}
          foreach ($target in $vendoringRoots) {
            $targetRoot = Join-Path $sourceRoot $target
            if (!(Test-Path $targetRoot)) {
              Write-Error "Vendoring failed: plan named '$target' as a vendoring root, but its source directory is missing at $targetRoot."
              exit 1
            }
            $binTarget = Join-Path $targetRoot 'vendor\local\bin'
            New-Item -ItemType Directory -Path $binTarget -Force | Out-Null

            if ($target -eq 'glib2') {
              $dllNames = @($runtimeDlls.Keys | Sort-Object)
            } else {
              # Exact, not "first alphabetical match" -- real bug, found and
              # fixed 2026-07-09: lib$target*.dll alone also matches sibling
              # DLLs shipped in the same package (cairo's own package ships
              # libcairo-gobject-2.dll and libcairo-script-interpreter-2.dll
              # alongside libcairo-2.dll, confirmed directly). Relying on
              # Select-Object -First 1's incidental ordering to land on the
              # right one isn't a real guarantee. MSYS2's own real naming
              # convention for a primary shared-library DLL is
              # lib<name>-<digits...>.dll -- a version number immediately
              # after the hyphen -- which a sibling like "-gobject-" or
              # "-script-interpreter-" never matches, so this anchors on
              # that instead of enumeration order.
              $rootDllPattern = "^lib$([regex]::Escape($target))-\d.*\.dll$"
              $rootDllFile = Get-ChildItem -Path $prefixBin -Filter "lib$target*.dll" -File |
                Where-Object { $_.Name -match $rootDllPattern } |
                Sort-Object Name |
                Select-Object -First 1
              if (-not $rootDllFile) {
                Write-Error "Vendoring failed: could not find $target's own primary DLL (pattern $rootDllPattern) in $prefixBin to scope its closure."
                exit 1
              }
              $dllNames = @((Get-ScopedDllClosure $rootDllFile.FullName $runtimeDlls) | Sort-Object)
              if ($dllNames.Count -eq 0) {
                Write-Error "Vendoring failed: scoped closure for $target (from $($rootDllFile.Name)) came back empty."
                exit 1
              }
            }

            foreach ($dll in $dllNames) {
              Copy-Item $runtimeDlls[$dll] $binTarget -Force
            }
            $requiredLoadsManifest[$target] = $dllNames
          }

          $requiredLoadsPath = Join-Path $env:RUNNER_TEMP 'required-loads-manifest.json'
          $requiredLoadsManifest | ConvertTo-Json -Depth 4 | Set-Content -Path $requiredLoadsPath -Encoding utf8
          "REQUIRED_LOADS_MANIFEST=$requiredLoadsPath" | Out-File $env:GITHUB_ENV -Append -Encoding utf8
          Write-Host "::group::Required loads manifest (which DLLs were vendored into which root gem)"
          Get-Content $requiredLoadsPath | Write-Host
          Write-Host "::endgroup::"

          foreach ($gemName in @('gobject-introspection', 'glib2')) {
            Push-Location (Join-Path $sourceRoot $gemName)
            Invoke-Checked "$gemName rebuild with vendor assets" { & $gemExe build "$gemName.gemspec" }
            $rebuilt = Get-ChildItem -Filter "$gemName-*.gem" -File | Sort-Object LastWriteTime -Descending | Select-Object -First 1
            Copy-Item $rebuilt.FullName (Join-Path $pkgDir $rebuilt.Name) -Force
            Invoke-Checked "$gemName reinstall with vendor assets" { & $gemExe install $rebuilt.FullName --local --force }
            Pop-Location
          }

          foreach ($gemName in @('gio2', 'cairo', 'cairo-gobject', 'pango', 'gdk_pixbuf2', 'atk', 'gdk3', 'gtk3')) {
            Build-GemWithHarness $gemName
          }

      - name: Upload required loads manifest (debug info -- survives the runner)
        uses: actions/upload-artifact@330a01c490aca151604b8cf639adc76d48f6c5d4 # v5.0.0
        with:
          name: required-loads-manifest
          path: ${{ env.REQUIRED_LOADS_MANIFEST }}
          if-no-files-found: error

      - name: Build and stage runtime gem bundle
        shell: powershell
        env:
          PATH: ${{ steps.lanepath.outputs.path }}
        run: |
          $msys = $env:MSYS2_ROOT
          $prefix = $env:MSYS2_PREFIX
          $rubyRoot = $env:RUBY_ROOT
          $gemExe = $env:GEM_EXE
          $rubyExe = $env:RUBY_EXE
          $pkgDir = $env:PKG_DIR
          $env:Path = "$rubyRoot\bin;$msys\$prefix\bin;$msys\usr\bin;$env:Path"
          $env:RI_DEVKIT = $msys
          $env:MSYSTEM_PREFIX = "/$prefix"
          $env:MINGW_PREFIX = "/$prefix"

          $runtimeGems = @(
            ($env:RUNTIME_GEMS -split '[,\s]+') |
              Where-Object { -not [string]::IsNullOrWhiteSpace($_) } |
              Sort-Object -Unique
          )
          $nativeRuntimeGems = @(
            ($env:NATIVE_RUNTIME_GEMS -split '[,\s]+') |
              Where-Object { -not [string]::IsNullOrWhiteSpace($_) } |
              Sort-Object -Unique
          )
          foreach ($gemName in $nativeRuntimeGems) {
            if ($runtimeGems -notcontains $gemName) {
              Write-Error "Runtime bundle failed: native runtime gem $gemName is not present in runtime-gems."
              exit 1
            }
          }

          Push-Location $pkgDir
          foreach ($gemName in $runtimeGems) {
            & $gemExe install $gemName --clear-sources --source https://rubygems.org --force
            if ($LASTEXITCODE -ne 0) {
              Pop-Location
              Write-Error "Runtime bundle failed: gem install $gemName failed."
              exit $LASTEXITCODE
            }
          }
          Pop-Location

          foreach ($gemName in @('ox', 'curses')) {
            if ($runtimeGems -notcontains $gemName) {
              continue
            }
            $repackScript = @(
              'require "fileutils"',
              'require "rubygems"',
              'gem_name = ARGV.fetch(0)',
              'platform = ENV.fetch("GEM_PLATFORM")',
              'spec = Gem::Specification.find_by_name(gem_name)',
              'parent = File.join(ENV.fetch("RUNNER_TEMP"), "native-repack")',
              'target = File.join(parent, "#{spec.name}-#{spec.version}")',
              'FileUtils.rm_rf(target)',
              'FileUtils.mkdir_p(parent)',
              'FileUtils.cp_r("#{spec.full_gem_path}/.", target)',
              'Dir.chdir(target) do',
              '  repack = spec.dup',
              '  repack.platform = Gem::Platform.new(platform)',
              '  repack.extensions = []',
              '  repack.files = Dir.glob("**/*", File::FNM_DOTMATCH).reject { |path| path == "." || path == ".." || File.directory?(path) || path.end_with?(".gem") }',
              '  File.write("#{gem_name}.gemspec", repack.to_ruby)',
              'end',
              'puts target',
              'puts spec.version'
            ) -join "`n"
            $repackScriptPath = Join-Path $env:RUNNER_TEMP "repack-$gemName.rb"
            Set-Content -Path $repackScriptPath -Value $repackScript -Encoding ascii
            $metadata = @(& $rubyExe $repackScriptPath $gemName)
            if ($LASTEXITCODE -ne 0 -or $metadata.Count -lt 2) {
              Write-Error "Runtime bundle failed: native repack preparation failed for $gemName."
              exit 1
            }
            $repackDir = $metadata[0].Trim()
            $repackVersion = $metadata[1].Trim()
            Push-Location $repackDir
            & $gemExe build "$gemName.gemspec"
            if ($LASTEXITCODE -ne 0) {
              Pop-Location
              Write-Error "Runtime bundle failed: native repack gem build failed for $gemName."
              exit $LASTEXITCODE
            }
            $repackedGem = Get-ChildItem -Path $repackDir -Filter "$gemName-$repackVersion-$env:GEM_PLATFORM.gem" -File | Select-Object -First 1
            if (-not $repackedGem) {
              Pop-Location
              Write-Error "Runtime bundle failed: expected repacked gem $gemName-$repackVersion-$env:GEM_PLATFORM.gem was not produced."
              exit 1
            }
            Copy-Item $repackedGem.FullName (Join-Path $pkgDir $repackedGem.Name) -Force
            & $gemExe install $repackedGem.FullName --local --force
            if ($LASTEXITCODE -ne 0) {
              Pop-Location
              Write-Error "Runtime bundle failed: local install failed for repacked $($repackedGem.Name)."
              exit $LASTEXITCODE
            }
            Pop-Location
          }

          $runtimeGemExcludes = @(
            'benchmark',
            'bigdecimal',
            'debug',
            'fiddle',
            'irb',
            'minitest',
            'native-package-installer',
            'nkf',
            'pkg-config',
            'power_assert',
            'racc',
            'rake',
            'rbs',
            'rdoc',
            'reline',
            'repl_type_completor',
            'test-unit',
            'typeprof',
            'win32ole'
          )
          $env:RUNTIME_GEM_EXCLUDES = $runtimeGemExcludes -join ' '

          $manifestScript = @(
            'require "rubygems"',
            'require "set"',
            'requested = ENV.fetch("RUNTIME_GEMS").split(/[,\s]+/).reject(&:empty?)',
            'excluded = ENV.fetch("RUNTIME_GEM_EXCLUDES").split(/[,\s]+/).reject(&:empty?).to_set',
            'queue = requested.dup',
            'selected = {}',
            'until queue.empty?',
            '  name = queue.shift',
            '  next if name.nil? || name.empty? || excluded.include?(name)',
            '  specs = Gem::Specification.find_all_by_name(name)',
            '  spec = specs.reject(&:default_gem?).max_by(&:version) || specs.max_by(&:version)',
            '  abort("runtime gem manifest failed: installed gem #{name.inspect} was not found") unless spec',
            '  next if spec.default_gem? || excluded.include?(spec.name) || selected.key?(spec.name)',
            '  selected[spec.name] = spec',
            '  spec.runtime_dependencies.each { |dependency| queue << dependency.name unless excluded.include?(dependency.name) || selected.key?(dependency.name) }',
            'end',
            'selected.values.sort_by(&:name).each { |spec| puts [spec.name, spec.version.to_s, spec.full_name].join("\t") }'
          ) -join "`n"
          $manifestScriptPath = Join-Path $env:RUNNER_TEMP 'runtime-gem-manifest.rb'
          Set-Content -Path $manifestScriptPath -Value $manifestScript -Encoding ascii
          $manifestRows = @(& $rubyExe $manifestScriptPath)
          if ($LASTEXITCODE -ne 0) {
            Write-Error "Runtime bundle failed: runtime gem manifest generation failed."
            exit $LASTEXITCODE
          }

          # Ask Ruby itself for its gem-cache ABI directory name (e.g. "4.0.0")
          # rather than deriving it from $env:RUBY_INSTALLER_VERSION -- RubyGems
          # names this directory after RbConfig::CONFIG['ruby_version'], which is
          # always X.Y.0 regardless of the exact patch/teeny version, and asking
          # the real running Ruby is the one source that can't drift out of sync
          # with a second ABI series (e.g. 3.4.x) if one is ever added alongside
          # today's 4.0.x.
          $rubyAbiDir = & $rubyExe -e "print RbConfig::CONFIG['ruby_version']"
          if ($LASTEXITCODE -ne 0 -or [string]::IsNullOrWhiteSpace($rubyAbiDir)) {
            Write-Error "Runtime bundle failed: could not determine Ruby's gem-cache ABI directory name."
            exit 1
          }

          $cacheRoots = @(
            (Join-Path $rubyRoot "lib\ruby\gems\$rubyAbiDir\cache"),
            (Join-Path $env:USERPROFILE ".local\share\gem\ruby\$rubyAbiDir\cache")
          ) | Where-Object { Test-Path $_ } | Sort-Object -Unique
          $manifestFiles = [System.Collections.Generic.List[string]]::new()
          foreach ($gemName in @('glib2', 'gobject-introspection', 'gio2', 'cairo', 'cairo-gobject', 'pango', 'gdk_pixbuf2', 'atk', 'gdk3', 'gtk3')) {
            $platformGem = Get-ChildItem -Path $pkgDir -Filter "$gemName-*.gem" -File |
              Where-Object { $_.Name -match "^$([regex]::Escape($gemName))-\d" } |
              Sort-Object LastWriteTime -Descending |
              Select-Object -First 1
            if (-not $platformGem) {
              Write-Error "Runtime bundle failed: expected prebuilt package gem $gemName was not found in pkg."
              exit 1
            }
            $manifestFiles.Add($platformGem.Name)
          }

          foreach ($row in $manifestRows) {
            if ([string]::IsNullOrWhiteSpace($row)) {
              continue
            }
            $parts = $row -split "`t"
            $gemName = $parts[0]
            $fullName = $parts[2]
            $fileName = "$fullName.gem"
            $existingPkgGem = Join-Path $pkgDir $fileName
            if (Test-Path $existingPkgGem) {
              $manifestFiles.Add($fileName)
              continue
            }
            $sourceGem = $null
            foreach ($cacheRoot in $cacheRoots) {
              $candidate = Join-Path $cacheRoot $fileName
              if (Test-Path $candidate) {
                $sourceGem = $candidate
                break
              }
            }
            if (-not $sourceGem) {
              Write-Error "Runtime bundle failed: manifest selected $fileName for $gemName, but no matching .gem file was found in pkg or RubyGems cache."
              exit 1
            }
            Copy-Item $sourceGem (Join-Path $pkgDir $fileName) -Force
            $manifestFiles.Add($fileName)
          }

          $manifestFiles = @($manifestFiles | Sort-Object -Unique)
          foreach ($excluded in $runtimeGemExcludes) {
            $escaped = [regex]::Escape($excluded)
            $matches = @($manifestFiles | Where-Object { $_ -match "^$escaped-\d" })
            if ($matches.Count -gt 0) {
              Write-Error "Runtime bundle failed: excluded package gem $excluded was selected for shipping: $($matches -join ', ')"
              exit 1
            }
          }

          Set-Content -Path (Join-Path $pkgDir 'runtime-gems-manifest.txt') -Value $manifestFiles -Encoding ascii
          Set-Content -Path (Join-Path $pkgDir 'runtime-gems-install-targets.txt') -Value $runtimeGems -Encoding ascii
          $installScript = @(
            '@echo off',
            'setlocal',
            'pushd "%~dp0"',
            'for /f "usebackq delims=" %%G in ("runtime-gems-install-targets.txt") do (',
            '  gem install --local --no-document "%%G"',
            '  if errorlevel 1 exit /b 1',
            ')',
            'popd',
            'endlocal'
          ) -join "`r`n"
          Set-Content -Path (Join-Path $pkgDir 'install-runtime-gems.cmd') -Value $installScript -Encoding ascii

          foreach ($gemName in $nativeRuntimeGems) {
            $platformGem = Get-ChildItem -Path $pkgDir -Filter "$gemName-*$env:GEM_PLATFORM.gem" -File |
              Where-Object { $_.Name -match "^$([regex]::Escape($gemName))-\d.*-$([regex]::Escape($env:GEM_PLATFORM))\.gem$" } |
              Sort-Object LastWriteTime -Descending |
              Select-Object -First 1
            if (-not $platformGem) {
              Write-Error "Runtime bundle failed: $gemName installed, but no $env:GEM_PLATFORM binary gem was collected in pkg."
              exit 1
            }
          }

      # Relays the built gem bundle to the smoke job below, which runs on its own
      # fresh VM (per docs/DECISIONS.md Phase 5 section 6 -- separate jobs are separate
      # runners, so $GITHUB_ENV/the filesystem can't carry state across the
      # boundary the way they do between steps in the same job). Short retention:
      # this only ever needs to survive from the end of this job to the start of
      # the next one, minutes apart within the same run -- distinct from the real,
      # 90-day-retention final artifact the smoke job uploads once it's done.
      - name: Upload packaged runtime gem bundle (intermediate, cross-job relay)
        uses: actions/upload-artifact@330a01c490aca151604b8cf639adc76d48f6c5d4 # v5.0.0
        with:
          name: ruby4-bundled-gems-pkg-dir-intermediate
          path: pkg/*
          retention-days: 1
          if-no-files-found: error

  smoke_ruby4_bundled_gems_suite:
    name: Smoke packaged Ruby4 bundled gems suite (windows-ucrt64)
    needs: build_ruby4_bundled_gems_suite
    runs-on: windows-latest
    timeout-minutes: 30

    # Deliberately no write permissions and no GH_TOKEN in this job -- it
    # installs and requires freshly built/upstream gem code (the smoke test
    # below), which is untrusted code execution. A write-capable release
    # token sitting in the environment during that step would be reachable
    # by anything malicious a compromised gem managed to run. Publishing
    # happens in a separate job below, downstream of a passing smoke test,
    # with its own narrowly-scoped token -- real finding, fixed 2026-07-09.
    env:
      RUBY_INSTALLER_VERSION: ${{ inputs.ruby-installer-version }}
      PKG_DIR: ${{ github.workspace }}\pkg

    steps:
      - name: Download packaged runtime gem bundle
        uses: actions/download-artifact@634f93cb2916e3fdff6788551b99b062d0335ce0 # v5.0.0
        with:
          name: ruby4-bundled-gems-pkg-dir-intermediate
          path: pkg

      - name: Smoke packaged runtime gem bundle on clean RubyInstaller
        shell: powershell
        run: |
          $pkgDir = $env:PKG_DIR
          $manifestPath = Join-Path $pkgDir 'runtime-gems-manifest.txt'
          $installTargetsPath = Join-Path $pkgDir 'runtime-gems-install-targets.txt'
          if (!(Test-Path $manifestPath) -or !(Test-Path $installTargetsPath)) {
            Write-Error "Clean packaged smoke failed: manifest or install targets missing from $pkgDir."
            exit 1
          }

          # This job runs on its own fresh VM (docs/DECISIONS.md Phase 5 section 6), so
          # unlike when this step ran in the same job as the initial RubyInstaller
          # download, there is nothing already cached at $env:RUNNER_TEMP to
          # extract -- download it directly instead.
          $rubyInstallerVersion = $env:RUBY_INSTALLER_VERSION
          $archive = Join-Path $env:RUNNER_TEMP "rubyinstaller-$rubyInstallerVersion-x64.7z"
          $url = "https://github.com/oneclick/rubyinstaller2/releases/download/RubyInstaller-$rubyInstallerVersion/rubyinstaller-$rubyInstallerVersion-x64.7z"
          Invoke-WebRequest -Uri $url -OutFile $archive -UseBasicParsing -TimeoutSec 60
          if (!(Test-Path $archive)) {
            Write-Error "Clean packaged smoke failed: RubyInstaller download failed; expected archive $archive was not created."
            exit 1
          }

          $smokeParent = 'C:\Ruby4Lich5\clean-smoke-ruby'
          if (Test-Path $smokeParent) {
            Remove-Item $smokeParent -Recurse -Force
          }
          New-Item -ItemType Directory -Path $smokeParent -Force | Out-Null

          $sevenZip = "${env:ProgramFiles}\7-Zip\7z.exe"
          if (!(Test-Path $sevenZip)) {
            $sevenZip = '7z.exe'
          }
          & $sevenZip x $archive "-o$smokeParent" -y
          if ($LASTEXITCODE -ne 0) {
            Write-Error "Clean packaged smoke failed: RubyInstaller extraction failed."
            exit $LASTEXITCODE
          }

          $rubyExe = Get-ChildItem $smokeParent -Recurse -Filter ruby.exe -File | Where-Object {
            $_.FullName -match '\\bin\\ruby\.exe$'
          } | Select-Object -First 1
          if (-not $rubyExe) {
            Write-Error "Clean packaged smoke failed: ruby.exe was not found under $smokeParent."
            exit 1
          }
          $rubyRoot = Split-Path (Split-Path $rubyExe.FullName -Parent) -Parent
          $gemExe = Join-Path $rubyRoot 'bin\gem.cmd'
          $env:Path = "$rubyRoot\bin;C:\Windows\System32;C:\Windows;C:\Windows\System32\Wbem;C:\Windows\System32\WindowsPowerShell\v1.0"
          foreach ($name in @('RI_DEVKIT', 'MSYSTEM', 'MSYSTEM_PREFIX', 'MINGW_PREFIX', 'PKG_CONFIG_PATH', 'GI_TYPELIB_PATH', 'GDK_PIXBUF_MODULEDIR', 'FONTCONFIG_PATH', 'FONTCONFIG_FILE')) {
            Remove-Item "Env:\$name" -ErrorAction SilentlyContinue
          }

          $manifestFiles = @(Get-Content $manifestPath | Where-Object { -not [string]::IsNullOrWhiteSpace($_) })
          foreach ($manifestFile in $manifestFiles) {
            if (!(Test-Path (Join-Path $pkgDir $manifestFile))) {
              Write-Error "Clean packaged smoke failed: manifest gem is missing: $manifestFile."
              exit 1
            }
          }

          $installTargets = @(Get-Content $installTargetsPath | Where-Object { -not [string]::IsNullOrWhiteSpace($_) })
          Push-Location $pkgDir
          & $gemExe install --local --no-document --force @installTargets
          $installExit = $LASTEXITCODE
          Pop-Location
          if ($installExit -ne 0) {
            Write-Error "Clean packaged smoke failed: install targets failed on non-DevKit RubyInstaller."
            exit $installExit
          }

          $fontconfigSmoke = @(
            'require "rubygems"',
            'require "gobject-introspection"',
            'specs = Gem::Specification.find_all_by_name("gobject-introspection")',
            'abort("gobject-introspection 4.3.4 was installed unexpectedly") if specs.any? { |spec| spec.version.to_s == "4.3.4" }',
            'spec = Gem::Specification.find_by_name("gobject-introspection")',
            'fontconfig_file = ENV["FONTCONFIG_FILE"]',
            'abort("FONTCONFIG_FILE was not set") if fontconfig_file.nil? || fontconfig_file.empty?',
            'abort("FONTCONFIG_FILE contains stale gobject-introspection 4.3.4 path: #{fontconfig_file}") if fontconfig_file.include?("gobject-introspection-4.3.4")',
            'expected = File.join(spec.full_gem_path, "vendor", "local", "etc", "fonts", "fonts.conf")',
            'abort("FONTCONFIG_FILE mismatch: expected #{expected}, got #{fontconfig_file}") unless File.expand_path(fontconfig_file) == File.expand_path(expected)',
            'abort("Fontconfig file missing: #{expected}") unless File.exist?(expected)',
            'puts "gobject-introspection Fontconfig file OK: #{fontconfig_file}"'
          ) -join "`n"
          $fontconfigSmokePath = Join-Path $env:RUNNER_TEMP 'smoke-gobject-fontconfig.rb'
          Set-Content -Path $fontconfigSmokePath -Value $fontconfigSmoke -Encoding ascii
          & $rubyExe.FullName $fontconfigSmokePath
          if ($LASTEXITCODE -ne 0) {
            Write-Error "Clean packaged smoke failed: gobject-introspection Fontconfig validation failed."
            exit $LASTEXITCODE
          }

          # This require set prints "Unsupported PangoCairo function:
          # layout_path_for_components" to stderr -- confirmed real, deliberate
          # upstream ruby-gnome behavior, not a failure (verified directly
          # against ruby-gnome's own source, pango/lib/pango/cairo-loader.rb,
          # PangoCairo::Loader#load_function_info): it walks every function the
          # real PangoCairo GIR typelib exports and auto-generates a Ruby
          # method for names matching known prefixes (context_get_*, create_*,
          # names ending in _path, etc.); anything that doesn't match just gets
          # a warn() and is skipped, not raised. layout_path_for_components has
          # _for_components appended after _path, so it doesn't match the
          # "ends in _path" pattern and falls through. The C function itself
          # works fine; nothing in Lich or this project calls it. Investigated
          # and confirmed benign 2026-07-09, not chased further (upstream
          # ruby-gnome's own binding-generation logic, not ours to patch).
          & $rubyExe.FullName -e "require 'sqlite3'; require 'ox'; require 'ffi'; require 'ascii_charts'; require 'kramdown'; require 'webrick'; require 'redis'; require 'sequel'; require 'set'; require 'terminal-table'; require 'tzinfo'; require 'curses'; require 'os'; require 'cairo'; require 'gtk3'; Gtk.init; puts 'Clean packaged Ruby4/Lich runtime smoke OK'"
          if ($LASTEXITCODE -ne 0) {
            Write-Error "Clean packaged smoke failed: runtime require set failed."
            exit $LASTEXITCODE
          }

      - name: Stage artifact
        shell: powershell
        run: |
          $pkgDir = $env:PKG_DIR
          $distPkg = Join-Path $env:GITHUB_WORKSPACE 'dist\pkg'
          if (Test-Path $distPkg) {
            Remove-Item $distPkg -Recurse -Force
          }
          New-Item -ItemType Directory -Path $distPkg -Force | Out-Null

          foreach ($file in @(Get-Content (Join-Path $pkgDir 'runtime-gems-manifest.txt'))) {
            if ([string]::IsNullOrWhiteSpace($file)) {
              continue
            }
            Copy-Item (Join-Path $pkgDir $file) (Join-Path $distPkg $file) -Force
          }
          Copy-Item (Join-Path $pkgDir 'runtime-gems-manifest.txt') (Join-Path $distPkg 'runtime-gems-manifest.txt') -Force
          Copy-Item (Join-Path $pkgDir 'runtime-gems-install-targets.txt') (Join-Path $distPkg 'runtime-gems-install-targets.txt') -Force
          Copy-Item (Join-Path $pkgDir 'install-runtime-gems.cmd') (Join-Path $distPkg 'install-runtime-gems.cmd') -Force

      - name: Upload Ruby4 bundled gems
        uses: actions/upload-artifact@330a01c490aca151604b8cf639adc76d48f6c5d4 # v5.0.0
        with:
          name: ruby4-bundled-gems-windows-ucrt64
          path: dist/pkg/*
          retention-days: 90
          if-no-files-found: error

  # Separate job, downstream of a passing smoke test, so the write-capable
  # release token never coexists with untrusted gem code execution (the smoke
  # job above installs/requires freshly built and upstream gem code -- real
  # finding, fixed 2026-07-09: contents: write and GH_TOKEN used to sit in
  # that same job's environment). Downloads the same staged artifact the
  # smoke job already produced rather than re-deriving anything.
  publish_ruby4_bundled_gems_suite:
    name: Publish Ruby4 bundled gems and gem bundle (windows-ucrt64)
    needs: smoke_ruby4_bundled_gems_suite
    runs-on: windows-latest
    timeout-minutes: 15

    # gh release upload --clobber is delete-then-upload, not atomic (already
    # true and documented below) -- two workflow_dispatch runs publishing
    # concurrently can race on the same tag (guaranteed for the bundle tag,
    # which isn't parameterized by build inputs at all; possible for an
    # individual gem tag whenever two runs happen to produce the same
    # upstream version), corrupting an in-flight upload or failing the
    # digest check with a mismatch that isn't actually a bug. Job-scoped
    # (not workflow-scoped) so a second run's expensive build+smoke stages
    # aren't blocked by this -- only the publish step itself needs to be
    # serialized. Queues rather than cancels: cancel-in-progress would
    # interrupt a clobber mid-upload, reintroducing the exact non-atomicity
    # this exists to prevent.
    #
    # Deliberately NOT scoped by ${{ github.ref }} -- real bug, found and
    # fixed 2026-07-09: the release tags being clobbered (R4L5-<gem>-
    # <version>-<platform>, R4L5-gem-bundle-<platform>) are computed purely
    # from gem name/version/platform, never from which branch triggered the
    # build. A ref-scoped group only serializes dispatches from the *same*
    # branch -- a dispatch from main and a dispatch from any other branch
    # would still get different groups and race on the exact same tags,
    # defeating the whole point of this block. Fixed group name instead,
    # global across every branch. Platform included for when a second
    # platform lane exists someday; hardcoded rather than read from env,
    # since concurrency `group:` expressions don't have access to a job's
    # own env context.
    concurrency:
      group: publish-ruby4-bundled-gems-suite-x64-mingw-ucrt
      cancel-in-progress: false

    permissions:
      contents: write

    env:
      GEM_PLATFORM: x64-mingw-ucrt
      GH_TOKEN: ${{ github.token }}
      GH_REPO: ${{ github.repository }}
      NATIVE_RUNTIME_GEMS: ${{ inputs.native-runtime-gems }}

    steps:
      - name: Download staged runtime gem bundle
        uses: actions/download-artifact@634f93cb2916e3fdff6788551b99b062d0335ce0 # v5.0.0
        with:
          name: ruby4-bundled-gems-windows-ucrt64
          path: dist/pkg

      # Publishes only after the clean-install smoke test already passed --
      # never a gem that merely compiled. Per docs/PUNCHLIST-remaining-work.md's
      # locked naming convention: one current artifact per gem,
      # R4L5-<name>-<upstream-version>-<platform>, overwritten in place
      # (gh release upload --clobber) rather than an incrementing vNNN. No
      # draft/review gate here deliberately -- these are the "current,
      # smoke-tested" tier; the real gate on whether a given build is
      # *authoritative* is the not-yet-built manifest's own PR-gated
      # promotion (Doug's call, 2026-07-09), not a second gate duplicated
      # here. The bundle step below is different -- it's the one artifact the
      # installer actually consumes, so it keeps a human draft/promote step,
      # same as the installer release itself.
      #
      # Asset filenames carry the R4L5- prefix too, not just the release tag
      # (real finding, fixed 2026-07-09) -- the built file on disk is still
      # plain RubyGems naming (glib2-4.3.6-x64-mingw-ucrt.gem), copied to a
      # renamed path before upload so what a consumer actually downloads
      # matches the locked convention exactly.
      - name: Publish native gems (R4L5-<name>-<upstream-version>-<platform>)
        shell: powershell
        run: |
          $pkgDir = Join-Path $env:GITHUB_WORKSPACE 'dist\pkg'
          $platform = $env:GEM_PLATFORM
          $sha = $env:GITHUB_SHA
          $escapedPlatform = [regex]::Escape($platform)

          # Same fixed 10-gem GTK3-stack list already used twice elsewhere in this
          # file (the drift-check guard, the rebuild-after-vendoring step) -- not
          # a new abstraction, the existing convention.
          $gtk3StackGems = @('glib2', 'gobject-introspection', 'gio2', 'cairo', 'cairo-gobject', 'pango', 'gdk_pixbuf2', 'atk', 'gdk3', 'gtk3')
          $nativeRuntimeGems = @(
            ($env:NATIVE_RUNTIME_GEMS -split '[,\s]+') | Where-Object { -not [string]::IsNullOrWhiteSpace($_) }
          )
          $nativeGemNames = @($gtk3StackGems + $nativeRuntimeGems | Sort-Object -Unique)

          foreach ($gemName in $nativeGemNames) {
            $escaped = [regex]::Escape($gemName)
            $pattern = "^$escaped-(?<version>\d[\w.]*)-$escapedPlatform\.gem$"
            $gemFile = Get-ChildItem -Path $pkgDir -Filter "$gemName-*$platform.gem" -File |
              Where-Object { $_.Name -match $pattern } |
              Sort-Object LastWriteTime -Descending |
              Select-Object -First 1
            if (-not $gemFile) {
              Write-Error "Publish failed: no built .gem file found for native gem $gemName (pattern $pattern) in $pkgDir."
              exit 1
            }
            $version = [regex]::Match($gemFile.Name, $pattern).Groups['version'].Value
            if ([string]::IsNullOrWhiteSpace($version)) {
              Write-Error "Publish failed: could not parse an upstream version out of $($gemFile.Name)."
              exit 1
            }

            $tag = "R4L5-$gemName-$version-$platform"
            $publishName = "$tag.gem"
            $publishPath = Join-Path $env:RUNNER_TEMP $publishName
            Copy-Item $gemFile.FullName $publishPath -Force
            $localSha = (Get-FileHash -Path $publishPath -Algorithm SHA256).Hash.ToLowerInvariant()

            # try/catch, not *> $null -- GitHub Actions' shell: powershell runs
            # with $ErrorActionPreference = 'Stop', which promotes a native
            # command's stderr output (gh's own "release not found" here, the
            # normal/expected outcome on first publish) to a terminating
            # exception immediately, before $LASTEXITCODE is ever checked.
            # Stream redirection doesn't prevent that promotion; only
            # try/catch does. Real bug, found live 2026-07-09 -- local pwsh
            # syntax validation couldn't have caught this, it's a runtime
            # semantic difference, not a parse error.
            $tagExists = $true
            try {
              gh release view $tag --json tagName | Out-Null
            } catch {
              $tagExists = $false
            }
            if ($tagExists) {
              gh release upload $tag $publishPath --clobber
              if ($LASTEXITCODE -ne 0) {
                Write-Error "Publish failed: gh release upload --clobber failed for $tag."
                exit $LASTEXITCODE
              }
              gh release edit $tag --target $sha
              if ($LASTEXITCODE -ne 0) {
                Write-Error "Publish failed: could not update target commitish for $tag."
                exit $LASTEXITCODE
              }
            } else {
              $notes = "Built by Ruby4Lich5, commit $sha. The R4L5- prefix signals this gem was compiled/patched/vendored (or, for a pass-through gem, vetted and re-hosted as-is) by this factory -- see docs/PUNCHLIST-remaining-work.md, 'Gem/bundle naming convention -- LOCKED 2026-07-09'. This tag is a single current artifact, overwritten in place on rebuild, not an incrementing version -- verify by SHA-256 digest, not by trusting the tag alone."
              gh release create $tag $publishPath --title "$gemName $version ($platform)" --notes $notes --target $sha
              if ($LASTEXITCODE -ne 0) {
                Write-Error "Publish failed: gh release create failed for $tag."
                exit $LASTEXITCODE
              }
            }

            # Retries only on an empty digest, not on a populated-but-different
            # one -- real gap, found and fixed 2026-07-09: GitHub's asset
            # digest metadata isn't guaranteed to be populated the instant an
            # upload call returns, so reading it back immediately could come
            # back empty and get misread as a mismatch when the upload
            # actually succeeded. A genuine mismatch (both values present,
            # disagreeing) still fails immediately below, not retried away.
            $remoteDigest = $null
            for ($digestAttempt = 1; $digestAttempt -le 5; $digestAttempt++) {
              $remoteDigest = (gh release view $tag --json assets --jq ".assets[] | select(.name == ""$publishName"") | .digest") -replace '^sha256:', ''
              if (-not [string]::IsNullOrWhiteSpace($remoteDigest)) {
                break
              }
              Start-Sleep -Seconds 2
            }
            if ([string]::IsNullOrWhiteSpace($remoteDigest)) {
              Write-Error "Publish failed: $tag's $publishName asset had no digest after 5 attempts -- GitHub's asset metadata may not have finished processing."
              exit 1
            }
            if ($remoteDigest -ne $localSha) {
              Write-Error "Publish failed: digest mismatch for $tag -- local $localSha, remote $remoteDigest. Upload may be corrupted -- gh release upload --clobber is delete-then-upload, not atomic."
              exit 1
            }
            Remove-Item $publishPath -Force
            Write-Host "Published $tag (sha256:$localSha, commit $sha)"
          }

      # The bundle is the one artifact the installer actually consumes, so unlike
      # individual gems above it keeps a human review/promote step -- same
      # pattern already used for the installer release itself (Doug: "create me
      # a DRAFT release... I'll review it, move it from draft and then snag it
      # and test it"). First publish under the new naming scheme creates the
      # live tag as a draft, same as the installer. Once that tag exists (already
      # promoted by a prior run), this workflow never touches it again directly
      # -- it publishes to a separate "candidate" prerelease instead, so a
      # passing-but-unreviewed rebuild can never silently overwrite an
      # already-reviewed live bundle. Promoting candidate -> live is a deliberate
      # human action (gh release upload <live-tag> <file> --clobber), same
      # command Doug already uses today, not automated here.
      - name: Publish gem bundle (draft on first publish, candidate thereafter)
        shell: powershell
        run: |
          $distPkg = Join-Path $env:GITHUB_WORKSPACE 'dist\pkg'
          $platform = $env:GEM_PLATFORM
          $sha = $env:GITHUB_SHA
          $liveTag = "R4L5-gem-bundle-$platform"
          $candidateTag = "R4L5-gem-bundle-$platform-candidate"
          $zipName = "R4L5-gem-bundle-$platform.zip"
          $zipPath = Join-Path $env:RUNNER_TEMP $zipName

          if (Test-Path $zipPath) {
            Remove-Item $zipPath -Force
          }
          Compress-Archive -Path (Join-Path $distPkg '*') -DestinationPath $zipPath -CompressionLevel Optimal
          if (-not (Test-Path $zipPath)) {
            Write-Error "Publish failed: bundle zip $zipPath was not created."
            exit 1
          }
          $localSha = (Get-FileHash -Path $zipPath -Algorithm SHA256).Hash.ToLowerInvariant()

          # try/catch, not *> $null -- see the same real fix and reasoning in
          # "Publish native gems" above (GitHub Actions' shell: powershell
          # promotes a native command's stderr to a terminating exception
          # under $ErrorActionPreference = 'Stop', which redirection alone
          # doesn't prevent).
          $liveTagExists = $true
          try {
            gh release view $liveTag --json tagName | Out-Null
          } catch {
            $liveTagExists = $false
          }
          if ($liveTagExists) {
            $tag = $candidateTag
            $candidateTagExists = $true
            try {
              gh release view $tag --json tagName | Out-Null
            } catch {
              $candidateTagExists = $false
            }
            if ($candidateTagExists) {
              gh release upload $tag $zipPath --clobber
              if ($LASTEXITCODE -ne 0) {
                Write-Error "Publish failed: gh release upload --clobber failed for $tag."
                exit $LASTEXITCODE
              }
              gh release edit $tag --target $sha
              if ($LASTEXITCODE -ne 0) {
                Write-Error "Publish failed: could not update target commitish for $tag."
                exit $LASTEXITCODE
              }
            } else {
              $notes = "Built by Ruby4Lich5, commit $sha. Candidate for promotion to $liveTag -- review and test before promoting (gh release upload $liveTag $zipName --clobber). Single current artifact, overwritten in place on rebuild -- verify by SHA-256 digest, not by trusting the tag alone."
              gh release create $tag $zipPath --title "Gem bundle candidate ($platform)" --notes $notes --target $sha --prerelease
              if ($LASTEXITCODE -ne 0) {
                Write-Error "Publish failed: gh release create failed for $tag."
                exit $LASTEXITCODE
              }
            }
          } else {
            $tag = $liveTag
            $notes = "Built by Ruby4Lich5, commit $sha. Draft -- review and test before publishing (gh release edit $liveTag --draft=false). Single current artifact, overwritten in place on rebuild, not an incrementing version -- verify by SHA-256 digest, not by trusting the tag alone."
            gh release create $tag $zipPath --title "Gem bundle ($platform)" --notes $notes --target $sha --draft
            if ($LASTEXITCODE -ne 0) {
              Write-Error "Publish failed: gh release create failed for $tag."
              exit $LASTEXITCODE
            }
          }

          # Same retry-on-empty-only fix as the individual-gem publish step above.
          $remoteDigest = $null
          for ($digestAttempt = 1; $digestAttempt -le 5; $digestAttempt++) {
            $remoteDigest = (gh release view $tag --json assets --jq ".assets[] | select(.name == ""$zipName"") | .digest") -replace '^sha256:', ''
            if (-not [string]::IsNullOrWhiteSpace($remoteDigest)) {
              break
            }
            Start-Sleep -Seconds 2
          }
          if ([string]::IsNullOrWhiteSpace($remoteDigest)) {
            Write-Error "Publish failed: $tag's $zipName asset had no digest after 5 attempts -- GitHub's asset metadata may not have finished processing."
            exit 1
          }
          if ($remoteDigest -ne $localSha) {
            Write-Error "Publish failed: digest mismatch for $tag -- local $localSha, remote $remoteDigest. Upload may be corrupted -- gh release upload --clobber is delete-then-upload, not atomic."
            exit 1
          }
          Write-Host "Published $tag (sha256:$localSha, commit $sha)"
