# Inherited from Lich5/lich5-gtk3-gems (2026-06-14) as the seed for the Ruby4Lich5
# "front door" (Phase 2 of ROADMAP-woven-plan.md): a fixed monolithic build of one named
# suite (GTK3), being generalized into "name any gem -> classify -> build -> publish".
#
# The classify/patch/normalize decisions are now Ruby, not ad-hoc PowerShell -- see
# "Prepare native gems" below, calling bin/prepare_native_gems.rb
# (Ruby4Lich5::NativeGemPreparer, backed by Classifier/ClosureResolver/BuildPlanner/
# GemspecNormalizer/PatchApplier, all tested). The glib2-gc-repair input this used to
# have is gone -- PatchApplier's curated patches (glib2/property-retention-fix.rb,
# gobject-introspection/gc-compact-safety-fix.rb) apply unconditionally now, no flag
# needed, matching every other native gem's patches falling out cleanly when none exist.
#
# Still NOT generalized: MSYS2 package installation and the actual native compile below
# still target the fixed GTK3 stack directly, not the JSON plan's own msys2_packages per
# gem -- full "any named gem" generalization of the compile step itself is separate,
# larger, future work, not done in this pass.
#
# item 7a (2026-07-08): the DLL-vendoring *target list* (which gems get the discovered
# runtime-DLL closure copied into their own vendor/local/bin) is now plan-driven --
# read from each entry's vendoring_role (Ruby4Lich5::VendoringRoleClassifier, via
# NativeGemPreparer) instead of a hardcoded @('glib2', 'cairo'). For the real GTK3 stack
# this resolves to the same two gems as before -- deliberately behavior-preserving, not
# a size optimization. Every root still gets the *same full* discovered DLL closure
# copied in, same as before generalizing the list itself; scoping each root down to only
# its own real dependency subset (cairo doesn't need the whole GNOME closure) is real,
# separate follow-on work, not done here -- see docs/PUNCHLIST-remaining-work.md.
#
# upload-artifact/download-artifact bumped to v5 as part of this rewrite (matching the
# checkout@v5 already used below) -- was v4 (Node 20; lich5-gtk3-gems never got the fix
# elanthia-online/lich-5's own CI already had).
name: Build Ruby4 Bundled Gems Suite

on:
  workflow_dispatch:
    inputs:
      ruby-installer-version:
        description: "RubyInstaller UCRT archive version, for example 4.0.5-1."
        required: false
        default: "4.0.5-1"
      ruby-gnome-version:
        description: "Ruby-GNOME suite version to build from upstream source -- also gtk3's own root version for dynamic resolution (F2)."
        required: false
        default: "4.3.6"
      runtime-gems:
        description: "Top-level Lich runtime gems to install from the staged local bundle."
        required: false
        default: "gtk3 sqlite3 ox ascii_charts curses os redis sequel terminal-table kramdown tzinfo tzinfo-data concurrent-ruby ffi webrick"
      diagnostic-mkmf-logs:
        description: "Dump mkmf.log files when native compilation fails."
        required: false
        default: false
        type: boolean

permissions:
  contents: read

jobs:
  build_ruby4_bundled_gems_suite:
    name: Build Ruby4 bundled gems suite (windows-ucrt64)
    runs-on: windows-latest
    timeout-minutes: 90

    # Handed to the smoke job below so it can verify its own independently
    # downloaded RubyInstaller archive against the exact same digest this
    # job already resolved, without needing a GH_TOKEN of its own.
    outputs:
      ruby-archive-url: ${{ steps.ruby-digest.outputs.url }}
      ruby-archive-digest: ${{ steps.ruby-digest.outputs.digest }}

    env:
      MSYSTEM: UCRT64
      MSYS2_PREFIX: ucrt64
      MSYS2_PACKAGE_PREFIX: mingw-w64-ucrt-x86_64
      GEM_PLATFORM: x64-mingw-ucrt

    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Validate inputs
        shell: powershell
        env:
          RUBY_INSTALLER_VERSION_INPUT: ${{ inputs.ruby-installer-version }}
          RUBY_GNOME_VERSION_INPUT: ${{ inputs.ruby-gnome-version }}
          RUNTIME_GEMS_INPUT: ${{ inputs.runtime-gems }}
          DIAGNOSTIC_MKMF_LOGS_INPUT: ${{ inputs.diagnostic-mkmf-logs }}
        run: |
          # Read via $env:, not spliced directly into the script text as a quoted
          # expression -- a single quote in a workflow_dispatch input could
          # otherwise break out of the string and inject arbitrary PowerShell
          # before any of the validation below ever runs.
          #
          # cairo-version/native-runtime-gems retired (F2) -- cairo is
          # never an independent root (docs/DECISIONS.md, F1's own
          # DefaultRootSelection), its version comes from the resolved
          # gtk3 closure alone; native delivery role is derived from the
          # resolved lock's own classifications (bin/resolve_bundle_lock.rb),
          # not a separate hand-maintained list.
          $rubyInstallerVersion = $env:RUBY_INSTALLER_VERSION_INPUT
          $rubyGnomeVersion = $env:RUBY_GNOME_VERSION_INPUT
          $runtimeGems = $env:RUNTIME_GEMS_INPUT
          $diagnosticMkmfLogs = $env:DIAGNOSTIC_MKMF_LOGS_INPUT

          if ($rubyInstallerVersion -notmatch '^\d+\.\d+\.\d+-\d+$') {
            Write-Error "ruby-installer-version must look like N.N.N-N, for example 4.0.5-1; received '$rubyInstallerVersion'."
            exit 1
          }
          if ($rubyGnomeVersion -notmatch '^\d+\.\d+\.\d+$') {
            Write-Error "ruby-gnome-version must look like N.N.N; received '$rubyGnomeVersion'."
            exit 1
          }
          if ([string]::IsNullOrWhiteSpace($runtimeGems)) {
            Write-Error "runtime-gems must list at least one top-level runtime gem."
            exit 1
          }
          if ($diagnosticMkmfLogs -notin @('true', 'false')) {
            Write-Error "diagnostic-mkmf-logs must be true or false; received '$diagnosticMkmfLogs'."
            exit 1
          }

          # Comma-separated, for bin/resolve_bundle_lock.rb's own
          # documented runtime_gems_csv argument -- the space-separated
          # dispatch input is this workflow's own format, reformatted
          # here rather than asking that CLI to guess a delimiter.
          $runtimeGemsCsv = (($runtimeGems -split '\s+') | Where-Object { $_ }) -join ','

          "RUBY_INSTALLER_VERSION=$rubyInstallerVersion" | Out-File $env:GITHUB_ENV -Append -Encoding utf8
          "RUBY_GNOME_VERSION=$rubyGnomeVersion" | Out-File $env:GITHUB_ENV -Append -Encoding utf8
          "RUNTIME_GEMS=$runtimeGems" | Out-File $env:GITHUB_ENV -Append -Encoding utf8
          "RUNTIME_GEMS_CSV=$runtimeGemsCsv" | Out-File $env:GITHUB_ENV -Append -Encoding utf8
          "DIAGNOSTIC_MKMF_LOGS=$diagnosticMkmfLogs" | Out-File $env:GITHUB_ENV -Append -Encoding utf8

      # Single source of truth for the MSYS2/MinGW toolchain. The whole job
      # is keyed off this install via steps.msys2.outputs.msys2-location, so
      # there is no second pacman pass into a separate C:\msys64 root.
      # pacman prints "warning: dependency cycle detected" for libwebp/libtiff
      # and harfbuzz/freetype during this step -- confirmed real, longstanding,
      # upstream MSYS2 package-metadata quirk (same exact libwebp/libtiff pair
      # shows up across multiple real msys2/MSYS2-packages and msys2/MINGW-
      # packages GitHub issues), not anything in this build. Non-fatal --
      # pacman picks an install order anyway and every later step depending on
      # these packages succeeds. Scoped entirely to this build machine's own
      # package manager; the shipped product never runs pacman at all, it only
      # ever receives already-compiled .dll files loaded via Windows' own PE
      # loader -- a completely different mechanism with no shared failure
      # mode. Investigated and confirmed benign 2026-07-09, not chased further
      # (upstream MSYS2's own package graph, not ours to fix).
      # F2's "resolve once" cutover (docs/DECISIONS.md, extended) -- a
      # dedicated, self-contained RubyInstaller bootstrap just for the
      # resolution step below, separate from the main toolchain bootstrap
      # further down ("Download, verify, and extract RubyInstaller") that
      # the rest of this job's compile/stage steps use. Deliberately not
      # a reorder of that existing step: this job's later steps have real,
      # already-working interdependencies on its own env var names and
      # position, and duplicating a small, cheap bootstrap here is far
      # lower-risk than restructuring steps that already work. Mirrors
      # msys2-package-list-diagnostic.yml's own already-proven pattern
      # exactly (F1) -- resolve once, under a real bootstrapped target
      # Ruby, before any MSYS2 toolchain exists at all.
      #
      # GH_TOKEN scoped to just this step -- every step after it executes
      # externally sourced code (the downloaded RubyInstaller, then
      # rubygems.org's own resolution traffic) and has no business
      # holding a repo-scoped token while doing it.
      - name: Resolve RubyInstaller release digest (for dynamic bundle resolution)
        id: resolve-ruby-digest
        shell: powershell
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $rubyInstallerVersion = $env:RUBY_INSTALLER_VERSION
          $tag = "RubyInstaller-$rubyInstallerVersion"
          $archiveName = "rubyinstaller-$rubyInstallerVersion-x64.7z"

          $apiOutput = gh api "repos/oneclick/rubyinstaller2/releases/tags/$tag" 2>&1
          if ($LASTEXITCODE -ne 0) {
            Write-Error "gh api failed for release $tag -- $apiOutput"
            exit 1
          }
          $rel = $apiOutput | ConvertFrom-Json
          $asset = $rel.assets | Where-Object { $_.name -eq $archiveName }
          if (-not $asset) {
            Write-Error "Asset $archiveName not found on release $tag."
            exit 1
          }
          if ($asset.digest -notmatch '^sha256:[0-9a-f]{64}$') {
            Write-Error "RubyInstaller release $tag returned a missing or malformed digest for $archiveName -- got '$($asset.digest)'."
            exit 1
          }

          "RESOLVE_RUBY_ARCHIVE_URL=$($asset.browser_download_url)" | Out-File $env:GITHUB_ENV -Append -Encoding utf8
          "RESOLVE_RUBY_ARCHIVE_DIGEST=$($asset.digest)" | Out-File $env:GITHUB_ENV -Append -Encoding utf8

      - name: Download, verify, and extract RubyInstaller (for dynamic bundle resolution)
        shell: powershell
        run: |
          $rubyParent = Join-Path $env:RUNNER_TEMP 'resolve-bundle-ruby'
          $archive = Join-Path $env:RUNNER_TEMP "resolve-rubyinstaller-$env:RUBY_INSTALLER_VERSION-x64.7z"

          New-Item -ItemType Directory -Path $rubyParent -Force | Out-Null

          . (Join-Path $env:GITHUB_WORKSPACE 'verify-archive-download.ps1')
          try {
            Invoke-VerifiedDownload -Url $env:RESOLVE_RUBY_ARCHIVE_URL -ExpectedDigest $env:RESOLVE_RUBY_ARCHIVE_DIGEST -DestinationPath $archive | Out-Null
          } catch {
            Write-Error "RubyInstaller download/verification failed: $($_.Exception.Message)"
            exit 1
          }

          $sevenZip = "${env:ProgramFiles}\7-Zip\7z.exe"
          if (!(Test-Path $sevenZip)) {
            $sevenZip = '7z.exe'
          }
          & $sevenZip x $archive "-o$rubyParent" -y
          if ($LASTEXITCODE -ne 0) {
            Write-Error "RubyInstaller extraction failed."
            exit $LASTEXITCODE
          }

          $rubyExe = Get-ChildItem $rubyParent -Recurse -Filter ruby.exe -File | Where-Object {
            $_.FullName -match '\\bin\\ruby\.exe$'
          } | Select-Object -First 1
          if (-not $rubyExe) {
            Write-Error "RubyInstaller extraction failed: ruby.exe was not found under $rubyParent."
            exit 1
          }

          & $rubyExe.FullName --version
          if ($LASTEXITCODE -ne 0) {
            Write-Error "RubyInstaller validation failed: ruby.exe could not run."
            exit $LASTEXITCODE
          }

          "RESOLVE_BUNDLE_RUBY_EXE=$($rubyExe.FullName)" | Out-File $env:GITHUB_ENV -Append -Encoding utf8

      # The one real resolve pass this whole job depends on -- every
      # later decision step (native prep, runtime staging, revalidation)
      # consumes this lock, never re-resolving. See
      # bin/resolve_bundle_lock.rb's own header comment for the full
      # exit-code contract and why this is a separate CLI from F1's own
      # fixed-default bin/derive_dynamic_msys2_packages.rb.
      - name: Derive dynamic bundle resolution (lock + MSYS2 package list)
        shell: powershell
        run: |
          $libDir = Join-Path $env:GITHUB_WORKSPACE 'lib'
          $cliScript = Join-Path $env:GITHUB_WORKSPACE 'bin\resolve_bundle_lock.rb'
          $registryPath = Join-Path $env:GITHUB_WORKSPACE 'config\curated-gems.json'
          $lockPath = Join-Path $env:RUNNER_TEMP 'resolution-lock.json'
          $packageListPath = Join-Path $env:RUNNER_TEMP 'msys2-package-list.json'

          & $env:RESOLVE_BUNDLE_RUBY_EXE "-I$libDir" $cliScript $registryPath $env:GITHUB_SHA $env:RUBY_INSTALLER_VERSION $env:RUBY_GNOME_VERSION $env:RUNTIME_GEMS_CSV $lockPath $packageListPath
          $cliExit = $LASTEXITCODE

          # Matches bin/resolve_bundle_lock.rb's own documented exit-code
          # contract: 0 success, 1 possibly transient (network/ARGV), 2
          # deterministic (a real environment or validation failure).
          if ($cliExit -ne 0) {
            Write-Error "resolve_bundle_lock.rb failed with exit code $cliExit -- see the CLI's own stderr output above."
            exit 1
          }
          if (!(Test-Path $lockPath) -or !(Test-Path $packageListPath)) {
            Write-Error "resolve_bundle_lock.rb reported success but its output files were not both written."
            exit 1
          }

          "RESOLUTION_LOCK=$lockPath" | Out-File $env:GITHUB_ENV -Append -Encoding utf8
          "PACKAGE_LIST_JSON=$packageListPath" | Out-File $env:GITHUB_ENV -Append -Encoding utf8

      # Same multiline-output mechanism F1's own diagnostic workflow
      # already proved works on a real Windows PowerShell 5.1 runner --
      # see read-msys2-package-list.ps1's own doc comment for the full
      # strict-validation contract this applies before ever handing
      # anything to setup-msys2.
      - name: Read package list and emit multiline install output
        id: read_packages
        shell: powershell
        run: |
          . (Join-Path $env:GITHUB_WORKSPACE 'read-msys2-package-list.ps1')
          try {
            $installList = Read-Msys2PackageList -Path $env:PACKAGE_LIST_JSON
          } catch {
            Write-Error "Reading the derived package list failed: $($_.Exception.Message)"
            exit 1
          }

          Write-Host "Derived install list:`n$installList"

          $delimiter = [guid]::NewGuid().ToString('N')
          "install<<$delimiter" | Out-File $env:GITHUB_OUTPUT -Append -Encoding utf8
          $installList | Out-File $env:GITHUB_OUTPUT -Append -Encoding utf8
          $delimiter | Out-File $env:GITHUB_OUTPUT -Append -Encoding utf8

      # pacman prints "warning: dependency cycle detected" for libwebp/libtiff
      # and harfbuzz/freetype during this step -- confirmed real, longstanding,
      # upstream MSYS2 package-metadata quirk (same exact libwebp/libtiff pair
      # shows up across multiple real msys2/MSYS2-packages and msys2/MINGW-
      # packages GitHub issues), not anything in this build. Non-fatal --
      # pacman picks an install order anyway and every later step depending on
      # these packages succeeds. Scoped entirely to this build machine's own
      # package manager; the shipped product never runs pacman at all, it only
      # ever receives already-compiled .dll files loaded via Windows' own PE
      # loader -- a completely different mechanism with no shared failure
      # mode. Investigated and confirmed benign 2026-07-09, not chased further
      # (upstream MSYS2's own package graph, not ours to fix).
      - name: Install MSYS2 UCRT build surface
        id: msys2
        uses: msys2/setup-msys2@66cd2cce69caa17b53920067426061ca1de3a884 # v2.32.0
        with:
          msystem: UCRT64
          update: true
          install: ${{ steps.read_packages.outputs.install }}

      - name: Build sanitized PATH
        id: lanepath
        shell: powershell
        run: |
          # Resolve the MSYS2 root from the setup-msys2 install (its own
          # location, not the runner's preinstalled C:\msys64). Everything
          # downstream keys off MSYS2_ROOT, so this is the single root.
          $msys = '${{ steps.msys2.outputs.msys2-location }}'
          $prefix = $env:MSYS2_PREFIX
          if ([string]::IsNullOrWhiteSpace($msys) -or !(Test-Path $msys)) {
            Write-Error "MSYS2 setup failed: expected install root at '$msys' to exist."
            exit 1
          }

          $orig = $env:Path -split ';'
          $filtered = $orig | Where-Object {
            $_ -and
            ($_ -notlike '*\Ruby\*\x64\msys64\*') -and
            ($_ -notmatch '^C:\\hostedtoolcache\\windows\\Ruby(\\|$)') -and
            ($_ -ne 'C:\mingw64\bin') -and
            ($_ -notmatch '^C:\\Strawberry(\\|$)')
          }
          $lanePath = @("$msys\$prefix\bin", "$msys\usr\bin") + $filtered
          $joined = ($lanePath -join ';')

          "MSYS2_ROOT=$msys" | Out-File $env:GITHUB_ENV -Append -Encoding utf8
          "PATH_GEM_SUITE=$joined" | Out-File $env:GITHUB_ENV -Append -Encoding utf8
          "path=$joined" | Out-File $env:GITHUB_OUTPUT -Append -Encoding utf8
          "RI_DEVKIT=$msys" | Out-File $env:GITHUB_ENV -Append -Encoding utf8
          "MSYSTEM_PREFIX=/$prefix" | Out-File $env:GITHUB_ENV -Append -Encoding utf8
          "MINGW_PREFIX=/$prefix" | Out-File $env:GITHUB_ENV -Append -Encoding utf8

      - name: Resolve native build surface
        shell: powershell
        env:
          PATH: ${{ steps.lanepath.outputs.path }}
        run: |
          $msys = $env:MSYS2_ROOT
          $prefix = $env:MSYS2_PREFIX
          $gcc = Join-Path $msys "$prefix\bin\gcc.exe"
          $pkgConfig = Join-Path $msys "$prefix\bin\pkg-config.exe"
          $pkgConfigPath = "$msys\$prefix\lib\pkgconfig;$msys\lib\pkgconfig"

          # GNU make ships in the MSYS lane as usr\bin\make.exe; the UCRT
          # package provides ucrt64\bin\mingw32-make.exe (a different name).
          # There is no ucrt64\bin\make.exe. Prefer the MSYS make for mkmf
          # compatibility and fall back to mingw32-make.
          $makeCandidates = @(
            (Join-Path $msys 'usr\bin\make.exe'),
            (Join-Path $msys "$prefix\bin\mingw32-make.exe")
          )
          $make = $makeCandidates | Where-Object { Test-Path $_ } | Select-Object -First 1
          # mkmf/gem-install spawns make through MSYS sh, which strips
          # backslashes (D:\a\_temp -> D:a_temp). Use forward slashes so the
          # path survives; make and Windows CreateProcess both accept them.
          if ($make) { $make = $make -replace '\\', '/' }

          # Probe the surface before gating so a failure shows what is present.
          Write-Host "::group::Native build surface probe"
          where.exe gcc
          where.exe make
          where.exe mingw32-make
          where.exe pkg-config
          Write-Host "::endgroup::"

          # Validate the whole surface at once and report every gap together.
          $required = [ordered]@{ gcc = $gcc; make = $make; 'pkg-config' = $pkgConfig }
          $missing = @()
          foreach ($name in $required.Keys) {
            $path = $required[$name]
            if ([string]::IsNullOrEmpty($path) -or !(Test-Path $path)) {
              $missing += $name
            }
          }
          if ($missing.Count -gt 0) {
            $missingList = $missing -join ', '
            $searched = "Searched gcc=$gcc; make=$($makeCandidates -join ' | '); pkg-config=$pkgConfig."
            Write-Error "Native build surface validation failed: missing tool(s): $missingList. $searched"
            exit 1
          }

          "CC=$gcc" | Out-File $env:GITHUB_ENV -Append -Encoding utf8
          "MAKE=$make" | Out-File $env:GITHUB_ENV -Append -Encoding utf8
          "PKG_CONFIG=$pkgConfig" | Out-File $env:GITHUB_ENV -Append -Encoding utf8
          "PKG_CONFIG_PATH=$pkgConfigPath" | Out-File $env:GITHUB_ENV -Append -Encoding utf8

          Write-Host "::group::Native build surface"
          Write-Host "CC=$gcc"
          Write-Host "MAKE=$make"
          Write-Host "PKG_CONFIG=$pkgConfig"
          Write-Host "PKG_CONFIG_PATH=$pkgConfigPath"
          & $gcc --version
          & $make --version
          & $pkgConfig --version
          & $pkgConfig --modversion gtk+-3.0 gobject-introspection-1.0 glib-2.0 gobject-2.0 gio-2.0 cairo pango
          Write-Host "::endgroup::"

      # GH_TOKEN scoped to just this step -- every step after it executes
      # externally sourced code (the downloaded RubyInstaller archive, then
      # native-gem build/install hooks) and has no business holding a
      # repo-scoped token while doing it. Same convention as
      # build-ruby4lich5-installer.yaml's "Resolve latest RubyInstaller in
      # series" step and validate-novel-gem.yml's own digest-resolution step.
      # Also exposed as a job output (below) -- the smoke job, downstream,
      # deliberately runs with no GH_TOKEN at all (real security design,
      # see that job's own comment), so it can't re-resolve this digest via
      # `gh api` itself. Resolving it once, here, and handing the exact
      # value forward for a purely local Get-FileHash comparison there is
      # what lets both jobs verify the same archive without giving the
      # untrusted-code-execution job a token it has no business holding.
      - name: Resolve RubyInstaller release digest
        id: ruby-digest
        shell: powershell
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $rubyInstallerVersion = $env:RUBY_INSTALLER_VERSION
          $tag = "RubyInstaller-$rubyInstallerVersion"
          $archiveName = "rubyinstaller-$rubyInstallerVersion-x64.7z"

          # Output captured and $LASTEXITCODE checked immediately, parsed only
          # on success -- same fix already established later in this file
          # (the gem-bundle digest-retry loop, 2026-07-09): piping `gh api`
          # straight into ConvertFrom-Json would make a genuine command
          # failure (auth/network/rate-limit) look like a JSON parse error
          # instead of surfacing the real `gh` error text.
          $apiOutput = gh api "repos/oneclick/rubyinstaller2/releases/tags/$tag" 2>&1
          if ($LASTEXITCODE -ne 0) {
            Write-Error "gh api failed for release $tag -- $apiOutput"
            exit 1
          }
          $rel = $apiOutput | ConvertFrom-Json
          $asset = $rel.assets | Where-Object { $_.name -eq $archiveName }
          if (-not $asset) {
            Write-Error "Asset $archiveName not found on release $tag."
            exit 1
          }
          # RubyInstaller's own releases report a real sha256 digest per
          # asset (same GitHub Releases API field build-ruby4lich5-installer.yaml
          # and validate-novel-gem.yml already trust for this same third
          # party) -- captured here, verified after download in the next
          # step, so a compromised or corrupted mirror is caught before 7z
          # or ruby.exe ever touch it.
          if ($asset.digest -notmatch '^sha256:[0-9a-f]{64}$') {
            Write-Error "RubyInstaller release $tag returned a missing or malformed digest for $archiveName -- got '$($asset.digest)'."
            exit 1
          }

          "RUBY_ARCHIVE_URL=$($asset.browser_download_url)" | Out-File $env:GITHUB_ENV -Append -Encoding utf8
          "RUBY_ARCHIVE_DIGEST=$($asset.digest)" | Out-File $env:GITHUB_ENV -Append -Encoding utf8
          "url=$($asset.browser_download_url)" | Out-File $env:GITHUB_OUTPUT -Append -Encoding utf8
          "digest=$($asset.digest)" | Out-File $env:GITHUB_OUTPUT -Append -Encoding utf8
          Write-Host "RubyInstaller $tag -> $archiveName (sha256 recorded: $($asset.digest))"

      - name: Download and extract RubyInstaller
        shell: powershell
        run: |
          $rubyInstallerVersion = $env:RUBY_INSTALLER_VERSION
          $rubyParent = 'C:\Ruby4Lich5\ruby'
          $archive = Join-Path $env:RUNNER_TEMP "rubyinstaller-$rubyInstallerVersion-x64.7z"

          if (Test-Path $rubyParent) {
            Remove-Item $rubyParent -Recurse -Force
          }
          New-Item -ItemType Directory -Path $rubyParent -Force | Out-Null

          . (Join-Path $env:GITHUB_WORKSPACE 'verify-archive-download.ps1')
          try {
            Invoke-VerifiedDownload -Url $env:RUBY_ARCHIVE_URL -ExpectedDigest $env:RUBY_ARCHIVE_DIGEST -DestinationPath $archive | Out-Null
          } catch {
            Write-Error "RubyInstaller download/verification failed: $($_.Exception.Message)"
            exit 1
          }
          Write-Host "RubyInstaller archive digest verified: $env:RUBY_ARCHIVE_DIGEST"

          $sevenZip = "${env:ProgramFiles}\7-Zip\7z.exe"
          if (!(Test-Path $sevenZip)) {
            $sevenZip = '7z.exe'
          }

          & $sevenZip x $archive "-o$rubyParent" -y
          if ($LASTEXITCODE -ne 0) {
            Write-Error "RubyInstaller extraction failed."
            exit $LASTEXITCODE
          }

          $rubyExe = Get-ChildItem $rubyParent -Recurse -Filter ruby.exe -File | Where-Object {
            $_.FullName -match '\\bin\\ruby\.exe$'
          } | Select-Object -First 1
          if (-not $rubyExe) {
            Write-Error "RubyInstaller extraction failed: ruby.exe was not found under $rubyParent."
            exit 1
          }

          $rubyRoot = Split-Path (Split-Path $rubyExe.FullName -Parent) -Parent
          & $rubyExe.FullName --version
          if ($LASTEXITCODE -ne 0) {
            Write-Error "RubyInstaller validation failed: ruby.exe could not run."
            exit $LASTEXITCODE
          }

          $rubyPlatform = & $rubyExe.FullName -e "require 'rubygems'; print Gem::Platform.local.to_s"
          if ($rubyPlatform -ne $env:GEM_PLATFORM) {
            Write-Error "RubyInstaller validation failed: expected Ruby platform $env:GEM_PLATFORM, got $rubyPlatform."
            exit 1
          }

          $gemExe = Join-Path $rubyRoot 'bin\gem.cmd'
          if (!(Test-Path $gemExe)) {
            Write-Error "RubyInstaller validation failed: gem.cmd was not found at $gemExe."
            exit 1
          }

          "RUBY_ROOT=$rubyRoot" | Out-File $env:GITHUB_ENV -Append -Encoding utf8
          "RUBY_EXE=$($rubyExe.FullName)" | Out-File $env:GITHUB_ENV -Append -Encoding utf8
          "GEM_EXE=$gemExe" | Out-File $env:GITHUB_ENV -Append -Encoding utf8

      # F2's final revalidation gate (bin/revalidate_staged_bundle.rb) needs
      # to know what was actually present on this bootstrapped Ruby
      # *before* any lock-driven install ran -- real gap, found in review
      # 2026-07-13: without a real captured baseline, that gate could only
      # ever check a post-stage name against RubyBundledGems (a
      # hand-maintained list) or the lock's own closure, so a gem installed
      # live (bypassing the lock, e.g. as an undeclared transitive
      # dependency of an unpinned `gem install`) would slip through
      # undetected unless it happened to also be missing from
      # RubyBundledGems. A real snapshot, taken before anything installs
      # anything, removes that dependency on RubyBundledGems being
      # complete -- "was this name here before we started" is a fact, not
      # a policy list. Deliberately every installed spec (name => highest
      # version), unfiltered -- the same "every installed specification"
      # shape bin/revalidate_staged_bundle.rb's own target_bundled_gem_versions
      # already uses, so the two are directly diffable.
      - name: Capture pre-stage gem inventory (baseline for final revalidation)
        shell: powershell
        run: |
          $inventoryScript = @(
            'require "json"',
            'require "rubygems"',
            'inventory = Gem::Specification.group_by(&:name).transform_values { |specs| specs.max_by(&:version).version.to_s }',
            'File.write(ARGV.fetch(0), JSON.generate(inventory))'
          ) -join "`n"
          $inventoryScriptPath = Join-Path $env:RUNNER_TEMP 'capture-pre-stage-inventory.rb'
          Set-Content -Path $inventoryScriptPath -Value $inventoryScript -Encoding ascii
          $inventoryPath = Join-Path $env:RUNNER_TEMP 'pre-stage-gem-inventory.json'
          & $env:RUBY_EXE $inventoryScriptPath $inventoryPath
          if ($LASTEXITCODE -ne 0 -or !(Test-Path $inventoryPath)) {
            Write-Error "Failed to capture pre-stage gem inventory."
            exit 1
          }
          "PRE_STAGE_GEM_INVENTORY=$inventoryPath" | Out-File $env:GITHUB_ENV -Append -Encoding utf8

      - name: Download upstream gem sources
        shell: powershell
        env:
          PATH: ${{ steps.lanepath.outputs.path }}
        run: |
          $rubyGnomeVersion = $env:RUBY_GNOME_VERSION

          # cairo-version retired (F2) -- cairo is never an independent
          # root (docs/DECISIONS.md, F1's own DefaultRootSelection); its
          # version comes from the one real resolve pass's own resolved
          # gtk3 closure, recorded in the lock, not a separate dispatch
          # input that could silently disagree with it.
          $lock = Get-Content $env:RESOLUTION_LOCK -Raw | ConvertFrom-Json
          $cairoEntry = $lock.closure | Where-Object { $_.name -eq 'cairo' } | Select-Object -First 1
          if (-not $cairoEntry) {
            Write-Error "Source download failed: the resolved lock does not contain a 'cairo' closure member at all."
            exit 1
          }
          $cairoVersion = $cairoEntry.version

          $rubyGnomeGems = @(
            'glib2',
            'gobject-introspection',
            'gio2',
            'cairo-gobject',
            'pango',
            'gdk_pixbuf2',
            'atk',
            'gdk3',
            'gtk3'
          )

          # Every native_self_contained closure member outside the
          # Ruby-GNOME source checkout and cairo (both already handled
          # specially, immediately below) -- e.g. ox/curses. Real bug,
          # found in review 2026-07-13: NativeGemPreparer#prepare_from_plan
          # unconditionally normalizes/patches *every* native_self_contained
          # entry in the whole lock (not just the fixed GTK3 build list),
          # but this step previously only ever populated source for the
          # Ruby-GNOME stack plus cairo -- any other native_self_contained
          # member (there was never a curated-patch-free exemption for
          # these; NativeGemPreparer#prepare_self_contained always loads
          # the real gemspec) had no source directory at all, raising
          # GemspecNormalizer::NormalizationError the first time this ran
          # against a real closure containing one.
          $otherSelfContainedNames = @(
            $lock.closure | Where-Object {
              $_.classification.state -eq 'native_self_contained' -and
              ($rubyGnomeGems + @('cairo')) -notcontains $_.name
            } | ForEach-Object { $_.name } | Sort-Object -Unique
          )

          $work = Join-Path $env:RUNNER_TEMP 'ruby4-bundled-gems'
          $src = Join-Path $work 'src'
          $build = Join-Path $work 'build'
          $pkg = Join-Path $env:GITHUB_WORKSPACE 'pkg'

          foreach ($dir in @($work, $pkg)) {
            if (Test-Path $dir) {
              Remove-Item $dir -Recurse -Force
            }
            New-Item -ItemType Directory -Path $dir -Force | Out-Null
          }
          New-Item -ItemType Directory -Path $src, $build -Force | Out-Null

          $rubyGnomeZip = Join-Path $src "ruby-gnome-$rubyGnomeVersion.zip"
          $rubyGnomeUrl = "https://github.com/ruby-gnome/ruby-gnome/archive/refs/tags/$rubyGnomeVersion.zip"
          Write-Host "Downloading Ruby-GNOME $rubyGnomeVersion from $rubyGnomeUrl"
          Invoke-WebRequest -Uri $rubyGnomeUrl -OutFile $rubyGnomeZip -UseBasicParsing
          Expand-Archive -Path $rubyGnomeZip -DestinationPath $src -Force
          $rubyGnomeRoot = Join-Path $src "ruby-gnome-$rubyGnomeVersion"
          if (!(Test-Path $rubyGnomeRoot)) {
            Write-Error "Source download failed: Ruby-GNOME source did not expand to $rubyGnomeRoot."
            exit 1
          }

          Push-Location $src
          & $env:GEM_EXE fetch cairo --version $cairoVersion --clear-sources --source https://rubygems.org
          $fetchExit = $LASTEXITCODE
          Pop-Location
          $cairoGem = Join-Path $src "cairo-$cairoVersion.gem"
          if ($fetchExit -ne 0 -or !(Test-Path $cairoGem)) {
            Write-Error "Source download failed: cairo $cairoVersion gem could not be fetched."
            exit 1
          }
          Push-Location $src
          & $env:GEM_EXE unpack $cairoGem
          $unpackExit = $LASTEXITCODE
          Pop-Location
          if ($unpackExit -ne 0) {
            Write-Error "Source download failed: cairo $cairoVersion gem could not be unpacked."
            exit $unpackExit
          }
          $cairoRoot = Join-Path $src "cairo-$cairoVersion"
          if (!(Test-Path $cairoRoot)) {
            Write-Error "Source download failed: cairo source did not unpack to $cairoRoot."
            exit 1
          }

          "SOURCE_ROOT=$build" | Out-File $env:GITHUB_ENV -Append -Encoding utf8
          "PKG_DIR=$pkg" | Out-File $env:GITHUB_ENV -Append -Encoding utf8
          # Exposes the exact locked .gem packages fetched below (cairo,
          # and every "other" native_self_contained member) to later steps
          # in this same job -- "Build and stage runtime gem bundle"'s own
          # repack loop reuses these directly instead of a second, live
          # `gem install` (see that step's own comment for why).
          "GEM_SRC_ROOT=$src" | Out-File $env:GITHUB_ENV -Append -Encoding utf8

          foreach ($gemName in $rubyGnomeGems) {
            $from = Join-Path $rubyGnomeRoot $gemName
            $to = Join-Path $build $gemName
            if (!(Test-Path $from)) {
              Write-Error "Source download failed: missing Ruby-GNOME gem source $from."
              exit 1
            }
            Copy-Item $from $to -Recurse -Force
          }
          Copy-Item $cairoRoot (Join-Path $build 'cairo') -Recurse -Force

          $sourceGemPackages = @{
            'cairo' = $cairoGem
          }

          # Fetch+unpack the exact locked version of every other
          # native_self_contained member (ox, curses, and any future
          # additions) the same way cairo already is above -- these are
          # real, precompiled-extension gems that still need a real
          # gemspec at $build/<name> for NativeGemPreparer to normalize/
          # patch, even though they're only ever repacked (never actually
          # recompiled) by "Build and stage runtime gem bundle" below.
          foreach ($gemName in $otherSelfContainedNames) {
            $entry = $lock.closure | Where-Object { $_.name -eq $gemName } | Select-Object -First 1
            $gemVersion = $entry.version

            Push-Location $src
            & $env:GEM_EXE fetch $gemName --version $gemVersion --clear-sources --source https://rubygems.org
            $fetchExit = $LASTEXITCODE
            Pop-Location
            $gemPackage = Join-Path $src "$gemName-$gemVersion.gem"
            if ($fetchExit -ne 0 -or !(Test-Path $gemPackage)) {
              Write-Error "Source download failed: $gemName $gemVersion gem could not be fetched."
              exit 1
            }
            Push-Location $src
            & $env:GEM_EXE unpack $gemPackage
            $unpackExit = $LASTEXITCODE
            Pop-Location
            if ($unpackExit -ne 0) {
              Write-Error "Source download failed: $gemName $gemVersion gem could not be unpacked."
              exit $unpackExit
            }
            $gemRoot = Join-Path $src "$gemName-$gemVersion"
            if (!(Test-Path $gemRoot)) {
              Write-Error "Source download failed: $gemName source did not unpack to $gemRoot."
              exit 1
            }
            Copy-Item $gemRoot (Join-Path $build $gemName) -Recurse -Force
            $sourceGemPackages[$gemName] = $gemPackage
          }

          foreach ($gemName in $sourceGemPackages.Keys) {
            $gemDir = Join-Path $build $gemName
            $gemspec = Join-Path $gemDir "$gemName.gemspec"
            if (Test-Path $gemspec) {
              Write-Host "Source normalization: $gemName already provides $gemspec"
              continue
            }

            $gemPackage = $sourceGemPackages[$gemName]
            if (!(Test-Path $gemPackage)) {
              Write-Error "Source normalization failed: fetched gem package for $gemName is missing at $gemPackage."
              exit 1
            }
            if (!(Test-Path $gemDir)) {
              Write-Error "Source normalization failed: source directory for $gemName is missing at $gemDir."
              exit 1
            }

            $normalizeScript = @(
              'require "rubygems/package"',
              'gem_package, gemspec_path = ARGV',
              'spec = Gem::Package.new(gem_package).spec',
              'File.write(gemspec_path, spec.to_ruby)'
            ) -join "`n"
            $normalizeScriptPath = Join-Path $env:RUNNER_TEMP "normalize-$gemName-gemspec.rb"
            Set-Content -Path $normalizeScriptPath -Value $normalizeScript -Encoding ascii
            & $env:RUBY_EXE $normalizeScriptPath $gemPackage $gemspec
            if ($LASTEXITCODE -ne 0 -or !(Test-Path $gemspec)) {
              Write-Error "Source normalization failed: could not generate $gemspec from $gemPackage."
              exit 1
            }
            Write-Host "Source normalization: generated $gemspec from $gemPackage"
          }

      # F2's "resolve once" cutover -- consumes the one real resolve pass
      # ("Derive dynamic bundle resolution" above) instead of calling
      # BuildPlanner#plan_for itself. bin/prepare_native_gems_from_lock.rb
      # never talks to RubygemsClient at all (see its own header comment
      # and NativeGemPreparer#prepare_from_plan's "no live re-resolve"
      # contract), so the old retry-for-transient-network-errors loop no
      # longer applies -- every failure here is either a real bug in a
      # curated patch/gemspec normalization, or the lock/source_root
      # inputs themselves being wrong, neither of which retrying fixes.
      - name: Prepare native gems (classify, normalize, patch -- Ruby, not ad-hoc PowerShell)
        shell: powershell
        run: |
          $sourceRoot = $env:SOURCE_ROOT
          $planPath = Join-Path $env:RUNNER_TEMP 'native-gems-plan.json'
          $script = Join-Path $env:GITHUB_WORKSPACE 'bin\prepare_native_gems_from_lock.rb'

          & $env:RUBY_EXE $script $env:RESOLUTION_LOCK $sourceRoot $planPath
          $exitCode = $LASTEXITCODE
          if ($exitCode -ne 0) {
            Write-Error "Native gem preparation failed (exit $exitCode) -- see the CLI's own stderr output above."
            exit $exitCode
          }
          if (!(Test-Path $planPath)) {
            Write-Error "Native gem preparation did not produce a plan at $planPath."
            exit 1
          }

          # The build steps below still build a hardcoded GTK3 gem list.
          # Item 7a's own scope was always narrower than that -- the DLL-vendoring/
          # discovery half (which gems get the closure copied into, see the plan-driven
          # $vendoringRoots further down in "Build GTK3 binary gem suite") -- and that
          # part has landed. *Which gems get compiled* in the first place was
          # deliberately deferred, real but separate follow-on work; this guard is
          # the stopgap that shipped instead. Until that generalization happens, the
          # hardcoded build list must still be *contained in* the plan's own
          # native_self_contained set, or the workflow could silently build a gem
          # the planner never classified/patched.
          #
          # Not an exact-equals check anymore (F2) -- the plan now covers the
          # *whole* resolved bundle's native_self_contained members in one unified
          # pass (see bin/prepare_native_gems_from_lock.rb's own doc comment),
          # which legitimately includes members outside the fixed GTK3 build list
          # too (e.g. ox/curses, repacked -- not compiled -- by "Build and stage
          # runtime gem bundle" below, driven by this same plan's own classifications
          # rather than a separate hardcoded list).
          $planGems = [System.Collections.Generic.SortedSet[string]]::new([StringComparer]::OrdinalIgnoreCase)
          (Get-Content $planPath -Raw | ConvertFrom-Json) |
            Where-Object { $_.state -eq 'native_self_contained' } |
            ForEach-Object { [void] $planGems.Add($_.name) }
          $hardcodedBuildGems = [System.Collections.Generic.SortedSet[string]]::new(
            [string[]] @('glib2', 'gobject-introspection', 'gio2', 'cairo', 'cairo-gobject', 'pango', 'gdk_pixbuf2', 'atk', 'gdk3', 'gtk3'),
            [StringComparer]::OrdinalIgnoreCase
          )
          $missing = @($hardcodedBuildGems | Where-Object { -not $planGems.Contains($_) })
          if ($missing.Count -gt 0) {
            Write-Error "Native gems plan's native_self_contained set no longer contains this workflow's hardcoded GTK3 build list. Missing from plan (still hardcoded below but not classified/patched): $($missing -join ',')."
            exit 1
          }

          "NATIVE_GEMS_PLAN=$planPath" | Out-File $env:GITHUB_ENV -Append -Encoding utf8
          Write-Host "::group::Native gems build plan"
          Get-Content $planPath | Write-Host
          Write-Host "::endgroup::"

      - name: Upload native gems build plan (debug info -- survives the runner)
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: native-gems-build-plan
          path: ${{ env.NATIVE_GEMS_PLAN }}
          if-no-files-found: error

      # F2's "resolve once" cutover -- the one real resolve pass this whole
      # run depends on has to survive the job boundary too: the publish
      # job (its own fresh runner, no filesystem in common with this one)
      # needs the same lock to know which native gems it built itself
      # (native_self_contained -- gets its own R4L5-<name>-<version>-<platform>
      # release) versus fetched upstream (native_pass_through -- never
      # republished under this project's own tag), replacing the old
      # native-runtime-gems input there too.
      - name: Upload resolution lock (cross-job relay)
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: resolution-lock
          path: ${{ env.RESOLUTION_LOCK }}
          if-no-files-found: error
          retention-days: 1

      - name: Build GTK3 binary gem suite
        shell: powershell
        env:
          PATH: ${{ steps.lanepath.outputs.path }}
        run: |
          $msys = $env:MSYS2_ROOT
          $prefix = $env:MSYS2_PREFIX
          $rubyRoot = $env:RUBY_ROOT
          $rubyExe = $env:RUBY_EXE
          $gemExe = $env:GEM_EXE
          $sourceRoot = $env:SOURCE_ROOT
          $pkgDir = $env:PKG_DIR
          $harnessRoot = Join-Path $env:RUNNER_TEMP 'ruby4-bundled-gems\harness'
          $harnessGems = Join-Path $harnessRoot 'gems'
          if (Test-Path $harnessRoot) {
            Remove-Item $harnessRoot -Recurse -Force
          }
          New-Item -ItemType Directory -Path $harnessGems -Force | Out-Null
          Copy-Item (Join-Path $env:GITHUB_WORKSPACE 'Rakefile') $harnessRoot -Force
          Copy-Item (Join-Path $sourceRoot '*') $harnessGems -Recurse -Force
          $sourceRoot = $harnessGems

          $env:Path = "$rubyRoot\bin;$msys\$prefix\bin;$msys\usr\bin;$env:Path"
          $env:RI_DEVKIT = $msys
          $env:MSYSTEM_PREFIX = "/$prefix"
          $env:MINGW_PREFIX = "/$prefix"
          $env:CC = Join-Path $msys "$prefix\bin\gcc.exe"
          # GNU make is usr\bin\make.exe; UCRT provides mingw32-make.exe.
          # Match the resolution used in "Resolve native build surface", with
          # forward slashes so the path survives MSYS sh during gem builds.
          if (Test-Path "$msys\usr\bin\make.exe") {
            $env:MAKE = "$msys\usr\bin\make.exe"
          } else {
            $env:MAKE = "$msys\$prefix\bin\mingw32-make.exe"
          }
          $env:MAKE = $env:MAKE -replace '\\', '/'
          $env:PKG_CONFIG = Join-Path $msys "$prefix\bin\pkg-config.exe"
          $env:PKG_CONFIG_PATH = "$msys\$prefix\lib\pkgconfig;$msys\lib\pkgconfig"
          $env:RCAIRO_SOURCE_DIR = Join-Path $sourceRoot 'cairo'
          $env:BINARY_GEM = 'true'
          $env:KEEP_BUILT_EXTENSIONS = 'true'

          Write-Host "::group::GTK3 native build preflight"
          Write-Host "RUBY_EXE=$rubyExe"
          Write-Host "CC=$env:CC"
          Write-Host "MAKE=$env:MAKE"
          Write-Host "PKG_CONFIG=$env:PKG_CONFIG"
          Write-Host "PKG_CONFIG_PATH=$env:PKG_CONFIG_PATH"
          where.exe ruby
          where.exe gcc
          where.exe make
          where.exe pkg-config
          & $rubyExe -rrbconfig -e 'puts "RbConfig CC=#{RbConfig::CONFIG[''CC'']}"; puts "RbConfig LDSHARED=#{RbConfig::CONFIG[''LDSHARED'']}"; puts "RbConfig CFLAGS=#{RbConfig::CONFIG[''CFLAGS'']}"'
          & $env:PKG_CONFIG --modversion gtk+-3.0 gobject-introspection-1.0 glib-2.0 gobject-2.0 gio-2.0 cairo pango
          Write-Host "::endgroup::"

          # Installs the exact locked versions of the build-tooling gems,
          # --local --ignore-dependencies -- real bug, found in review
          # 2026-07-13: `gem install rake pkg-config native-package-installer`
          # here resolved live against RubyGems.org (no version pin, no
          # --ignore-dependencies), which could silently install a newer
          # version than the lock resolved, or pull in transitive
          # dependencies the lock never accounted for -- exactly the
          # drift StagedClosureRevalidator's own unexplained-extra-gem
          # check exists to catch.
          $lock = Get-Content $env:RESOLUTION_LOCK -Raw | ConvertFrom-Json
          $buildToolNames = @('rake', 'pkg-config', 'native-package-installer')
          foreach ($toolName in $buildToolNames) {
            $toolEntry = $lock.closure | Where-Object { $_.name -eq $toolName } | Select-Object -First 1
            if (-not $toolEntry) {
              Write-Error "Build failed: the resolved lock does not contain a '$toolName' closure member at all."
              exit 1
            }
            $toolVersion = $toolEntry.version
            Push-Location $env:GEM_SRC_ROOT
            & $gemExe fetch $toolName --version $toolVersion --clear-sources --source https://rubygems.org
            $toolFetchExit = $LASTEXITCODE
            Pop-Location
            $toolGem = Join-Path $env:GEM_SRC_ROOT "$toolName-$toolVersion.gem"
            if ($toolFetchExit -ne 0 -or !(Test-Path $toolGem)) {
              Write-Error "Build failed: locked build-tool gem $toolName $toolVersion could not be fetched."
              exit 1
            }
            & $gemExe install $toolGem --local --ignore-dependencies --force
            if ($LASTEXITCODE -ne 0) {
              Write-Error "Build failed: locked build-tool gem $toolName $toolVersion could not be installed."
              exit $LASTEXITCODE
            }
          }

          $probeDir = Join-Path $env:RUNNER_TEMP 'ruby4-bundled-gems\mkmf-probe'
          if (Test-Path $probeDir) {
            Remove-Item $probeDir -Recurse -Force
          }
          New-Item -ItemType Directory -Path $probeDir -Force | Out-Null
          $probeScript = Join-Path $probeDir 'probe.rb'
          @(
            'require "mkmf"',
            'abort("mkmf compile probe failed") unless try_compile("int main(void) { return 0; }")',
            'puts "mkmf compile probe OK"'
          ) | Set-Content -Path $probeScript -Encoding ascii
          Push-Location $probeDir
          & $rubyExe $probeScript
          $probeExit = $LASTEXITCODE
          if ($probeExit -ne 0 -and $env:DIAGNOSTIC_MKMF_LOGS -eq 'true' -and (Test-Path (Join-Path $probeDir 'mkmf.log'))) {
            Write-Host "::group::mkmf probe log"
            Get-Content (Join-Path $probeDir 'mkmf.log') -Raw
            Write-Host "::endgroup::"
          }
          Pop-Location
          if ($probeExit -ne 0) {
            Write-Error "Build failed: Ruby mkmf could not compile a trivial executable with the resolved native build surface."
            exit $probeExit
          }

          $objdump = Join-Path $msys "$prefix\bin\objdump.exe"
          $prefixBin = Join-Path $msys "$prefix\bin"

          function Invoke-Checked([string] $message, [scriptblock] $block) {
            & $block
            if ($LASTEXITCODE -ne 0) {
              if ($env:DIAGNOSTIC_MKMF_LOGS -eq 'true' -and $harnessRoot -and (Test-Path $harnessRoot)) {
                $logs = @(Get-ChildItem -Path $harnessRoot -Recurse -Filter mkmf.log -File -ErrorAction SilentlyContinue)
                foreach ($log in $logs) {
                  Write-Host "::group::mkmf log: $($log.FullName)"
                  Get-Content $log.FullName -Raw
                  Write-Host "::endgroup::"
                }
              }
              Write-Error "$message failed with exit code $LASTEXITCODE."
              exit $LASTEXITCODE
            }
          }

          function Get-DllDependencies([string] $path) {
            if (!(Test-Path $path)) {
              return @()
            }
            @(& $objdump -p $path 2>$null |
              Select-String -Pattern 'DLL Name:\s*(.+)$' |
              ForEach-Object { $_.Matches[0].Groups[1].Value.Trim() } |
              Where-Object { -not [string]::IsNullOrWhiteSpace($_) } |
              Sort-Object -Unique)
          }

          # Curated known-good baseline, verified directly against the real reference
          # build's logs (Lich5/lich5-gtk3-gems run 27508683541): every DLL the closure
          # walker below has ever seen outside the MSYS2 ucrt64 lane, case-insensitive.
          # All 44 are core Win32 libraries and api-ms-win-crt-* Universal CRT api-set
          # forwarders -- nothing gem-specific. A match is silent (genuinely benign,
          # OS-provided, per docs/DECISIONS.md Phase 5 section 3); a miss still gets reported,
          # just once per build instead of once per occurrence -- 711 near-identical
          # notice lines otherwise, all noise, burying any real signal.
          $knownSystemDlls = [System.Collections.Generic.HashSet[string]]::new(
            [string[]] @(
              'advapi32.dll', 'api-ms-win-core-synch-l1-2-0.dll', 'api-ms-win-crt-conio-l1-1-0.dll',
              'api-ms-win-crt-convert-l1-1-0.dll', 'api-ms-win-crt-environment-l1-1-0.dll',
              'api-ms-win-crt-filesystem-l1-1-0.dll', 'api-ms-win-crt-heap-l1-1-0.dll',
              'api-ms-win-crt-locale-l1-1-0.dll', 'api-ms-win-crt-math-l1-1-0.dll',
              'api-ms-win-crt-multibyte-l1-1-0.dll', 'api-ms-win-crt-private-l1-1-0.dll',
              'api-ms-win-crt-process-l1-1-0.dll', 'api-ms-win-crt-runtime-l1-1-0.dll',
              'api-ms-win-crt-stdio-l1-1-0.dll', 'api-ms-win-crt-string-l1-1-0.dll',
              'api-ms-win-crt-time-l1-1-0.dll', 'api-ms-win-crt-utility-l1-1-0.dll',
              'bcrypt.dll', 'bcryptprimitives.dll', 'comctl32.dll', 'comdlg32.dll', 'dnsapi.dll',
              'dwmapi.dll', 'dwrite.dll', 'gdi32.dll', 'gdiplus.dll', 'hid.dll', 'imm32.dll',
              'iphlpapi.dll', 'kernel32.dll', 'msimg32.dll', 'ntdll.dll', 'ole32.dll',
              'opengl32.dll', 'rpcrt4.dll', 'setupapi.dll', 'shell32.dll', 'shlwapi.dll',
              'user32.dll', 'userenv.dll', 'usp10.dll', 'winmm.dll', 'winspool.drv', 'ws2_32.dll'
            ),
            [StringComparer]::OrdinalIgnoreCase
          )
          $unrecognizedSystemDlls = [System.Collections.Generic.SortedSet[string]]::new([StringComparer]::OrdinalIgnoreCase)

          $runtimeDlls = [System.Collections.Hashtable]::new([StringComparer]::OrdinalIgnoreCase)
          function Add-DllClosure([string] $dllName) {
            if ([string]::IsNullOrWhiteSpace($dllName)) {
              return
            }
            $dllPath = Join-Path $prefixBin $dllName
            if (!(Test-Path $dllPath)) {
              if (-not $knownSystemDlls.Contains($dllName)) {
                [void] $unrecognizedSystemDlls.Add($dllName)
              }
              return
            }
            if ($runtimeDlls.ContainsKey($dllName)) {
              return
            }
            $runtimeDlls[$dllName] = $dllPath
            foreach ($dependency in Get-DllDependencies $dllPath) {
              Add-DllClosure $dependency
            }
          }

          function Add-DllDependenciesFromPath([string] $path) {
            foreach ($dependency in Get-DllDependencies $path) {
              Add-DllClosure $dependency
            }
          }

          # Real dependency subset for a vendoring root that isn't glib2 --
          # glib2 alone is load-bearing for the dynamically-loaded typelib/
          # gdk-pixbuf-loader discovery earlier in this step (see the comment
          # on $vendoringRoots below), so it keeps the full aggregate
          # closure; every other root gets only its own real static-import
          # chain, walked from its own primary DLL. Deliberately scoped to
          # $knownDlls (the already-computed, already-vetted full closure)
          # rather than re-running objdump against the filesystem -- the
          # scoped result is always a subset of the already-proven-correct
          # full set, never a novel/unverified DLL. Real fix, 2026-07-09 --
          # see docs/PUNCHLIST-remaining-work.md for the measured 43MB
          # duplication this addresses.
          function Get-ScopedDllClosure([string] $rootDllPath, [hashtable] $knownDlls) {
            $scoped = [System.Collections.Generic.HashSet[string]]::new([StringComparer]::OrdinalIgnoreCase)
            $queue = [System.Collections.Generic.Queue[string]]::new()
            $queue.Enqueue((Split-Path $rootDllPath -Leaf))
            while ($queue.Count -gt 0) {
              $current = $queue.Dequeue()
              if ($scoped.Contains($current)) {
                continue
              }
              if (-not $knownDlls.ContainsKey($current)) {
                continue
              }
              [void] $scoped.Add($current)
              foreach ($dependency in (Get-DllDependencies $knownDlls[$current])) {
                $queue.Enqueue($dependency)
              }
            }
            return $scoped
          }

          function Build-GemWithHarness([string] $gemName) {
            Write-Host "::group::Build $gemName"
            Push-Location $harnessRoot
            Invoke-Checked "$gemName binary gem build harness" { & $rubyExe -I. -e "require 'rake'; Rake.application.load_rakefile; Rake::Task['build:gem'].invoke('$gemName')" }
            $builtGem = Get-ChildItem -Path (Join-Path $harnessRoot 'pkg') -Filter "$gemName-*.gem" -File |
              Where-Object { $_.Name -match "^$([regex]::Escape($gemName))-\d" } |
              Sort-Object LastWriteTime -Descending |
              Select-Object -First 1
            if (-not $builtGem) {
              Pop-Location
              Write-Error "Build failed: no gem artifact was produced for $gemName."
              exit 1
            }
            Copy-Item $builtGem.FullName (Join-Path $pkgDir $builtGem.Name) -Force
            Invoke-Checked "$gemName local install" { & $gemExe install $builtGem.FullName --local --force }
            Pop-Location
            Write-Host "::endgroup::"
          }

          foreach ($gemName in @('glib2', 'gobject-introspection')) {
            Build-GemWithHarness $gemName
          }

          $env:GI_TYPELIB_PATH = "$msys\$prefix\lib\girepository-1.0"
          $gIrInspect = Join-Path $prefixBin 'g-ir-inspect.exe'
          Get-ChildItem "$msys\$prefix\lib\girepository-1.0" -Filter '*.typelib' -File |
            ForEach-Object {
              $namespace = $_.BaseName -replace '-[0-9][0-9.]*$', ''
              $shlibs = @(& $gIrInspect --print-shlibs $namespace 2>$null)
              if ($LASTEXITCODE -eq 0) {
                foreach ($line in $shlibs) {
                  foreach ($match in [regex]::Matches($line, '[A-Za-z0-9_+.-]+\.dll')) {
                    Add-DllClosure $match.Value
                  }
                }
              }
            }
          foreach ($pattern in @('libgirepository*.dll', 'libglib-2.0-0.dll', 'libgobject-2.0-0.dll', 'libgio-2.0-0.dll', 'libgmodule-2.0-0.dll', 'libgtk-3-0.dll', 'libgdk-3-0.dll', 'libgdk_pixbuf-2.0-0.dll', 'libatk-1.0-0.dll', 'libpango*.dll', 'libcairo*.dll')) {
            Get-ChildItem -Path $prefixBin -Filter $pattern -File -ErrorAction SilentlyContinue |
              ForEach-Object { Add-DllClosure $_.Name }
          }

          foreach ($requiredRuntimeDll in @('libgdk_pixbuf-2.0-0.dll', 'libgtk-3-0.dll')) {
            if (-not $runtimeDlls.ContainsKey($requiredRuntimeDll)) {
              Write-Error "Build failed: expected runtime DLL $requiredRuntimeDll was not discovered in the GTK/GI closure."
              exit 1
            }
          }

          $giVendor = Join-Path $sourceRoot 'gobject-introspection\vendor\local'
          $typelibDst = Join-Path $giVendor 'lib\girepository-1.0'
          $fontDst = Join-Path $giVendor 'etc\fonts'
          $loaderDst = Join-Path $giVendor 'lib\gdk-pixbuf-2.0\2.10.0\loaders'
          New-Item -ItemType Directory -Path $typelibDst, $fontDst, $loaderDst -Force | Out-Null
          Copy-Item "$msys\$prefix\lib\girepository-1.0\*.typelib" $typelibDst -Force
          Copy-Item "$msys\$prefix\etc\fonts\fonts.conf" $fontDst -Force
          if (Test-Path "$msys\$prefix\etc\fonts\conf.d") {
            Copy-Item "$msys\$prefix\etc\fonts\conf.d" (Join-Path $fontDst 'conf.d') -Recurse -Force
          }

          $loaderSrc = "$msys\$prefix\lib\gdk-pixbuf-2.0\2.10.0\loaders"
          if (Test-Path $loaderSrc) {
            Get-ChildItem -Path $loaderSrc -Filter '*.dll' -File |
              ForEach-Object {
                Copy-Item $_.FullName $loaderDst -Force
                Add-DllDependenciesFromPath $_.FullName
              }
            $cacheDst = Split-Path $loaderDst -Parent
            $env:GDK_PIXBUF_MODULEDIR = $loaderDst
            & "$msys\$prefix\bin\gdk-pixbuf-query-loaders.exe" | Set-Content (Join-Path $cacheDst 'loaders.cache.in')
            (Get-Content (Join-Path $cacheDst 'loaders.cache.in') -Raw).Replace($loaderDst, '@@MODULEDIR@@') |
              Set-Content (Join-Path $cacheDst 'loaders.cache.in') -Encoding ascii
          }

          if ($unrecognizedSystemDlls.Count -gt 0) {
            Write-Host "::notice::$($unrecognizedSystemDlls.Count) DLL dependency(ies) outside the MSYS2 ucrt64 lane and not on the known-good system list (docs/DECISIONS.md Phase 5 section 3) -- assumed system-provided, but worth a human look: $($unrecognizedSystemDlls -join ', ')"
          }

          # Vendoring targets come from the plan's vendoring_role (item 7a),
          # not a hardcoded list -- for the real GTK3 stack this resolves to
          # exactly glib2+cairo today (VendoringRoleClassifier's own spec
          # locks that in against the real closure shape), same two gems
          # this loop named directly before.
          #
          # glib2 keeps the full aggregate $runtimeDlls closure -- it's
          # load-bearing for the dynamically-loaded typelib/gdk-pixbuf-loader
          # discovery above in a way a naive per-gem static-import walk could
          # silently miss (those DLLs are loaded by name at runtime, not
          # linked at compile time, so they'd never show up in any gem's own
          # static import table). Every other root gets Get-ScopedDllClosure's
          # real static-import subset instead of the full set -- confirmed
          # real, measured ~43MB duplication this removes (see
          # docs/PUNCHLIST-remaining-work.md). Deliberately not "glib2's
          # closure minus cairo's" or any other clever derivation -- cairo
          # must remain independently resolvable even if glib2 never loads
          # first in a given process (a cairo-only usage without the rest of
          # the GTK stack is a real, supported scenario), so its own closure
          # is walked from its own real DLL, not inferred from glib2's.
          #
          # Verified against real MSYS2 binaries (real objdump, not
          # assumed): libcairo-gobject-2.dll ships as a *sibling* DLL inside
          # the same cairo package, not a dependency reachable by walking
          # libcairo-2.dll's own import table (confirmed: the reverse is
          # true -- libcairo-gobject-2.dll imports libcairo-2.dll, not the
          # other way around). cairo's own scoped closure here does not
          # include it. That's safe only because glib2's unchanged full
          # closure already picks it up via the existing wildcard
          # 'libcairo*.dll' glob seed further up this step, and the real
          # cairo-gobject patch (patches/cairo-gobject/require-abi.rb)
          # registers no search path of its own -- it depends entirely on
          # cairo and glib2 having already prepended theirs, with glib2
          # guaranteed to load first. If glib2 is ever removed from this
          # vendoring-root set, this stops being true and needs
          # re-verifying. libcairo-script-interpreter-2.dll (the other
          # sibling in the same package) is unreferenced anywhere in
          # ruby-gnome's own source -- confirmed via GitHub code search,
          # not assumed -- and needs no coverage at all.
          $vendoringRoots = @(
            (Get-Content $env:NATIVE_GEMS_PLAN -Raw | ConvertFrom-Json) |
              Where-Object { $_.vendoring_role -eq 'vendoring_root' } |
              ForEach-Object { $_.name }
          )
          if ($vendoringRoots.Count -eq 0) {
            Write-Error "Vendoring failed: no vendoring_root gems found in the native gems plan."
            exit 1
          }

          $requiredLoadsManifest = [ordered]@{}
          foreach ($target in $vendoringRoots) {
            $targetRoot = Join-Path $sourceRoot $target
            if (!(Test-Path $targetRoot)) {
              Write-Error "Vendoring failed: plan named '$target' as a vendoring root, but its source directory is missing at $targetRoot."
              exit 1
            }
            $binTarget = Join-Path $targetRoot 'vendor\local\bin'
            New-Item -ItemType Directory -Path $binTarget -Force | Out-Null

            if ($target -eq 'glib2') {
              $dllNames = @($runtimeDlls.Keys | Sort-Object)
            } else {
              # Exact, not "first alphabetical match" -- real bug, found and
              # fixed 2026-07-09: lib$target*.dll alone also matches sibling
              # DLLs shipped in the same package (cairo's own package ships
              # libcairo-gobject-2.dll and libcairo-script-interpreter-2.dll
              # alongside libcairo-2.dll, confirmed directly). Relying on
              # Select-Object -First 1's incidental ordering to land on the
              # right one isn't a real guarantee. MSYS2's own real naming
              # convention for a primary shared-library DLL is
              # lib<name>-<digits...>.dll -- a version number immediately
              # after the hyphen -- which a sibling like "-gobject-" or
              # "-script-interpreter-" never matches, so this anchors on
              # that instead of enumeration order.
              $rootDllPattern = "^lib$([regex]::Escape($target))-\d.*\.dll$"
              $rootDllFile = Get-ChildItem -Path $prefixBin -Filter "lib$target*.dll" -File |
                Where-Object { $_.Name -match $rootDllPattern } |
                Sort-Object Name |
                Select-Object -First 1
              if (-not $rootDllFile) {
                Write-Error "Vendoring failed: could not find $target's own primary DLL (pattern $rootDllPattern) in $prefixBin to scope its closure."
                exit 1
              }
              $dllNames = @((Get-ScopedDllClosure $rootDllFile.FullName $runtimeDlls) | Sort-Object)
              if ($dllNames.Count -eq 0) {
                Write-Error "Vendoring failed: scoped closure for $target (from $($rootDllFile.Name)) came back empty."
                exit 1
              }
            }

            foreach ($dll in $dllNames) {
              Copy-Item $runtimeDlls[$dll] $binTarget -Force
            }
            $requiredLoadsManifest[$target] = $dllNames
          }

          $requiredLoadsPath = Join-Path $env:RUNNER_TEMP 'required-loads-manifest.json'
          $requiredLoadsManifest | ConvertTo-Json -Depth 4 | Set-Content -Path $requiredLoadsPath -Encoding utf8
          "REQUIRED_LOADS_MANIFEST=$requiredLoadsPath" | Out-File $env:GITHUB_ENV -Append -Encoding utf8
          Write-Host "::group::Required loads manifest (which DLLs were vendored into which root gem)"
          Get-Content $requiredLoadsPath | Write-Host
          Write-Host "::endgroup::"

          foreach ($gemName in @('gobject-introspection', 'glib2')) {
            Push-Location (Join-Path $sourceRoot $gemName)
            Invoke-Checked "$gemName rebuild with vendor assets" { & $gemExe build "$gemName.gemspec" }
            $rebuilt = Get-ChildItem -Filter "$gemName-*.gem" -File | Sort-Object LastWriteTime -Descending | Select-Object -First 1
            Copy-Item $rebuilt.FullName (Join-Path $pkgDir $rebuilt.Name) -Force
            Invoke-Checked "$gemName reinstall with vendor assets" { & $gemExe install $rebuilt.FullName --local --force }
            Pop-Location
          }

          foreach ($gemName in @('gio2', 'cairo', 'cairo-gobject', 'pango', 'gdk_pixbuf2', 'atk', 'gdk3', 'gtk3')) {
            Build-GemWithHarness $gemName
          }

      - name: Upload required loads manifest (debug info -- survives the runner)
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: required-loads-manifest
          path: ${{ env.REQUIRED_LOADS_MANIFEST }}
          if-no-files-found: error

      # F2's "resolve once" cutover -- replaces the old live gem-install
      # loop (RubyGems' own resolver, deciding transitive dependencies at
      # install time) and the ad-hoc post-install Gem::Specification
      # introspection that used to *discover* the runtime manifest after
      # the fact. The lock already knows the full, exact closure and every
      # member's classification; this step's only real job is turning
      # that into verified local .gem artifacts and installing them
      # --local --ignore-dependencies, in the lock's own dependency order
      # -- see bin/stage_runtime_gems.rb and LockedArtifactMapBuilder's
      # own doc comments for the full "sealed pipe" contract.
      #
      # native-runtime-gems retired -- delivery role (compiled/repacked
      # locally vs. fetched as an exact upstream artifact) now comes
      # entirely from each closure member's own locked classification,
      # not a separate hand-maintained list. The old hardcoded ox/curses
      # repack loop is exactly the evidence that list was already not
      # authoritative (see "Prepare native gems" above); every
      # native_self_contained member outside the fixed 10-gem GTK3 build
      # list goes through the identical repack mechanism now, whichever
      # gems those turn out to be.
      - name: Build and stage runtime gem bundle
        shell: powershell
        env:
          PATH: ${{ steps.lanepath.outputs.path }}
        run: |
          $msys = $env:MSYS2_ROOT
          $prefix = $env:MSYS2_PREFIX
          $rubyRoot = $env:RUBY_ROOT
          $gemExe = $env:GEM_EXE
          $rubyExe = $env:RUBY_EXE
          $pkgDir = $env:PKG_DIR
          $env:Path = "$rubyRoot\bin;$msys\$prefix\bin;$msys\usr\bin;$env:Path"
          $env:RI_DEVKIT = $msys
          $env:MSYSTEM_PREFIX = "/$prefix"
          $env:MINGW_PREFIX = "/$prefix"

          $gtk3StackGems = @('glib2', 'gobject-introspection', 'gio2', 'cairo', 'cairo-gobject', 'pango', 'gdk_pixbuf2', 'atk', 'gdk3', 'gtk3')

          # Every closure member the plan (bin/prepare_native_gems_from_lock.rb's
          # own output, already uploaded/available as $env:NATIVE_GEMS_PLAN)
          # classified native_self_contained -- the GTK3 stack was already
          # compiled by "Build GTK3 binary gem suite" above; everything else
          # in this set (e.g. ox/curses) still needs the repack treatment
          # below, classification-driven rather than a hardcoded name list.
          $plan = Get-Content $env:NATIVE_GEMS_PLAN -Raw | ConvertFrom-Json
          $selfContainedNames = @($plan | Where-Object { $_.state -eq 'native_self_contained' } | ForEach-Object { $_.name })
          $repackNames = @($selfContainedNames | Where-Object { $gtk3StackGems -notcontains $_ })

          # Seeded with the GTK3 stack's own already-built .gem files --
          # "Build GTK3 binary gem suite" above already produced these
          # into $pkgDir; this step never rebuilds them, only verifies (via
          # bin/stage_runtime_gems.rb -> LockedArtifactMapBuilder) that
          # what is actually there matches the lock.
          $builtGemPaths = @{}
          foreach ($gemName in $gtk3StackGems) {
            $builtGem = Get-ChildItem -Path $pkgDir -Filter "$gemName-*$env:GEM_PLATFORM.gem" -File |
              Where-Object { $_.Name -match "^$([regex]::Escape($gemName))-\d.*-$([regex]::Escape($env:GEM_PLATFORM))\.gem$" } |
              Sort-Object LastWriteTime -Descending |
              Select-Object -First 1
            if (-not $builtGem) {
              Write-Error "Runtime bundle failed: expected prebuilt GTK3-stack gem $gemName was not found in pkg."
              exit 1
            }
            $builtGemPaths[$gemName] = $builtGem.FullName
          }

          # Repack every other native_self_contained member the same way
          # the old hardcoded ox/curses loop did -- take the pure-Ruby-platform
          # gem already published upstream, re-tag it as this target
          # platform, no real native compile (these are precompiled,
          # platform-agnostic-at-the-Ruby-level extensions; the actual
          # native_self_contained classification just means "we vendor/ship
          # this ourselves," not "this specific gem needs its own compile
          # step" -- only the fixed GTK3 stack does).
          foreach ($gemName in $repackNames) {
            # Installs the *exact locked* source gem -- real bug, found in
            # review 2026-07-13: `gem install $gemName` here resolved
            # live against RubyGems.org (no version pin, no
            # --ignore-dependencies), so it could silently install a
            # newer version than the lock resolved, and could pull in
            # transitive dependencies the lock never accounted for at
            # all -- exactly the drift StagedClosureRevalidator's own
            # unexplained-extra-gem check exists to catch. The exact
            # .gem package was already fetched into $env:GEM_SRC_ROOT by
            # "Download upstream gem sources" above (same lock-derived
            # native_self_contained set, same job/filesystem) -- reused
            # here rather than fetched a second time.
            $repackEntry = $plan | Where-Object { $_.name -eq $gemName } | Select-Object -First 1
            if (-not $repackEntry) {
              Write-Error "Runtime bundle failed: $gemName is not present in the native gems plan at all."
              exit 1
            }
            $repackSourceVersion = $repackEntry.version
            $repackSourceGem = Join-Path $env:GEM_SRC_ROOT "$gemName-$repackSourceVersion.gem"
            if (!(Test-Path $repackSourceGem)) {
              Write-Error ("Runtime bundle failed: expected locked source gem $repackSourceGem was not found -- " + `
                           '"Download upstream gem sources" should have fetched it.')
              exit 1
            }
            & $gemExe install $repackSourceGem --local --ignore-dependencies --force
            if ($LASTEXITCODE -ne 0) {
              Write-Error "Runtime bundle failed: gem install $gemName $repackSourceVersion (locked source, for repack) failed."
              exit $LASTEXITCODE
            }

            $repackScript = @(
              'require "fileutils"',
              'require "rubygems"',
              'gem_name = ARGV.fetch(0)',
              'platform = ENV.fetch("GEM_PLATFORM")',
              'spec = Gem::Specification.find_by_name(gem_name)',
              'parent = File.join(ENV.fetch("RUNNER_TEMP"), "native-repack")',
              'target = File.join(parent, "#{spec.name}-#{spec.version}")',
              'FileUtils.rm_rf(target)',
              'FileUtils.mkdir_p(parent)',
              'FileUtils.cp_r("#{spec.full_gem_path}/.", target)',
              'Dir.chdir(target) do',
              '  repack = spec.dup',
              '  repack.platform = Gem::Platform.new(platform)',
              '  repack.extensions = []',
              '  repack.files = Dir.glob("**/*", File::FNM_DOTMATCH).reject { |path| path == "." || path == ".." || File.directory?(path) || path.end_with?(".gem") }',
              '  File.write("#{gem_name}.gemspec", repack.to_ruby)',
              'end',
              'puts target',
              'puts spec.version'
            ) -join "`n"
            $repackScriptPath = Join-Path $env:RUNNER_TEMP "repack-$gemName.rb"
            Set-Content -Path $repackScriptPath -Value $repackScript -Encoding ascii
            $metadata = @(& $rubyExe $repackScriptPath $gemName)
            if ($LASTEXITCODE -ne 0 -or $metadata.Count -lt 2) {
              Write-Error "Runtime bundle failed: native repack preparation failed for $gemName."
              exit 1
            }
            $repackDir = $metadata[0].Trim()
            $repackVersion = $metadata[1].Trim()
            Push-Location $repackDir
            & $gemExe build "$gemName.gemspec"
            if ($LASTEXITCODE -ne 0) {
              Pop-Location
              Write-Error "Runtime bundle failed: native repack gem build failed for $gemName."
              exit $LASTEXITCODE
            }
            $repackedGem = Get-ChildItem -Path $repackDir -Filter "$gemName-$repackVersion-$env:GEM_PLATFORM.gem" -File | Select-Object -First 1
            if (-not $repackedGem) {
              Pop-Location
              Write-Error "Runtime bundle failed: expected repacked gem $gemName-$repackVersion-$env:GEM_PLATFORM.gem was not produced."
              exit 1
            }
            Copy-Item $repackedGem.FullName (Join-Path $pkgDir $repackedGem.Name) -Force
            Pop-Location
            $builtGemPaths[$gemName] = (Join-Path $pkgDir $repackedGem.Name)
          }

          $builtGemPathsJson = Join-Path $env:RUNNER_TEMP 'built-gem-paths.json'
          ($builtGemPaths | ConvertTo-Json) | Out-File $builtGemPathsJson -Encoding utf8

          $installManifestPath = Join-Path $env:RUNNER_TEMP 'install-manifest.json'
          $stageScript = Join-Path $env:GITHUB_WORKSPACE 'bin\stage_runtime_gems.rb'
          & $rubyExe $stageScript $env:RESOLUTION_LOCK $env:GEM_PLATFORM $builtGemPathsJson $installManifestPath
          $stageExit = $LASTEXITCODE
          if ($stageExit -ne 0) {
            Write-Error "Runtime bundle failed: stage_runtime_gems.rb failed with exit code $stageExit -- see the CLI's own stderr output above."
            exit $stageExit
          }
          if (!(Test-Path $installManifestPath)) {
            Write-Error "Runtime bundle failed: stage_runtime_gems.rb reported success but $installManifestPath was not written."
            exit 1
          }

          # Build-time-only tooling gems -- real, correctly-resolved pure
          # members of the closure (gtk3's own dependency chain, "Build GTK3
          # binary gem suite" above's own explicit `gem install rake
          # pkg-config native-package-installer`), but not something the
          # shipped product needs installed. The only three that were ever
          # actually reachable as *non*-ruby_bundled closure members under
          # the old $runtimeGemExcludes list -- everything else on that old
          # list was already a ruby_bundled default/bundled gem, which the
          # lock-driven design excludes from staging automatically.
          $buildToolingExcludes = @('rake', 'pkg-config', 'native-package-installer')

          $installManifest = @(Get-Content $installManifestPath -Raw | ConvertFrom-Json)
          $shippedManifest = @($installManifest | Where-Object { $buildToolingExcludes -notcontains $_.name })

          foreach ($entry in $shippedManifest) {
            & $gemExe install $entry.path --local --ignore-dependencies --force
            if ($LASTEXITCODE -ne 0) {
              Write-Error "Runtime bundle failed: gem install $($entry.name) $($entry.version) (locked artifact, --local --ignore-dependencies) failed."
              exit $LASTEXITCODE
            }

            # $entry.path is wherever LockedArtifactMapBuilder actually put
            # it -- a downloaded pure/pass-through artifact lands in a
            # per-call RubygemsClient temp directory, not $pkgDir, and a
            # self-contained artifact may already be in $pkgDir (the GTK3
            # stack) or a native-repack temp directory (this step's own
            # repack loop above). $pkgDir is this whole job's one real
            # staging/packaging directory -- every later step (upload,
            # smoke, publish) expects every shipped .gem file to actually
            # be there, not just referenced from wherever it happened to
            # be downloaded/built.
            $destPath = Join-Path $pkgDir (Split-Path $entry.path -Leaf)
            if ($entry.path -ne $destPath) {
              Copy-Item $entry.path $destPath -Force
            }
          }

          $manifestFiles = @($shippedManifest | ForEach-Object { Split-Path $_.path -Leaf } | Sort-Object -Unique)
          Set-Content -Path (Join-Path $pkgDir 'runtime-gems-manifest.txt') -Value $manifestFiles -Encoding ascii

          # The literal, ordered install manifest -- relative .gem
          # filenames only (every one of them already staged directly in
          # $pkgDir above), in the lock's own dependency order (leaves
          # first, from stage_runtime_gems.rb's own ordered install
          # manifest -- $shippedManifest is that same order, just filtered
          # to drop build-tooling). Real bug, found in review 2026-07-13:
          # this file previously held the raw top-level root names (e.g.
          # "gtk3 sqlite3 ox ..."), and both the generated consumer script
          # and the clean-smoke job below resolved each of those names via
          # a live `gem install <name>` -- exactly the same live-resolution
          # risk the "resolve once" cutover exists to close everywhere
          # else. Both now execute this file's own entries literally, in
          # order, --local --ignore-dependencies -- never re-resolving
          # anything RubygemsClient/ClosureResolver already decided.
          $orderedInstallFiles = @($shippedManifest | ForEach-Object { Split-Path $_.path -Leaf })
          Set-Content -Path (Join-Path $pkgDir 'runtime-gems-install-targets.txt') -Value $orderedInstallFiles -Encoding ascii
          $installScript = @(
            '@echo off',
            'setlocal',
            'pushd "%~dp0"',
            'for /f "usebackq delims=" %%G in ("runtime-gems-install-targets.txt") do (',
            '  gem install --local --ignore-dependencies --no-document "%%G"',
            '  if errorlevel 1 exit /b 1',
            ')',
            'popd',
            'endlocal'
          ) -join "`r`n"
          Set-Content -Path (Join-Path $pkgDir 'install-runtime-gems.cmd') -Value $installScript -Encoding ascii

      # F2's final hard gate before packaging/manifest/publishing
      # (docs/DECISIONS.md Phase 17 SS8 step 7, extended) -- proves what
      # this run just actually staged/bootstrapped matches the lock
      # exactly, closing the loop the registry gate only opens (that gate,
      # inside bin/resolve_bundle_lock.rb, only means something if what it
      # approved is provably what shipped). Runs under $env:RUBY_EXE --
      # this job's own real bootstrapped target Ruby, the same one every
      # install above actually installed into -- not the separate,
      # temporary Ruby "Derive dynamic bundle resolution" used earlier
      # purely for resolution. See bin/revalidate_staged_bundle.rb's own
      # doc comment for why that distinction matters here.
      - name: Revalidate staged bundle against the resolution lock
        shell: powershell
        run: |
          $script = Join-Path $env:GITHUB_WORKSPACE 'bin\revalidate_staged_bundle.rb'
          & $env:RUBY_EXE $script $env:RESOLUTION_LOCK $env:GEM_PLATFORM $env:PRE_STAGE_GEM_INVENTORY
          $revalidateExit = $LASTEXITCODE
          if ($revalidateExit -ne 0) {
            Write-Error "Staged-bundle revalidation failed (exit $revalidateExit) -- see the CLI's own stderr output above."
            exit $revalidateExit
          }

      # Relays the built gem bundle to the smoke job below, which runs on its own
      # fresh VM (per docs/DECISIONS.md Phase 5 section 6 -- separate jobs are separate
      # runners, so $GITHUB_ENV/the filesystem can't carry state across the
      # boundary the way they do between steps in the same job). Short retention:
      # this only ever needs to survive from the end of this job to the start of
      # the next one, minutes apart within the same run -- distinct from the real,
      # 90-day-retention final artifact the smoke job uploads once it's done.
      - name: Upload packaged runtime gem bundle (intermediate, cross-job relay)
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ruby4-bundled-gems-pkg-dir-intermediate
          path: pkg/*
          retention-days: 1
          if-no-files-found: error

  smoke_ruby4_bundled_gems_suite:
    name: Smoke packaged Ruby4 bundled gems suite (windows-ucrt64)
    needs: build_ruby4_bundled_gems_suite
    runs-on: windows-latest
    timeout-minutes: 30

    # Deliberately no write permissions and no GH_TOKEN in this job -- it
    # installs and requires freshly built/upstream gem code (the smoke test
    # below), which is untrusted code execution. A write-capable release
    # token sitting in the environment during that step would be reachable
    # by anything malicious a compromised gem managed to run. Publishing
    # happens in a separate job below, downstream of a passing smoke test,
    # with its own narrowly-scoped token -- real finding, fixed 2026-07-09.
    env:
      RUBY_INSTALLER_VERSION: ${{ inputs.ruby-installer-version }}
      RUBY_ARCHIVE_URL: ${{ needs.build_ruby4_bundled_gems_suite.outputs.ruby-archive-url }}
      RUBY_ARCHIVE_DIGEST: ${{ needs.build_ruby4_bundled_gems_suite.outputs.ruby-archive-digest }}
      PKG_DIR: ${{ github.workspace }}\pkg

    steps:
      # Needed only to reach verify-archive-download.ps1 (the shared
      # download-verify helper, Phase 18) -- this job otherwise deliberately
      # runs no repo-tooling code, only the downloaded artifact below and a
      # fresh RubyInstaller. persist-credentials: false, matching every
      # other checkout in this repo; checkout itself needs no GH_TOKEN and
      # happens before any untrusted gem code runs.
      - name: Checkout repository (shared verified-download helper only)
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
          sparse-checkout: |
            verify-archive-download.ps1
          sparse-checkout-cone-mode: false

      - name: Download packaged runtime gem bundle
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: ruby4-bundled-gems-pkg-dir-intermediate
          path: pkg

      - name: Smoke packaged runtime gem bundle on clean RubyInstaller
        shell: powershell
        run: |
          $pkgDir = $env:PKG_DIR
          $manifestPath = Join-Path $pkgDir 'runtime-gems-manifest.txt'
          $installTargetsPath = Join-Path $pkgDir 'runtime-gems-install-targets.txt'
          if (!(Test-Path $manifestPath) -or !(Test-Path $installTargetsPath)) {
            Write-Error "Clean packaged smoke failed: manifest or install targets missing from $pkgDir."
            exit 1
          }

          # This job runs on its own fresh VM (docs/DECISIONS.md Phase 5 section 6), so
          # unlike when this step ran in the same job as the initial RubyInstaller
          # download, there is nothing already cached at $env:RUNNER_TEMP to
          # extract -- download it directly instead.
          #
          # No GH_TOKEN in this job (see the job-level comment above), so this
          # can't re-resolve the release digest itself via `gh api` -- it
          # reuses the exact digest the build job already resolved (passed
          # forward as a job output) and does a purely local verification.
          if ([string]::IsNullOrWhiteSpace($env:RUBY_ARCHIVE_URL) -or [string]::IsNullOrWhiteSpace($env:RUBY_ARCHIVE_DIGEST)) {
            Write-Error "Clean packaged smoke failed: RUBY_ARCHIVE_URL/RUBY_ARCHIVE_DIGEST were not passed from the build job."
            exit 1
          }

          $rubyInstallerVersion = $env:RUBY_INSTALLER_VERSION
          $archive = Join-Path $env:RUNNER_TEMP "rubyinstaller-$rubyInstallerVersion-x64.7z"

          . (Join-Path $env:GITHUB_WORKSPACE 'verify-archive-download.ps1')
          try {
            Invoke-VerifiedDownload -Url $env:RUBY_ARCHIVE_URL -ExpectedDigest $env:RUBY_ARCHIVE_DIGEST -DestinationPath $archive | Out-Null
          } catch {
            Write-Error "Clean packaged smoke failed: RubyInstaller download/verification failed: $($_.Exception.Message)"
            exit 1
          }
          Write-Host "RubyInstaller archive digest verified: $env:RUBY_ARCHIVE_DIGEST"

          $smokeParent = 'C:\Ruby4Lich5\clean-smoke-ruby'
          if (Test-Path $smokeParent) {
            Remove-Item $smokeParent -Recurse -Force
          }
          New-Item -ItemType Directory -Path $smokeParent -Force | Out-Null

          $sevenZip = "${env:ProgramFiles}\7-Zip\7z.exe"
          if (!(Test-Path $sevenZip)) {
            $sevenZip = '7z.exe'
          }
          & $sevenZip x $archive "-o$smokeParent" -y
          if ($LASTEXITCODE -ne 0) {
            Write-Error "Clean packaged smoke failed: RubyInstaller extraction failed."
            exit $LASTEXITCODE
          }

          $rubyExe = Get-ChildItem $smokeParent -Recurse -Filter ruby.exe -File | Where-Object {
            $_.FullName -match '\\bin\\ruby\.exe$'
          } | Select-Object -First 1
          if (-not $rubyExe) {
            Write-Error "Clean packaged smoke failed: ruby.exe was not found under $smokeParent."
            exit 1
          }
          $rubyRoot = Split-Path (Split-Path $rubyExe.FullName -Parent) -Parent
          $gemExe = Join-Path $rubyRoot 'bin\gem.cmd'
          $env:Path = "$rubyRoot\bin;C:\Windows\System32;C:\Windows;C:\Windows\System32\Wbem;C:\Windows\System32\WindowsPowerShell\v1.0"
          foreach ($name in @('RI_DEVKIT', 'MSYSTEM', 'MSYSTEM_PREFIX', 'MINGW_PREFIX', 'PKG_CONFIG_PATH', 'GI_TYPELIB_PATH', 'GDK_PIXBUF_MODULEDIR', 'FONTCONFIG_PATH', 'FONTCONFIG_FILE')) {
            Remove-Item "Env:\$name" -ErrorAction SilentlyContinue
          }

          $manifestFiles = @(Get-Content $manifestPath | Where-Object { -not [string]::IsNullOrWhiteSpace($_) })
          foreach ($manifestFile in $manifestFiles) {
            if (!(Test-Path (Join-Path $pkgDir $manifestFile))) {
              Write-Error "Clean packaged smoke failed: manifest gem is missing: $manifestFile."
              exit 1
            }
          }

          # Executes the ordered install manifest literally -- one
          # relative .gem filename per line, in the lock's own dependency
          # order -- exactly like install-runtime-gems.cmd (the same file
          # a real consumer runs) does. Real bug, found in review
          # 2026-07-13: this used to resolve each top-level root name live
          # (`gem install --local --no-document --force <names...>`,
          # letting RubyGems' own resolver pick versions/order), which is
          # exactly the live-resolution risk the "resolve once" cutover
          # exists to close everywhere else -- this smoke test is supposed
          # to prove the *shipped bundle* installs correctly, not that a
          # live resolve still happens to produce something installable.
          $installTargets = @(Get-Content $installTargetsPath | Where-Object { -not [string]::IsNullOrWhiteSpace($_) })
          $installExit = 0
          foreach ($installTarget in $installTargets) {
            $installTargetPath = Join-Path $pkgDir $installTarget
            if (!(Test-Path $installTargetPath)) {
              Write-Error "Clean packaged smoke failed: install manifest entry is missing: $installTargetPath."
              exit 1
            }
            & $gemExe install $installTargetPath --local --ignore-dependencies --no-document --force
            $installExit = $LASTEXITCODE
            if ($installExit -ne 0) {
              break
            }
          }
          if ($installExit -ne 0) {
            Write-Error "Clean packaged smoke failed: install targets failed on non-DevKit RubyInstaller."
            exit $installExit
          }

          $fontconfigSmoke = @(
            'require "rubygems"',
            'require "gobject-introspection"',
            'specs = Gem::Specification.find_all_by_name("gobject-introspection")',
            'abort("gobject-introspection 4.3.4 was installed unexpectedly") if specs.any? { |spec| spec.version.to_s == "4.3.4" }',
            'spec = Gem::Specification.find_by_name("gobject-introspection")',
            'fontconfig_file = ENV["FONTCONFIG_FILE"]',
            'abort("FONTCONFIG_FILE was not set") if fontconfig_file.nil? || fontconfig_file.empty?',
            'abort("FONTCONFIG_FILE contains stale gobject-introspection 4.3.4 path: #{fontconfig_file}") if fontconfig_file.include?("gobject-introspection-4.3.4")',
            'expected = File.join(spec.full_gem_path, "vendor", "local", "etc", "fonts", "fonts.conf")',
            'abort("FONTCONFIG_FILE mismatch: expected #{expected}, got #{fontconfig_file}") unless File.expand_path(fontconfig_file) == File.expand_path(expected)',
            'abort("Fontconfig file missing: #{expected}") unless File.exist?(expected)',
            'puts "gobject-introspection Fontconfig file OK: #{fontconfig_file}"'
          ) -join "`n"
          $fontconfigSmokePath = Join-Path $env:RUNNER_TEMP 'smoke-gobject-fontconfig.rb'
          Set-Content -Path $fontconfigSmokePath -Value $fontconfigSmoke -Encoding ascii
          & $rubyExe.FullName $fontconfigSmokePath
          if ($LASTEXITCODE -ne 0) {
            Write-Error "Clean packaged smoke failed: gobject-introspection Fontconfig validation failed."
            exit $LASTEXITCODE
          }

          # This require set prints "Unsupported PangoCairo function:
          # layout_path_for_components" to stderr -- confirmed real, deliberate
          # upstream ruby-gnome behavior, not a failure (verified directly
          # against ruby-gnome's own source, pango/lib/pango/cairo-loader.rb,
          # PangoCairo::Loader#load_function_info): it walks every function the
          # real PangoCairo GIR typelib exports and auto-generates a Ruby
          # method for names matching known prefixes (context_get_*, create_*,
          # names ending in _path, etc.); anything that doesn't match just gets
          # a warn() and is skipped, not raised. layout_path_for_components has
          # _for_components appended after _path, so it doesn't match the
          # "ends in _path" pattern and falls through. The C function itself
          # works fine; nothing in Lich or this project calls it. Investigated
          # and confirmed benign 2026-07-09, not chased further (upstream
          # ruby-gnome's own binding-generation logic, not ours to patch).
          & $rubyExe.FullName -e "require 'sqlite3'; require 'ox'; require 'ffi'; require 'ascii_charts'; require 'kramdown'; require 'webrick'; require 'redis'; require 'sequel'; require 'set'; require 'terminal-table'; require 'tzinfo'; require 'curses'; require 'os'; require 'cairo'; require 'gtk3'; Gtk.init; puts 'Clean packaged Ruby4/Lich runtime smoke OK'"
          if ($LASTEXITCODE -ne 0) {
            Write-Error "Clean packaged smoke failed: runtime require set failed."
            exit $LASTEXITCODE
          }

      - name: Stage artifact
        shell: powershell
        run: |
          $pkgDir = $env:PKG_DIR
          $distPkg = Join-Path $env:GITHUB_WORKSPACE 'dist\pkg'
          if (Test-Path $distPkg) {
            Remove-Item $distPkg -Recurse -Force
          }
          New-Item -ItemType Directory -Path $distPkg -Force | Out-Null

          foreach ($file in @(Get-Content (Join-Path $pkgDir 'runtime-gems-manifest.txt'))) {
            if ([string]::IsNullOrWhiteSpace($file)) {
              continue
            }
            Copy-Item (Join-Path $pkgDir $file) (Join-Path $distPkg $file) -Force
          }
          Copy-Item (Join-Path $pkgDir 'runtime-gems-manifest.txt') (Join-Path $distPkg 'runtime-gems-manifest.txt') -Force
          Copy-Item (Join-Path $pkgDir 'runtime-gems-install-targets.txt') (Join-Path $distPkg 'runtime-gems-install-targets.txt') -Force
          Copy-Item (Join-Path $pkgDir 'install-runtime-gems.cmd') (Join-Path $distPkg 'install-runtime-gems.cmd') -Force

      - name: Upload Ruby4 bundled gems
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ruby4-bundled-gems-windows-ucrt64
          path: dist/pkg/*
          retention-days: 90
          if-no-files-found: error

  # Separate job, downstream of a passing smoke test, so the write-capable
  # release token never coexists with untrusted gem code execution (the smoke
  # job above installs/requires freshly built and upstream gem code -- real
  # finding, fixed 2026-07-09: contents: write and GH_TOKEN used to sit in
  # that same job's environment). Downloads the same staged artifact the
  # smoke job already produced rather than re-deriving anything.
  publish_ruby4_bundled_gems_suite:
    name: Publish Ruby4 bundled gems and gem bundle (windows-ucrt64)
    needs: smoke_ruby4_bundled_gems_suite
    runs-on: windows-latest
    timeout-minutes: 15

    # gh release upload --clobber is delete-then-upload, not atomic (already
    # true and documented below) -- two workflow_dispatch runs publishing
    # concurrently can race on the same tag (guaranteed for the bundle tag,
    # which isn't parameterized by build inputs at all; possible for an
    # individual gem tag whenever two runs happen to produce the same
    # upstream version), corrupting an in-flight upload or failing the
    # digest check with a mismatch that isn't actually a bug. Job-scoped
    # (not workflow-scoped) so a second run's expensive build+smoke stages
    # aren't blocked by this -- only the publish step itself needs to be
    # serialized. Queues rather than cancels: cancel-in-progress would
    # interrupt a clobber mid-upload, reintroducing the exact non-atomicity
    # this exists to prevent.
    #
    # Deliberately NOT scoped by ${{ github.ref }} -- real bug, found and
    # fixed 2026-07-09: the release tags being clobbered (R4L5-<gem>-
    # <version>-<platform>, R4L5-gem-bundle-<platform>) are computed purely
    # from gem name/version/platform, never from which branch triggered the
    # build. A ref-scoped group only serializes dispatches from the *same*
    # branch -- a dispatch from main and a dispatch from any other branch
    # would still get different groups and race on the exact same tags,
    # defeating the whole point of this block. Fixed group name instead,
    # global across every branch. Platform included for when a second
    # platform lane exists someday; hardcoded rather than read from env,
    # since concurrency `group:` expressions don't have access to a job's
    # own env context.
    #
    # queue: max -- real gap, found and fixed 2026-07-09: without it, a
    # concurrency group can hold only one in-progress run plus one pending
    # run; a third dispatch arriving while both slots are occupied silently
    # cancels and replaces the pending one, dropping a queued publish with
    # no error. queue: max raises that to up to 100 queued runs, FIFO by
    # wait-start time -- confirmed against GitHub's own docs/changelog
    # (feature shipped 2026-05-07), not assumed. Only valid alongside
    # cancel-in-progress: false (already the case here).
    concurrency:
      group: publish-ruby4-bundled-gems-suite-x64-mingw-ucrt
      cancel-in-progress: false
      queue: max

    permissions:
      contents: write

    env:
      GEM_PLATFORM: x64-mingw-ucrt
      GH_TOKEN: ${{ github.token }}
      GH_REPO: ${{ github.repository }}
      # actions/upload-artifact for a single-file path uploads just that
      # file, preserving only its basename -- the same
      # resolution-lock.json name the build job's own RESOLUTION_LOCK env
      # var used, now under this job's own dist/ download path.
      RESOLUTION_LOCK: ${{ github.workspace }}\dist\resolution-lock.json

    steps:
      - name: Download staged runtime gem bundle
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: ruby4-bundled-gems-windows-ucrt64
          path: dist/pkg

      # native-runtime-gems retired (F2) -- this job needs the same lock
      # the build job resolved once, to know which native gems it built
      # itself (native_self_contained) versus fetched upstream
      # (native_pass_through, never republished under this project's own
      # R4L5- tag) -- see "Upload resolution lock (cross-job relay)" in
      # the build job above.
      - name: Download resolution lock
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: resolution-lock
          path: dist

      # generate_gem_manifest.rb is dependency-free stdlib, same design
      # principle as bin/prepare_native_gems.rb -- doesn't need the target
      # Ruby tree this job never downloads, just *some* modern Ruby on PATH.
      - name: Set up Ruby (for gem manifest generation)
        uses: ruby/setup-ruby@d45b1a4e94b71acab930e56e79c6aa188764e7f9 # v1.316.0

      # Publishes only after the clean-install smoke test already passed --
      # never a gem that merely compiled. Per docs/PUNCHLIST-remaining-work.md's
      # locked naming convention: one current artifact per gem,
      # R4L5-<name>-<upstream-version>-<platform>, overwritten in place
      # (gh release upload --clobber) rather than an incrementing vNNN. No
      # draft/review gate here deliberately -- these are the "current,
      # smoke-tested" tier; the real gate on whether a given build is
      # *authoritative* is the not-yet-built manifest's own PR-gated
      # promotion (Doug's call, 2026-07-09), not a second gate duplicated
      # here. The bundle step below is different -- it's the one artifact the
      # installer actually consumes, so it keeps a human draft/promote step,
      # same as the installer release itself.
      #
      # Asset filenames carry the R4L5- prefix too, not just the release tag
      # (real finding, fixed 2026-07-09) -- the built file on disk is still
      # plain RubyGems naming (glib2-4.3.6-x64-mingw-ucrt.gem), copied to a
      # renamed path before upload so what a consumer actually downloads
      # matches the locked convention exactly.
      - name: Publish native gems (R4L5-<name>-<upstream-version>-<platform>)
        shell: powershell
        run: |
          $pkgDir = Join-Path $env:GITHUB_WORKSPACE 'dist\pkg'
          $platform = $env:GEM_PLATFORM
          $sha = $env:GITHUB_SHA
          $escapedPlatform = [regex]::Escape($platform)

          # native-runtime-gems retired (F2) -- every native_self_contained
          # closure member the resolved lock actually named, not a
          # separate hand-maintained list (the fixed 10-gem GTK3 stack is
          # itself always a subset of this set -- see "Prepare native
          # gems"'s own drift-check guard in the build job above).
          $lock = Get-Content $env:RESOLUTION_LOCK -Raw | ConvertFrom-Json
          $nativeGemNames = @(
            $lock.closure | Where-Object { $_.classification.state -eq 'native_self_contained' } | ForEach-Object { $_.name } | Sort-Object -Unique
          )

          foreach ($gemName in $nativeGemNames) {
            $escaped = [regex]::Escape($gemName)
            $pattern = "^$escaped-(?<version>\d[\w.]*)-$escapedPlatform\.gem$"
            $gemFile = Get-ChildItem -Path $pkgDir -Filter "$gemName-*$platform.gem" -File |
              Where-Object { $_.Name -match $pattern } |
              Sort-Object LastWriteTime -Descending |
              Select-Object -First 1
            if (-not $gemFile) {
              Write-Error "Publish failed: no built .gem file found for native gem $gemName (pattern $pattern) in $pkgDir."
              exit 1
            }
            $version = [regex]::Match($gemFile.Name, $pattern).Groups['version'].Value
            if ([string]::IsNullOrWhiteSpace($version)) {
              Write-Error "Publish failed: could not parse an upstream version out of $($gemFile.Name)."
              exit 1
            }

            $tag = "R4L5-$gemName-$version-$platform"
            $publishName = "$tag.gem"
            $publishPath = Join-Path $env:RUNNER_TEMP $publishName
            Copy-Item $gemFile.FullName $publishPath -Force
            $localSha = (Get-FileHash -Path $publishPath -Algorithm SHA256).Hash.ToLowerInvariant()

            # $LASTEXITCODE alone can't tell "doesn't exist" apart from an
            # auth/network/rate-limit failure -- both exit 1 -- real gap,
            # found and fixed 2026-07-09: confirmed directly, a genuine
            # missing release prints exactly "release not found", a bad
            # token prints "non-200 OK status code: 401 Unauthorized...";
            # exit code is 1 either way. Treating any non-zero exit as
            # "absent" would silently attempt gh release create on top of a
            # transient failure, replacing a clear root cause with a
            # confusing downstream error. Only the exact "release not
            # found" text is treated as absence; anything else fails
            # loudly here instead. try/catch stays as a backstop since
            # GitHub Actions' shell: powershell (EAP = Stop) promotes a
            # native command's stderr to a terminating exception
            # inconsistently (confirmed across two live runs: threw once,
            # didn't throw for the identical condition the next time) --
            # both paths funnel into the same text check below.
            $tagExists = $false
            $viewFailureText = ''
            try {
              $viewResult = gh release view $tag --json tagName 2>&1
              if ($LASTEXITCODE -eq 0) {
                $tagExists = $true
              } else {
                $viewFailureText = "$viewResult"
              }
            } catch {
              $viewFailureText = "$_"
            }
            if (-not $tagExists -and $viewFailureText -notmatch 'release not found') {
              Write-Error "Publish failed: gh release view for $tag failed unexpectedly (not a plain not-found) -- $viewFailureText"
              exit 1
            }
            if ($tagExists) {
              gh release upload $tag $publishPath --clobber
              if ($LASTEXITCODE -ne 0) {
                Write-Error "Publish failed: gh release upload --clobber failed for $tag."
                exit $LASTEXITCODE
              }
              gh release edit $tag --target $sha
              if ($LASTEXITCODE -ne 0) {
                Write-Error "Publish failed: could not update target commitish for $tag."
                exit $LASTEXITCODE
              }
            } else {
              $notes = "Built by Ruby4Lich5, commit $sha. The R4L5- prefix signals this gem was compiled/patched/vendored (or, for a pass-through gem, vetted and re-hosted as-is) by this factory -- see docs/PUNCHLIST-remaining-work.md, 'Gem/bundle naming convention -- LOCKED 2026-07-09'. This tag is a single current artifact, overwritten in place on rebuild, not an incrementing version -- verify by SHA-256 digest, not by trusting the tag alone."
              # --latest=false -- real gap, found live 2026-07-09: without
              # it, gh's own default ("automatic based on date and
              # version") silently hands the repo-wide "Latest" designation
              # to whichever gem happens to be created last in this loop
              # (alphabetically, sqlite3 today) -- confirmed directly, it
              # displaced the actual installer release
              # (R4L5-v040.001.002) from "Latest" the first time this ran
              # clean end to end. Gems are never meant to claim it -- only
              # installer releases do. This stops it recurring on a
              # first-time create; a rebuild that clobbers an existing
              # release (the other branch above) doesn't touch a release's
              # Latest status at all, so nothing extra is needed there.
              gh release create $tag $publishPath --title "$gemName $version ($platform)" --notes $notes --target $sha --latest=false
              if ($LASTEXITCODE -ne 0) {
                Write-Error "Publish failed: gh release create failed for $tag."
                exit $LASTEXITCODE
              }
            }

            # Retries only on an empty digest, not on a populated-but-different
            # one -- real gap, found and fixed 2026-07-09: GitHub's asset
            # digest metadata isn't guaranteed to be populated the instant an
            # upload call returns, so reading it back immediately could come
            # back empty and get misread as a mismatch when the upload
            # actually succeeded. A genuine mismatch (both values present,
            # disagreeing) still fails immediately below, not retried away.
            #
            # Parsed with ConvertFrom-Json/Where-Object, not gh's own --jq --
            # real bug, found live 2026-07-09: Windows PowerShell 5.1 mangles
            # an embedded-double-quote argument when invoking a native exe
            # (gh.exe here) -- confirmed directly, the jq expression arrived
            # with its quotes stripped entirely ("select(.name ==
            # R4L5-atk-...gem)", no quotes at all), a parse error jq
            # correctly rejected. Not reproducible locally against pwsh
            # (PowerShell Core) -- a genuine Windows-PowerShell-5.1-specific
            # native-argument-passing quirk, not a syntax error this
            # session's local validation could have caught. Parsing the
            # plain JSON in PowerShell itself sidesteps the whole
            # native-argv-quoting layer -- no expression string ever crosses
            # a process boundary.
            # Output captured and $LASTEXITCODE checked immediately, parsed
            # only on success -- real gap, found and fixed 2026-07-09: piping
            # gh release view straight into ConvertFrom-Json meant a genuine
            # command failure (auth/network/rate-limit) looked identical to
            # "digest not populated yet," so a persistent failure would
            # silently retry 5 times and then get reported as the wrong
            # thing -- "asset had no digest... may not have finished
            # processing" -- masking the real error underneath.
            $remoteDigest = $null
            $lastViewFailureText = $null
            for ($digestAttempt = 1; $digestAttempt -le 5; $digestAttempt++) {
              # gh release view itself wrapped in try/catch too, not just the
              # JSON parse below -- real gap, found and fixed 2026-07-09: the
              # same EAP=Stop exception-promotion documented and guarded
              # against for the existence check above applies here just as
              # much, and an uncaught throw on this line would abort the
              # whole step immediately, skipping the retry loop entirely
              # instead of recording the failure and trying again.
              try {
                $viewOutput = gh release view $tag --json assets 2>&1
                if ($LASTEXITCODE -eq 0) {
                  $lastViewFailureText = $null
                  try {
                    $assetsJson = $viewOutput | ConvertFrom-Json
                    $matchingAsset = $assetsJson.assets | Where-Object { $_.name -eq $publishName }
                    if ($matchingAsset) {
                      $remoteDigest = $matchingAsset.digest -replace '^sha256:', ''
                    }
                  } catch {
                    $lastViewFailureText = "$_"
                  }
                } else {
                  $lastViewFailureText = "$viewOutput"
                }
              } catch {
                $lastViewFailureText = "$_"
              }
              if (-not [string]::IsNullOrWhiteSpace($remoteDigest)) {
                break
              }
              Start-Sleep -Seconds 2
            }
            if ($lastViewFailureText) {
              Write-Error "Publish failed: gh release view for $tag failed after 5 attempts -- $lastViewFailureText"
              exit 1
            }
            if ([string]::IsNullOrWhiteSpace($remoteDigest)) {
              Write-Error "Publish failed: $tag's $publishName asset had no digest after 5 attempts -- GitHub's asset metadata may not have finished processing."
              exit 1
            }
            if ($remoteDigest -ne $localSha) {
              Write-Error "Publish failed: digest mismatch for $tag -- local $localSha, remote $remoteDigest. Upload may be corrupted -- gh release upload --clobber is delete-then-upload, not atomic."
              exit 1
            }
            Remove-Item $publishPath -Force
            Write-Host "Published $tag (sha256:$localSha, commit $sha)"
          }

      # The bundle is the one artifact the installer actually consumes, so unlike
      # individual gems above it keeps a human review/promote step -- same
      # pattern already used for the installer release itself (Doug: "create me
      # a DRAFT release... I'll review it, move it from draft and then snag it
      # and test it"). First publish under the new naming scheme creates the
      # live tag as a draft, same as the installer. Once that tag exists (already
      # promoted by a prior run), this workflow never touches it again directly
      # -- it publishes to a separate "candidate" prerelease instead, so a
      # passing-but-unreviewed rebuild can never silently overwrite an
      # already-reviewed live bundle. Promoting candidate -> live is a deliberate
      # human action (gh release upload <live-tag> <file> --clobber), same
      # command Doug already uses today, not automated here.
      - name: Publish gem bundle (draft on first publish, candidate thereafter)
        shell: powershell
        run: |
          $distPkg = Join-Path $env:GITHUB_WORKSPACE 'dist\pkg'
          $platform = $env:GEM_PLATFORM
          $sha = $env:GITHUB_SHA
          $liveTag = "R4L5-gem-bundle-$platform"
          $candidateTag = "R4L5-gem-bundle-$platform-candidate"
          $zipName = "R4L5-gem-bundle-$platform.zip"
          $zipPath = Join-Path $env:RUNNER_TEMP $zipName

          if (Test-Path $zipPath) {
            Remove-Item $zipPath -Force
          }
          Compress-Archive -Path (Join-Path $distPkg '*') -DestinationPath $zipPath -CompressionLevel Optimal
          if (-not (Test-Path $zipPath)) {
            Write-Error "Publish failed: bundle zip $zipPath was not created."
            exit 1
          }
          $localSha = (Get-FileHash -Path $zipPath -Algorithm SHA256).Hash.ToLowerInvariant()

          # Same real fix as "Publish native gems" above, same reasoning:
          # $LASTEXITCODE alone can't distinguish "doesn't exist" (gh's
          # exact "release not found" text) from an auth/network/rate-limit
          # failure -- both exit 1. Only the exact not-found text is
          # treated as absence; anything else fails loudly instead of
          # silently falling through to gh release create.
          #
          # Also reads isDraft, not just tagName -- real bug, found in
          # review 2026-07-10: querying only tagName means an unpromoted
          # draft from an earlier run looks identical to a genuinely live,
          # published release. Without this, a second build before a human
          # gets around to promoting the first one would wrongly branch to
          # publishing a *candidate* against a still-draft baseline instead
          # of just updating that same draft in place -- silently treating
          # unreviewed content as though it were already authoritative.
          $liveReleaseExists = $false
          $liveReleaseIsDraft = $false
          $liveTagFailureText = ''
          try {
            $liveTagViewResult = gh release view $liveTag --json tagName,isDraft 2>&1
            if ($LASTEXITCODE -eq 0) {
              $liveReleaseExists = $true
              $liveReleaseJson = $liveTagViewResult | ConvertFrom-Json
              $liveReleaseIsDraft = [bool]$liveReleaseJson.isDraft
            } else {
              $liveTagFailureText = "$liveTagViewResult"
            }
          } catch {
            $liveTagFailureText = "$_"
          }
          if (-not $liveReleaseExists -and $liveTagFailureText -notmatch 'release not found') {
            Write-Error "Publish failed: gh release view for $liveTag failed unexpectedly (not a plain not-found) -- $liveTagFailureText"
            exit 1
          }
          if ($liveReleaseExists -and -not $liveReleaseIsDraft) {
            $tag = $candidateTag
            $candidateTagExists = $false
            $candidateTagFailureText = ''
            try {
              $candidateTagViewResult = gh release view $tag --json tagName 2>&1
              if ($LASTEXITCODE -eq 0) {
                $candidateTagExists = $true
              } else {
                $candidateTagFailureText = "$candidateTagViewResult"
              }
            } catch {
              $candidateTagFailureText = "$_"
            }
            if (-not $candidateTagExists -and $candidateTagFailureText -notmatch 'release not found') {
              Write-Error "Publish failed: gh release view for $tag failed unexpectedly (not a plain not-found) -- $candidateTagFailureText"
              exit 1
            }
            if ($candidateTagExists) {
              gh release upload $tag $zipPath --clobber
              if ($LASTEXITCODE -ne 0) {
                Write-Error "Publish failed: gh release upload --clobber failed for $tag."
                exit $LASTEXITCODE
              }
              gh release edit $tag --target $sha
              if ($LASTEXITCODE -ne 0) {
                Write-Error "Publish failed: could not update target commitish for $tag."
                exit $LASTEXITCODE
              }
            } else {
              $notes = "Built by Ruby4Lich5, commit $sha. Candidate for promotion to $liveTag -- review and test before promoting. A matching gem recovery manifest (manifest.json) is attached to this same candidate release -- promotion must move both together, not the zip alone: (1) gh release download $tag --pattern '*.zip' --pattern manifest.json --dir . ; (2) gh release upload $liveTag R4L5-gem-bundle-$platform.zip --clobber ; (3) ruby bin/retarget_gem_manifest.rb manifest.json $tag $liveTag manifest.json ; (4) gh release upload $liveTag manifest.json --clobber. Single current artifact, overwritten in place on rebuild -- verify by SHA-256 digest, not by trusting the tag alone."
              gh release create $tag $zipPath --title "Gem bundle candidate ($platform)" --notes $notes --target $sha --prerelease
              if ($LASTEXITCODE -ne 0) {
                Write-Error "Publish failed: gh release create failed for $tag."
                exit $LASTEXITCODE
              }
            }
          } elseif ($liveReleaseExists -and $liveReleaseIsDraft) {
            # A prior run already created the live tag as a draft and no
            # human has promoted it yet -- update that same draft in place
            # rather than spinning off a candidate against unreviewed
            # content.
            $tag = $liveTag
            gh release upload $tag $zipPath --clobber
            if ($LASTEXITCODE -ne 0) {
              Write-Error "Publish failed: gh release upload --clobber failed for $tag."
              exit $LASTEXITCODE
            }
            gh release edit $tag --target $sha
            if ($LASTEXITCODE -ne 0) {
              Write-Error "Publish failed: could not update target commitish for $tag."
              exit $LASTEXITCODE
            }
          } else {
            $tag = $liveTag
            $notes = "Built by Ruby4Lich5, commit $sha. Draft -- review and test before publishing. A matching gem recovery manifest (manifest.json) is attached to this same draft release, already correctly tagged (draft and live share one tag name, only the draft flag changes on promotion, so no manifest retargeting is needed here) -- promote both together: (1) gh release edit $liveTag --draft=false. Single current artifact, overwritten in place on rebuild, not an incrementing version -- verify by SHA-256 digest, not by trusting the tag alone."
            gh release create $tag $zipPath --title "Gem bundle ($platform)" --notes $notes --target $sha --draft
            if ($LASTEXITCODE -ne 0) {
              Write-Error "Publish failed: gh release create failed for $tag."
              exit $LASTEXITCODE
            }
          }

          # Same retry-on-empty-only fix and same ConvertFrom-Json/
          # Where-Object fix (not gh's own --jq) as the individual-gem
          # publish step above -- same real Windows-PowerShell-5.1
          # native-argument-quoting bug, same reasoning. Same output-
          # captured-and-$LASTEXITCODE-checked-first fix too, same
          # reasoning: a genuine gh failure must not be misread as "digest
          # not populated yet."
          $remoteDigest = $null
          $lastViewFailureText = $null
          for ($digestAttempt = 1; $digestAttempt -le 5; $digestAttempt++) {
            # gh release view itself wrapped in try/catch too -- same real
            # gap and fix as the individual-gem publish step above (an
            # uncaught EAP=Stop throw here would abort the step instead of
            # being recorded and retried).
            try {
              $viewOutput = gh release view $tag --json assets 2>&1
              if ($LASTEXITCODE -eq 0) {
                $lastViewFailureText = $null
                try {
                  $assetsJson = $viewOutput | ConvertFrom-Json
                  $matchingAsset = $assetsJson.assets | Where-Object { $_.name -eq $zipName }
                  if ($matchingAsset) {
                    $remoteDigest = $matchingAsset.digest -replace '^sha256:', ''
                  }
                } catch {
                  $lastViewFailureText = "$_"
                }
              } else {
                $lastViewFailureText = "$viewOutput"
              }
            } catch {
              $lastViewFailureText = "$_"
            }
            if (-not [string]::IsNullOrWhiteSpace($remoteDigest)) {
              break
            }
            Start-Sleep -Seconds 2
          }
          if ($lastViewFailureText) {
            Write-Error "Publish failed: gh release view for $tag failed after 5 attempts -- $lastViewFailureText"
            exit 1
          }
          if ([string]::IsNullOrWhiteSpace($remoteDigest)) {
            Write-Error "Publish failed: $tag's $zipName asset had no digest after 5 attempts -- GitHub's asset metadata may not have finished processing."
            exit 1
          }
          if ($remoteDigest -ne $localSha) {
            Write-Error "Publish failed: digest mismatch for $tag -- local $localSha, remote $remoteDigest. Upload may be corrupted -- gh release upload --clobber is delete-then-upload, not atomic."
            exit 1
          }
          Write-Host "Published $tag (sha256:$localSha, commit $sha)"

          # Consumed by "Generate gem recovery manifest" below -- this run's
          # own tag/asset, whichever of the three branches above actually
          # ran (live-draft-in-progress, brand-new draft, or candidate).
          # Real design fix, review 2026-07-10: a manifest generated from a
          # candidate's own staging set must be *tagged* as belonging to
          # that candidate, not to a separately-fetched "live" snapshot --
          # otherwise its package list (this run's dist/pkg) and its own
          # artifact reference (a different run's zip) can describe two
          # different sets of bytes. Every run now generates and uploads a
          # manifest matching its own exact tag/staging set, always,
          # unconditionally -- promotion (documented in this release's own
          # notes above) is what makes one of them authoritative, not
          # generation-time gating.
          "BUNDLE_TAG=$tag" | Out-File $env:GITHUB_ENV -Append -Encoding utf8
          "BUNDLE_ZIP_NAME=$zipName" | Out-File $env:GITHUB_ENV -Append -Encoding utf8
          "BUNDLE_SHA256=sha256:$localSha" | Out-File $env:GITHUB_ENV -Append -Encoding utf8

      # Reads the closure actually staged in dist/pkg (via staged .gem
      # files, not a live install registry this job never has), the
      # already-published digests from the individual-gem publish step
      # above, and this run's own just-published bundle tag/digest --
      # never a separately-fetched value, so the package list and the
      # artifact it's said to live inside always describe the same staging
      # set (docs/DECISIONS.md Phase 13 SS2/SS3, Phase 14 addendum). Runs
      # unconditionally, every publish, tagged to match whatever this run
      # itself produced -- see "BUNDLE_TAG" above for why.
      - name: Generate gem recovery manifest
        shell: powershell
        run: |
          $pkgDir = Join-Path $env:GITHUB_WORKSPACE 'dist\pkg'

          # F2's "resolve once" cutover, extended (2026-07-13 audit finding)
          # -- root names, ruby_abi, platform, and every closure member's
          # own delivery state now come entirely from the one resolved
          # lock (bin/generate_gem_manifest.rb's own doc comment), never a
          # separately hand-derived native/pure CSV pair built here in
          # PowerShell.
          #
          # Named "manifest.json" here, not "R4L5-gem-manifest.json" -- real
          # release-blocking bug, found in review 2026-07-11: gh release
          # upload names the remote asset after the *local file's own
          # basename* with no #label override, and this release's own notes
          # (above) document the promotion procedure entirely in terms of
          # "manifest.json" (gh release download ... --pattern manifest.json,
          # ruby bin/retarget_gem_manifest.rb manifest.json ...). A
          # differently-named local file would silently break every one of
          # those documented commands at the first step.
          $outPath = Join-Path $env:RUNNER_TEMP 'manifest.json'

          & ruby (Join-Path $env:GITHUB_WORKSPACE 'bin\generate_gem_manifest.rb') `
            $env:RESOLUTION_LOCK $env:GH_REPO $env:BUNDLE_TAG $env:BUNDLE_ZIP_NAME $env:BUNDLE_SHA256 $pkgDir $outPath
          if ($LASTEXITCODE -ne 0) {
            Write-Error "Gem manifest generation failed (exit $LASTEXITCODE) -- see output above."
            exit $LASTEXITCODE
          }

          # Same independently-scoped --clobber already proven safe for
          # this exact tag (docs/DECISIONS.md Phase 12 SS1): only touches
          # the manifest.json asset, never the zip. Uploaded to *this run's
          # own* tag (draft or candidate), never straight to the live tag --
          # promotion (see this release's own notes) is the only thing that
          # makes a manifest authoritative.
          gh release upload $env:BUNDLE_TAG $outPath --clobber
          if ($LASTEXITCODE -ne 0) {
            Write-Error "Publishing the gem recovery manifest failed."
            exit $LASTEXITCODE
          }

          # Regression check, added alongside the filename fix above: this
          # release's own notes are only correct if the uploaded asset is
          # genuinely reachable by the exact name they document. Confirms
          # it directly against the real release rather than trusting the
          # upload's own exit code alone -- a clobber that silently uploaded
          # under an unexpected name would otherwise go unnoticed until a
          # real promotion attempt failed on it.
          $manifestAssetCheck = gh release view $env:BUNDLE_TAG --json assets 2>&1
          if ($LASTEXITCODE -ne 0) {
            Write-Error "Could not verify the manifest.json asset after upload -- $manifestAssetCheck"
            exit 1
          }
          $manifestAssetJson = $manifestAssetCheck | ConvertFrom-Json
          if (-not ($manifestAssetJson.assets | Where-Object { $_.name -eq 'manifest.json' })) {
            Write-Error "Publish failed: no asset literally named 'manifest.json' found on $($env:BUNDLE_TAG) after upload -- the documented promotion commands in this release's own notes would not find it."
            exit 1
          }
          Write-Host "Published gem recovery manifest to $($env:BUNDLE_TAG) (verified as manifest.json)"
