# Throwaway validation harness (2026-07-06): answers one question for a
# gem the front door has never touched -- does it compile with nothing more
# than a *generic* MSYS2 UCRT64 toolchain (gcc/make/pkg-config/libffi), with
# no gem-specific curation at all? Deliberately excludes every GTK-specific
# MSYS2 package (gobject-introspection, gtk3, pdcurses, ncurses, sqlite3)
# from ruby4-bundled-gems-suite.yml's install list -- including those would
# quietly hand a lucky gem exactly the library it needs, defeating the point
# of testing what a genuinely novel gem faces with only the basics.
#
# Not part of the real pipeline. Exists to let Ruby4Lich5::BuildPlanner's
# design decisions (Classifier / KnownNativeGems / VendoringRoleClassifier)
# get checked against a real MSYS2 compile attempt instead of stopping at
# the classify/plan layer, which is as far as local (non-Windows) testing
# can ever reach on its own.

name: Validate novel gem (throwaway)

on:
  workflow_dispatch:
    inputs:
      gem-name:
        description: "Gem to attempt building from source, e.g. fast_cuid2."
        required: true
      gem-version:
        description: "Exact version to attempt, e.g. 1.0.0."
        required: true
      ruby-installer-version:
        description: "RubyInstaller UCRT archive version, for example 4.0.5-1."
        required: false
        default: "4.0.5-1"

permissions:
  contents: read

jobs:
  validate_novel_gem:
    name: Attempt generic MSYS2 build (windows-ucrt64)
    runs-on: windows-latest
    timeout-minutes: 30

    env:
      MSYSTEM: UCRT64
      MSYS2_PREFIX: ucrt64

    steps:
      - name: Validate inputs
        shell: powershell
        run: |
          $gemName = '${{ inputs.gem-name }}'
          $gemVersion = '${{ inputs.gem-version }}'
          $rubyInstallerVersion = '${{ inputs.ruby-installer-version }}'

          if ($gemName -notmatch '^[A-Za-z0-9_.-]+$') {
            Write-Error "gem-name contains disallowed characters: '$gemName'."
            exit 1
          }
          if ($gemVersion -notmatch '^[A-Za-z0-9_.-]+$') {
            Write-Error "gem-version contains disallowed characters: '$gemVersion'."
            exit 1
          }
          if ($rubyInstallerVersion -notmatch '^\d+\.\d+\.\d+-\d+$') {
            Write-Error "ruby-installer-version must look like N.N.N-N, for example 4.0.5-1; received '$rubyInstallerVersion'."
            exit 1
          }

          "GEM_NAME=$gemName" | Out-File $env:GITHUB_ENV -Append -Encoding utf8
          "GEM_VERSION=$gemVersion" | Out-File $env:GITHUB_ENV -Append -Encoding utf8
          "RUBY_INSTALLER_VERSION=$rubyInstallerVersion" | Out-File $env:GITHUB_ENV -Append -Encoding utf8

      # Deliberately generic: base-devel/gcc/make/binutils/pkgconf/libffi only.
      # No GTK-specific packages -- see header comment.
      - name: Install generic MSYS2 UCRT build surface
        id: msys2
        uses: msys2/setup-msys2@v2
        with:
          msystem: UCRT64
          update: true
          install: >-
            base-devel
            make
            mingw-w64-ucrt-x86_64-gcc
            mingw-w64-ucrt-x86_64-gcc-libs
            mingw-w64-ucrt-x86_64-binutils
            mingw-w64-ucrt-x86_64-make
            mingw-w64-ucrt-x86_64-pkgconf
            mingw-w64-ucrt-x86_64-libffi

      - name: Build sanitized PATH
        id: lanepath
        shell: powershell
        run: |
          $msys = '${{ steps.msys2.outputs.msys2-location }}'
          $prefix = $env:MSYS2_PREFIX
          if ([string]::IsNullOrWhiteSpace($msys) -or !(Test-Path $msys)) {
            Write-Error "MSYS2 setup failed: expected install root at '$msys' to exist."
            exit 1
          }

          $orig = $env:Path -split ';'
          $filtered = $orig | Where-Object {
            $_ -and
            ($_ -notlike '*\Ruby\*\x64\msys64\*') -and
            ($_ -notmatch '^C:\\hostedtoolcache\\windows\\Ruby(\\|$)') -and
            ($_ -ne 'C:\mingw64\bin') -and
            ($_ -notmatch '^C:\\Strawberry(\\|$)')
          }
          $lanePath = @("$msys\$prefix\bin", "$msys\usr\bin") + $filtered
          $joined = ($lanePath -join ';')

          "MSYS2_ROOT=$msys" | Out-File $env:GITHUB_ENV -Append -Encoding utf8
          "path=$joined" | Out-File $env:GITHUB_OUTPUT -Append -Encoding utf8
          "RI_DEVKIT=$msys" | Out-File $env:GITHUB_ENV -Append -Encoding utf8
          "MSYSTEM_PREFIX=/$prefix" | Out-File $env:GITHUB_ENV -Append -Encoding utf8
          "MINGW_PREFIX=/$prefix" | Out-File $env:GITHUB_ENV -Append -Encoding utf8

      - name: Resolve native build surface
        shell: powershell
        env:
          PATH: ${{ steps.lanepath.outputs.path }}
        run: |
          $msys = $env:MSYS2_ROOT
          $prefix = $env:MSYS2_PREFIX
          $gcc = Join-Path $msys "$prefix\bin\gcc.exe"
          $pkgConfig = Join-Path $msys "$prefix\bin\pkg-config.exe"
          $pkgConfigPath = "$msys\$prefix\lib\pkgconfig;$msys\lib\pkgconfig"

          $makeCandidates = @(
            (Join-Path $msys 'usr\bin\make.exe'),
            (Join-Path $msys "$prefix\bin\mingw32-make.exe")
          )
          $make = $makeCandidates | Where-Object { Test-Path $_ } | Select-Object -First 1
          if ($make) { $make = $make -replace '\\', '/' }

          $required = [ordered]@{ gcc = $gcc; make = $make; 'pkg-config' = $pkgConfig }
          $missing = @()
          foreach ($name in $required.Keys) {
            $path = $required[$name]
            if ([string]::IsNullOrEmpty($path) -or !(Test-Path $path)) {
              $missing += $name
            }
          }
          if ($missing.Count -gt 0) {
            Write-Error "Native build surface validation failed: missing tool(s): $($missing -join ', ')."
            exit 1
          }

          "CC=$gcc" | Out-File $env:GITHUB_ENV -Append -Encoding utf8
          "MAKE=$make" | Out-File $env:GITHUB_ENV -Append -Encoding utf8
          "PKG_CONFIG=$pkgConfig" | Out-File $env:GITHUB_ENV -Append -Encoding utf8
          "PKG_CONFIG_PATH=$pkgConfigPath" | Out-File $env:GITHUB_ENV -Append -Encoding utf8

      - name: Download and extract RubyInstaller
        shell: powershell
        run: |
          $rubyInstallerVersion = $env:RUBY_INSTALLER_VERSION
          $rubyParent = 'C:\Ruby4Lich5\ruby'
          $archive = Join-Path $env:RUNNER_TEMP "rubyinstaller-$rubyInstallerVersion-x64.7z"
          $url = "https://github.com/oneclick/rubyinstaller2/releases/download/RubyInstaller-$rubyInstallerVersion/rubyinstaller-$rubyInstallerVersion-x64.7z"

          New-Item -ItemType Directory -Path $rubyParent -Force | Out-Null
          Invoke-WebRequest -Uri $url -OutFile $archive -UseBasicParsing -TimeoutSec 60
          if (!(Test-Path $archive)) {
            Write-Error "RubyInstaller download failed: expected archive $archive was not created."
            exit 1
          }

          $sevenZip = "${env:ProgramFiles}\7-Zip\7z.exe"
          if (!(Test-Path $sevenZip)) {
            $sevenZip = '7z.exe'
          }
          & $sevenZip x $archive "-o$rubyParent" -y
          if ($LASTEXITCODE -ne 0) {
            Write-Error "RubyInstaller extraction failed."
            exit $LASTEXITCODE
          }

          $rubyExe = Get-ChildItem $rubyParent -Recurse -Filter ruby.exe -File | Where-Object {
            $_.FullName -match '\\bin\\ruby\.exe$'
          } | Select-Object -First 1
          if (-not $rubyExe) {
            Write-Error "RubyInstaller extraction failed: ruby.exe was not found under $rubyParent."
            exit 1
          }
          $rubyRoot = Split-Path (Split-Path $rubyExe.FullName -Parent) -Parent
          & $rubyExe.FullName --version
          if ($LASTEXITCODE -ne 0) {
            Write-Error "RubyInstaller validation failed: ruby.exe could not run."
            exit $LASTEXITCODE
          }

          $gemExe = Join-Path $rubyRoot 'bin\gem.cmd'
          if (!(Test-Path $gemExe)) {
            Write-Error "RubyInstaller validation failed: gem.cmd was not found at $gemExe."
            exit 1
          }

          "RUBY_ROOT=$rubyRoot" | Out-File $env:GITHUB_ENV -Append -Encoding utf8
          "RUBY_EXE=$($rubyExe.FullName)" | Out-File $env:GITHUB_ENV -Append -Encoding utf8
          "GEM_EXE=$gemExe" | Out-File $env:GITHUB_ENV -Append -Encoding utf8

      - name: Attempt generic build of the target gem
        shell: powershell
        env:
          PATH: ${{ steps.lanepath.outputs.path }}
        run: |
          # gem.cmd is a batch-file wrapper, not a raw .exe -- under classic
          # Windows PowerShell (what GH Actions' `shell: powershell` steps
          # actually run, confirmed directly from a real failed run's log:
          # "shell: ...WindowsPowerShell\v1.0\powershell.EXE"), any stderr
          # line from a redirected (2>&1) .cmd invocation becomes a
          # NativeCommandError -- a *terminating* error under whatever
          # $ErrorActionPreference this step starts with, aborting the
          # script immediately after gem install's first stderr line, before
          # $LASTEXITCODE is ever read or any logs get written. Confirmed
          # the hard way (2026-07-07): a real run died here with no
          # BUILD_EXIT_CODE/LOG_DIR ever written, which is exactly what
          # cascaded into the "Upload build logs" step's own failure right
          # after. Explicit Continue makes gem install's failure (the whole
          # point of this workflow) a normal, non-terminating result instead.
          $ErrorActionPreference = 'Continue'

          $msys = $env:MSYS2_ROOT
          $rubyRoot = $env:RUBY_ROOT
          $gemExe = $env:GEM_EXE

          $env:Path = "$rubyRoot\bin;$msys\ucrt64\bin;$msys\usr\bin;$env:Path"
          $env:RI_DEVKIT = $msys
          $env:MSYSTEM_PREFIX = '/ucrt64'
          $env:MINGW_PREFIX = '/ucrt64'
          $env:CC = $env:CC
          $env:MAKE = $env:MAKE
          $env:PKG_CONFIG = $env:PKG_CONFIG

          $buildDir = Join-Path $env:RUNNER_TEMP 'novel-gem-build'
          New-Item -ItemType Directory -Path $buildDir -Force | Out-Null

          $logDir = Join-Path $env:RUNNER_TEMP 'novel-gem-logs'
          New-Item -ItemType Directory -Path $logDir -Force | Out-Null
          $transcriptPath = Join-Path $logDir 'gem-install-transcript.log'

          # Tee, not just Write-Host: the live run log expires with the
          # workflow's retention window, and gem install's own raised error
          # already includes the actual compiler/linker failure text inline
          # (verified directly against real gem-install failures before
          # writing this) -- that has to land in the downloadable artifact
          # itself, not just the console.
          Write-Host "::group::Attempting: gem install $env:GEM_NAME -v $env:GEM_VERSION --platform ruby"
          & $gemExe install $env:GEM_NAME -v $env:GEM_VERSION --platform ruby --install-dir $buildDir --verbose 2>&1 |
            Tee-Object -FilePath $transcriptPath
          $installExit = $LASTEXITCODE
          Write-Host "::endgroup::"

          "BUILD_EXIT_CODE=$installExit" | Out-File $env:GITHUB_ENV -Append -Encoding utf8

          # Two different logs, two different failure stages: mkmf.log is
          # extconf.rb's own probe log (have_library/pkg_config/etc. --
          # relevant when a required system library isn't found, the
          # failure this workflow specifically exists to probe for).
          # gem_make.out is RubyGems' own consolidated log of the whole
          # extconf+make run, written on every failure regardless of stage
          # (verified directly: it exists even when extconf never got far
          # enough to write mkmf.log at all, e.g. a plain compile error).
          # Collect both rather than assuming which one a given gem hits.
          foreach ($pattern in @('mkmf.log', 'gem_make.out')) {
            Get-ChildItem -Path $buildDir -Recurse -Filter $pattern -File -ErrorAction SilentlyContinue |
              ForEach-Object { Copy-Item $_.FullName (Join-Path $logDir "$($_.Directory.Name)-$pattern") -Force }
          }
          "$env:GEM_NAME $env:GEM_VERSION -- gem install exit code: $installExit" | Set-Content (Join-Path $logDir 'summary.txt')

          if ($installExit -eq 0) {
            Write-Host "::notice::$env:GEM_NAME $env:GEM_VERSION built and installed cleanly against a generic MSYS2 UCRT64 toolchain -- no gem-specific curation needed."
          } else {
            Write-Host "::warning::$env:GEM_NAME $env:GEM_VERSION failed to build against a generic MSYS2 UCRT64 toolchain (exit $installExit) -- see uploaded logs. This is diagnostic information, not a workflow failure."
          }

          "LOG_DIR=$logDir" | Out-File $env:GITHUB_ENV -Append -Encoding utf8

      - name: Upload build logs (always, pass or fail)
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: novel-gem-validation-logs
          path: ${{ env.LOG_DIR }}
          if-no-files-found: warn
