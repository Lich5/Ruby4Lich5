name: Ruby Syntax
on:
  push:
    branches:
      - main
    paths:
      - "**/*.rb"
  pull_request:
    paths:
      - "**/*.rb"

permissions:
  contents: read

jobs:
  check_syntax:
    runs-on: ubuntu-latest
    name: Run tests on Ruby
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Get changed files
        id: changed-files
        uses: step-security/changed-files@2e07db73e5ccdb319b9a6c7766bd46d39d304bad # v47.0.5
        with:
          files: |
            **/*.rb
          separator: "\n"

      - uses: ruby/setup-ruby@d45b1a4e94b71acab930e56e79c6aa188764e7f9 # v1.316.0
        with:
          bundler-cache: true

      - name: Run Ruby syntax check on changed scripts
        env:
          CHANGED_FILES: ${{ steps.changed-files.outputs.all_changed_files }}
        run: |
          # step-security/changed-files appends a trailing backslash to every
          # line except the last in its own multi-line output, regardless of
          # the separator input requested here -- confirmed directly against
          # a real run (2026-07-11): CHANGED_FILES genuinely contains real
          # newlines between filenames, but each non-final line also ends in
          # a literal `\`. `read -r` correctly preserves it (that's what -r
          # is for), so a file passed straight through no longer exists on
          # disk under that exact name. Stripped here rather than fighting
          # the action's own escaping.
          while IFS= read -r file; do
            file="${file%\\}"
            [ -z "$file" ] && continue
            ruby -c -- "$file"
          done <<< "$CHANGED_FILES"
