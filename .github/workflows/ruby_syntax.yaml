name: Ruby Syntax
on:
  push:
    branches:
      - main
    paths:
      - "**/*.rb"
  pull_request:
    paths:
      - "**/*.rb"

permissions:
  contents: read

jobs:
  check_syntax:
    runs-on: ubuntu-latest
    name: Run tests on Ruby
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Get changed files
        id: changed-files
        uses: step-security/changed-files@2e07db73e5ccdb319b9a6c7766bd46d39d304bad # v47.0.5
        with:
          files: |
            **/*.rb
          separator: "\n"

      - uses: ruby/setup-ruby@0dafeac902942906541bc140009cdbf32665b601 # v1.315.0
        with:
          bundler-cache: true

      - name: Run Ruby syntax check on changed scripts
        env:
          CHANGED_FILES: ${{ steps.changed-files.outputs.all_changed_files }}
        run: |
          while IFS= read -r file; do
            [ -z "$file" ] && continue
            ruby -c -- "$file"
          done <<< "$CHANGED_FILES"
